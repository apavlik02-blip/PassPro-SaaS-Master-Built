<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassPro — 07-database-schema</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #06060c; } #root { min-height: 100vh; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const tables = [
  {
    name: "users",
    color: "#00c896",
    fields: [
      { name: "id", type: "uuid", pk: true },
      { name: "email", type: "varchar" },
      { name: "full_name", type: "varchar" },
      { name: "plan_id", type: "fk → plans" },
      { name: "agency_id", type: "fk → agencies" },
      { name: "target_state", type: "varchar(2)" },
      { name: "exam_date", type: "date" },
      { name: "streak_days", type: "integer" },
      { name: "xp_total", type: "integer" },
      { name: "created_at", type: "timestamp" },
    ],
    relations: ["plans", "agencies"],
    desc: "Core user table. Every student, agency admin, and individual subscriber lives here.",
  },
  {
    name: "exam_attempts",
    color: "#38bdf8",
    fields: [
      { name: "id", type: "uuid", pk: true },
      { name: "user_id", type: "fk → users" },
      { name: "exam_id", type: "fk → exams" },
      { name: "score_pct", type: "decimal" },
      { name: "time_taken_sec", type: "integer" },
      { name: "answers_json", type: "jsonb" },
      { name: "weak_topics", type: "jsonb" },
      { name: "xp_earned", type: "integer" },
      { name: "created_at", type: "timestamp" },
    ],
    relations: ["users", "exams"],
    desc: "Every practice exam attempt. answers_json stores the full answer map; weak_topics is populated by the Gap Analysis Engine.",
  },
  {
    name: "ai_sessions",
    color: "#a78bfa",
    fields: [
      { name: "id", type: "uuid", pk: true },
      { name: "user_id", type: "fk → users" },
      { name: "session_type", type: "enum" },
      { name: "persona_id", type: "fk → personas" },
      { name: "messages_json", type: "jsonb" },
      { name: "score_total", type: "decimal" },
      { name: "score_breakdown", type: "jsonb" },
      { name: "duration_sec", type: "integer" },
      { name: "created_at", type: "timestamp" },
    ],
    relations: ["users", "personas"],
    desc: "Stores every AI companion and roleplay conversation. session_type is 'companion' or 'roleplay'. Full message history stored in messages_json.",
  },
  {
    name: "topic_mastery",
    color: "#f59e0b",
    fields: [
      { name: "id", type: "uuid", pk: true },
      { name: "user_id", type: "fk → users" },
      { name: "topic_id", type: "fk → topics" },
      { name: "mastery_pct", type: "decimal" },
      { name: "attempts", type: "integer" },
      { name: "last_practiced", type: "timestamp" },
      { name: "flagged_weak", type: "boolean" },
    ],
    relations: ["users", "topics"],
    desc: "Real-time mastery tracking per topic per user. Updated after every exam. flagged_weak triggers remediation content in the AI Companion.",
  },
  {
    name: "agencies",
    color: "#f87171",
    fields: [
      { name: "id", type: "uuid", pk: true },
      { name: "name", type: "varchar" },
      { name: "admin_user_id", type: "fk → users" },
      { name: "seat_limit", type: "integer" },
      { name: "stripe_customer_id", type: "varchar" },
      { name: "billing_cycle", type: "enum" },
      { name: "created_at", type: "timestamp" },
    ],
    relations: ["users"],
    desc: "Agency organizations for B2B plans. Linked to users via agency_id. billing_cycle is 'monthly' or 'annual'.",
  },
  {
    name: "questions",
    color: "#4ade80",
    fields: [
      { name: "id", type: "uuid", pk: true },
      { name: "topic_id", type: "fk → topics" },
      { name: "state_code", type: "varchar(2)" },
      { name: "question_text", type: "text" },
      { name: "options_json", type: "jsonb" },
      { name: "correct_answer", type: "varchar" },
      { name: "explanation", type: "text" },
      { name: "difficulty", type: "enum" },
    ],
    relations: ["topics"],
    desc: "The full question bank. options_json contains all 4 answer options. difficulty is 'easy', 'medium', or 'hard'.",
  },
];

const typeColors = { uuid: "#a78bfa", varchar: "#38bdf8", "varchar(2)": "#38bdf8", integer: "#f59e0b", decimal: "#f59e0b", date: "#f59e0b", timestamp: "#f59e0b", text: "#38bdf8", jsonb: "#f87171", boolean: "#00c896", enum: "#fb923c" };

const getTypeColor = (type) => {
  if (type.startsWith("fk")) return "rgba(255,255,255,0.3)";
  return typeColors[type] || "rgba(255,255,255,0.4)";
};

function DatabaseSchema() {
  const [selected, setSelected] = useState("users");
  const table = tables.find(t => t.name === selected);

  return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: "#0f1117", minHeight: "100vh", color: "#fff" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .table-btn { cursor: pointer; border: none; transition: all 0.15s; }
        .table-btn:hover { background: rgba(255,255,255,0.05) !important; }
        .field-row { transition: background 0.1s; }
        .field-row:hover { background: rgba(255,255,255,0.04); }
      `}</style>

      <div style={{ padding: "40px 40px 28px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
        <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: "#f59e0b", letterSpacing: 3, textTransform: "uppercase", marginBottom: 12 }}>07 — Database Schema</div>
        <h1 style={{ fontFamily: "'Syne'", fontSize: "clamp(28px,4vw,48px)", fontWeight: 800, letterSpacing: -2, marginBottom: 12 }}>
          Data <span style={{ color: "#f59e0b" }}>Models</span>
        </h1>
        <p style={{ color: "rgba(255,255,255,0.35)", fontSize: 14 }}>PostgreSQL on Supabase. Click any table to inspect fields and relationships.</p>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "240px 1fr", minHeight: "calc(100vh - 140px)" }}>
        {/* Table list */}
        <div style={{ borderRight: "1px solid rgba(255,255,255,0.06)", padding: "20px 12px" }}>
          <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.2)", letterSpacing: 2, padding: "0 12px 12px", textTransform: "uppercase" }}>Tables</div>
          {tables.map(t => (
            <button key={t.name} className="table-btn" onClick={() => setSelected(t.name)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "11px 14px", borderRadius: 8, background: selected === t.name ? `${t.color}12` : "transparent", border: `1px solid ${selected === t.name ? `${t.color}30` : "transparent"}`, textAlign: "left", marginBottom: 4 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: t.color, flexShrink: 0 }} />
              <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 12, color: selected === t.name ? t.color : "rgba(255,255,255,0.55)" }}>{t.name}</span>
              <span style={{ marginLeft: "auto", fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.2)" }}>{t.fields.length}</span>
            </button>
          ))}

          {/* Legend */}
          <div style={{ marginTop: 32, padding: "0 12px" }}>
            <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.2)", letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>Type Legend</div>
            {[["uuid", "#a78bfa"], ["varchar/text", "#38bdf8"], ["integer/decimal", "#f59e0b"], ["jsonb", "#f87171"], ["boolean", "#00c896"], ["enum", "#fb923c"]].map(([type, color]) => (
              <div key={type} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                <div style={{ width: 8, height: 8, borderRadius: 2, background: color, flexShrink: 0 }} />
                <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.3)" }}>{type}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Table detail */}
        <div style={{ padding: "28px 32px" }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 24 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                <div style={{ width: 10, height: 10, borderRadius: "50%", background: table?.color }} />
                <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 18, fontWeight: 500, color: table?.color }}>{table?.name}</span>
              </div>
              <p style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", maxWidth: 520, lineHeight: 1.6 }}>{table?.desc}</p>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              {table?.relations.map((rel, i) => (
                <div key={i} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", padding: "4px 12px", borderRadius: 20, fontSize: 11, fontFamily: "'JetBrains Mono'", color: "rgba(255,255,255,0.35)" }}>→ {rel}</div>
              ))}
            </div>
          </div>

          <div style={{ background: "#0a0a0f", borderRadius: 12, overflow: "hidden", border: "1px solid rgba(255,255,255,0.06)" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 40px", padding: "10px 16px", background: `${table?.color}12`, borderBottom: `1px solid ${table?.color}20` }}>
              <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.3)", letterSpacing: 1.5, textTransform: "uppercase" }}>Column</span>
              <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.3)", letterSpacing: 1.5, textTransform: "uppercase" }}>Type</span>
              <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.3)" }}>PK</span>
            </div>
            {table?.fields.map((field, i) => (
              <div key={i} className="field-row" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 40px", padding: "12px 16px", borderBottom: i < table.fields.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none", borderRadius: 4 }}>
                <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 13, color: field.pk ? table?.color : "rgba(255,255,255,0.7)" }}>{field.name}</span>
                <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 12, color: getTypeColor(field.type) }}>{field.type}</span>
                <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: table?.color }}>{field.pk ? "✦" : ""}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(DatabaseSchema));
</script>
</body>
</html>
