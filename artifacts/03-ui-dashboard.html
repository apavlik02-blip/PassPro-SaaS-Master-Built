<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassPro — 03-ui-dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #06060c; } #root { min-height: 100vh; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const modules = [
  { name: "Types of Life Insurance", pct: 100, status: "complete" },
  { name: "Policy Provisions & Options", pct: 100, status: "complete" },
  { name: "Annuities & Retirement", pct: 62, status: "partial" },
  { name: "Health Insurance Basics", pct: 0, status: "empty" },
  { name: "TX State Regulations", pct: 0, status: "empty" },
  { name: "Ethics & Suitability", pct: 0, status: "empty" },
];

const navItems = [
  { icon: "⬛", label: "Dashboard", active: true },
  { icon: "📚", label: "Study Modules" },
  { icon: "📝", label: "Practice Exams" },
  { icon: "🤖", label: "AI Companion" },
  { icon: "🎭", label: "Roleplay Sim" },
  { icon: "📊", label: "Analytics", section: "Progress" },
  { icon: "🏆", label: "Achievements" },
  { icon: "👥", label: "Leaderboard" },
];

const aiSuggestions = ["▶ Start Annuity Drill", "💬 Ask me anything", "📋 My study plan", "🎯 Weak area quiz"];

function DashboardMockup() {
  const [activeNav, setActiveNav] = useState("Dashboard");
  const [streak] = useState(7);

  const ringColor = (status) => {
    if (status === "complete") return { bg: "rgba(0,200,150,0.15)", border: "#00c896", color: "#00c896", text: "✓" };
    if (status === "partial") return { bg: "rgba(245,158,11,0.1)", border: "rgba(245,158,11,0.5)", color: "#f59e0b", text: "62%" };
    return { bg: "rgba(255,255,255,0.04)", border: "rgba(255,255,255,0.1)", color: "rgba(255,255,255,0.2)", text: "—" };
  };

  return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: "#0a0a0f", minHeight: "100vh", color: "#fff" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .nav-item { transition: all 0.15s; cursor: pointer; border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .nav-item:hover { background: rgba(255,255,255,0.05); }
        .ai-chip { transition: all 0.15s; cursor: pointer; background: rgba(0,200,150,0.08); border: 1px solid rgba(0,200,150,0.2); color: #00c896; padding: 7px 14px; border-radius: 20px; font-size: 12px; white-space: nowrap; }
        .ai-chip:hover { background: rgba(0,200,150,0.15); }
        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .module-row { transition: background 0.15s; }
        .module-row:hover { background: rgba(255,255,255,0.03); }
      `}</style>

      {/* Top label */}
      <div style={{ padding: "16px 24px", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: "#00c896", letterSpacing: 3, textTransform: "uppercase" }}>03 — UI Dashboard Mockup</div>
        <div style={{ flex: 1, height: 1, background: "rgba(255,255,255,0.06)" }} />
        <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.2)" }}>app.passpro.io/dashboard</div>
      </div>

      {/* App Shell */}
      <div style={{ display: "grid", gridTemplateColumns: "200px 1fr", minHeight: "calc(100vh - 53px)" }}>
        {/* Sidebar */}
        <div style={{ background: "#0d0d16", borderRight: "1px solid rgba(255,255,255,0.05)", padding: "20px 12px", display: "flex", flexDirection: "column" }}>
          <div style={{ fontFamily: "'Syne'", fontSize: 18, fontWeight: 800, padding: "8px 12px 24px", letterSpacing: -0.5 }}>
            Pass<span style={{ color: "#00c896" }}>Pro</span>
          </div>
          {navItems.map((item, i) => (
            <div key={i}>
              {item.section && <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.18)", letterSpacing: 2, textTransform: "uppercase", padding: "14px 12px 6px" }}>{item.section}</div>}
              <div className="nav-item" onClick={() => setActiveNav(item.label)} style={{ background: activeNav === item.label ? "rgba(0,200,150,0.1)" : "transparent", color: activeNav === item.label ? "#00c896" : "rgba(255,255,255,0.4)" }}>
                <span style={{ fontSize: 14, width: 18, textAlign: "center" }}>{item.icon}</span>
                <span>{item.label}</span>
              </div>
            </div>
          ))}
          {/* Streak badge */}
          <div style={{ marginTop: "auto", background: "rgba(245,158,11,0.08)", border: "1px solid rgba(245,158,11,0.2)", borderRadius: 10, padding: "12px 14px" }}>
            <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.3)", letterSpacing: 2, marginBottom: 6 }}>STREAK</div>
            <div style={{ fontFamily: "'Syne'", fontSize: 28, fontWeight: 800, color: "#f59e0b", lineHeight: 1 }}>{streak} 🔥</div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", marginTop: 4 }}>days in a row</div>
          </div>
        </div>

        {/* Main content */}
        <div style={{ padding: "28px", background: "#0a0a12", overflowY: "auto" }}>
          {/* Header */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 28 }}>
            <div>
              <div style={{ fontFamily: "'Syne'", fontSize: 22, fontWeight: 700, letterSpacing: -0.5 }}>
                Good morning, <span style={{ color: "#00c896" }}>Amanda</span> 👋
              </div>
              <div style={{ fontSize: 13, color: "rgba(255,255,255,0.3)", marginTop: 4 }}>You're on a 7-day streak. Keep it going!</div>
            </div>
            <div style={{ background: "rgba(245,158,11,0.1)", border: "1px solid rgba(245,158,11,0.25)", color: "#f59e0b", padding: "8px 16px", borderRadius: 20, fontSize: 12, fontFamily: "'JetBrains Mono'" }}>
              📅 Exam in 18 days
            </div>
          </div>

          {/* Stats */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 24 }}>
            {[
              { label: "Readiness", value: "74%", color: "#00c896", sub: "+6% this week" },
              { label: "Streak", value: "7 🔥", color: "#f59e0b", sub: "days in a row" },
              { label: "XP Points", value: "2,840", color: "#a78bfa", sub: "Rank: Silver II" },
              { label: "Questions", value: "312", color: "#fff", sub: "answered total" },
            ].map((stat, i) => (
              <div key={i} className="stat-card" style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: 16 }}>
                <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.3)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>{stat.label}</div>
                <div style={{ fontFamily: "'Syne'", fontSize: 24, fontWeight: 800, color: stat.color, lineHeight: 1 }}>{stat.value}</div>
                <div style={{ fontSize: 10, color: "rgba(255,255,255,0.25)", marginTop: 4 }}>{stat.sub}</div>
              </div>
            ))}
          </div>

          {/* Content row */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            {/* Module list */}
            <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: 18 }}>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.25)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>Module Progress</div>
              {modules.map((mod, i) => {
                const r = ringColor(mod.status);
                return (
                  <div key={i} className="module-row" style={{ display: "flex", alignItems: "center", gap: 12, padding: "9px 8px", borderBottom: i < modules.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none", borderRadius: 6 }}>
                    <div style={{ width: 30, height: 30, borderRadius: "50%", background: r.bg, border: `1.5px solid ${r.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontFamily: "'JetBrains Mono'", color: r.color, flexShrink: 0 }}>{r.text}</div>
                    <div>
                      <div style={{ fontSize: 12, color: "rgba(255,255,255,0.7)" }}>{mod.name}</div>
                      <div style={{ fontSize: 10, color: "rgba(255,255,255,0.25)", marginTop: 2 }}>
                        {mod.status === "complete" ? "Completed · 100%" : mod.status === "partial" ? `In Progress · ${mod.pct}%` : "Not started"}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* AI Panel */}
            <div style={{ background: "linear-gradient(135deg, rgba(0,200,150,0.06) 0%, rgba(167,139,250,0.06) 100%)", border: "1px solid rgba(0,200,150,0.12)", borderRadius: 10, padding: 18, display: "flex", flexDirection: "column", gap: 14 }}>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "#00c896", letterSpacing: 2, textTransform: "uppercase" }}>🤖 AI Coach — Today's Insight</div>
              <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 8, padding: "12px 14px", fontSize: 13, color: "rgba(255,255,255,0.65)", lineHeight: 1.6, borderLeft: "2px solid #00c896" }}>
                <strong style={{ color: "#fff" }}>Your weak spot is Annuities.</strong> You've scored below 60% on annuity questions in your last 3 sessions. I've built a focused 15-minute drill just for you.
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {aiSuggestions.map((s, i) => (
                  <div key={i} className="ai-chip">{s}</div>
                ))}
              </div>
              <div style={{ marginTop: "auto", padding: "10px 14px", background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 8, fontSize: 12, color: "rgba(255,255,255,0.3)", display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ color: "#00c896" }}>●</span> Ask Coach anything about your exam...
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(DashboardMockup));
</script>
</body>
</html>
