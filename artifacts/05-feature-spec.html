<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassPro — 05-feature-spec</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #06060c; } #root { min-height: 100vh; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const gapSteps = [
  { icon: "📝", label: "Exam Completed", color: "#00c896" },
  { icon: "🧠", label: "AI Scores by Topic", color: "#a78bfa" },
  { icon: "⚠️", label: "Flags Weak Areas", color: "#f59e0b" },
  { icon: "📋", label: "Builds Custom Plan", color: "#38bdf8" },
  { icon: "🚀", label: "Serves Remediation", color: "#00c896" },
];

const gamification = [
  { icon: "🔥", name: "Daily Streak", how: "Study 15+ min/day. Break = reset.", purpose: "Daily retention", color: "#f59e0b" },
  { icon: "⚡", name: "XP Points", how: "Earned per lesson, exam, roleplay session, and streak milestone.", purpose: "Progress feeling", color: "#a78bfa" },
  { icon: "🏆", name: "Badges", how: "Unlocked for milestones: first exam, 7-day streak, 100% on a topic.", purpose: "Achievement", color: "#f59e0b" },
  { icon: "📊", name: "Leaderboard", how: "Weekly XP rankings among cohort or agency team.", purpose: "Competition", color: "#38bdf8" },
  { icon: "🎯", name: "Study Goals", how: "User sets daily goal (15/30/60 min). App tracks and celebrates.", purpose: "Accountability", color: "#00c896" },
];

const agencyFeatures = [
  { icon: "👥", color: "#00c896", bg: "rgba(0,200,150,0.1)", title: "Team Progress View", desc: "See every agent's readiness score, study hours, and predicted pass date in one table." },
  { icon: "📧", color: "#a78bfa", bg: "rgba(167,139,250,0.1)", title: "Automated Nudges", desc: "Auto-email agents who haven't studied in 3+ days. Configurable by manager." },
  { icon: "📊", color: "#f59e0b", bg: "rgba(245,158,11,0.1)", title: "Pass Rate Reporting", desc: "Track first-attempt pass rates vs. retakes. Exportable CSV for compliance records." },
  { icon: "🔑", color: "#38bdf8", bg: "rgba(56,189,248,0.1)", title: "Seat Management", desc: "Add/remove agents, reassign licenses, and manage billing — all in the admin portal." },
];

function FeatureSpec() {
  const [tab, setTab] = useState("gap");
  const [active, setActive] = useState(null);

  return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: "#f5f3ee", minHeight: "100vh", color: "#0a0a0f" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .tab-btn { cursor: pointer; border: none; transition: all 0.2s; }
        .card { transition: transform 0.2s, box-shadow 0.2s; cursor: default; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.1); }
        .step { cursor: pointer; transition: all 0.2s; }
        .step:hover { transform: scale(1.04); }
        .gam-row { transition: all 0.15s; cursor: pointer; border-radius: 10px; }
        .gam-row:hover { background: rgba(0,0,0,0.04); }
      `}</style>

      <div style={{ background: "#0a0a0f", color: "#fff", padding: "48px 40px 36px" }}>
        <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: "#f59e0b", letterSpacing: 3, textTransform: "uppercase", marginBottom: 12 }}>05 — Feature Specifications</div>
        <h1 style={{ fontFamily: "'Syne'", fontSize: "clamp(32px,5vw,52px)", fontWeight: 800, letterSpacing: -2, lineHeight: 1, marginBottom: 12 }}>
          Full feature<br /><span style={{ color: "#f59e0b" }}>breakdown</span>
        </h1>
        <p style={{ color: "rgba(255,255,255,0.4)", fontSize: 14, maxWidth: 440 }}>Every major system — gap analysis, gamification, and the agency admin dashboard — specified in detail.</p>
      </div>

      {/* Tabs */}
      <div style={{ background: "#0a0a0f", display: "flex", gap: 4, padding: "0 40px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
        {[["gap", "Gap Analysis"], ["gamification", "Gamification"], ["agency", "Agency Dashboard"]].map(([val, label]) => (
          <button key={val} className="tab-btn" onClick={() => setTab(val)} style={{ padding: "12px 20px", fontSize: 13, fontFamily: "'DM Sans'", background: "transparent", color: tab === val ? "#f59e0b" : "rgba(255,255,255,0.35)", borderBottom: tab === val ? "2px solid #f59e0b" : "2px solid transparent" }}>
            {label}
          </button>
        ))}
      </div>

      <div style={{ padding: "40px" }}>
        {/* Gap Analysis */}
        {tab === "gap" && (
          <div>
            <h2 style={{ fontFamily: "'Syne'", fontSize: 24, fontWeight: 800, letterSpacing: -0.5, marginBottom: 8 }}>Gap Analysis Engine</h2>
            <p style={{ color: "#666", fontSize: 14, marginBottom: 36 }}>The core differentiator. After every practice exam, 5 things happen automatically. Click each step to learn more.</p>

            <div style={{ display: "flex", alignItems: "center", gap: 0, overflowX: "auto", paddingBottom: 20, marginBottom: 40 }}>
              {gapSteps.map((step, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center" }}>
                  <div className="step" onClick={() => setActive(active === i ? null : i)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10, minWidth: 110 }}>
                    <div style={{ width: 64, height: 64, borderRadius: 16, background: active === i ? step.color : `${step.color}18`, border: `2px solid ${active === i ? step.color : `${step.color}30`}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, transition: "all 0.2s" }}>{step.icon}</div>
                    <div style={{ fontSize: 12, fontWeight: 500, textAlign: "center", color: active === i ? step.color : "#444", lineHeight: 1.3 }}>{step.label}</div>
                  </div>
                  {i < gapSteps.length - 1 && <div style={{ fontSize: 18, color: "#ccc", margin: "0 4px", paddingBottom: 24 }}>→</div>}
                </div>
              ))}
            </div>

            {active !== null && (
              <div style={{ background: "#fff", border: `1px solid ${gapSteps[active].color}40`, borderLeft: `3px solid ${gapSteps[active].color}`, borderRadius: 10, padding: 24, marginBottom: 24 }}>
                <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: gapSteps[active].color, letterSpacing: 2, marginBottom: 8 }}>STEP {active + 1}</div>
                <div style={{ fontFamily: "'Syne'", fontSize: 18, fontWeight: 700, marginBottom: 8 }}>{gapSteps[active].label}</div>
                <div style={{ fontSize: 14, color: "#555", lineHeight: 1.7 }}>
                  {active === 0 && "Student completes a timed, full-length or focused practice exam. All answers are recorded with timestamps and topic metadata."}
                  {active === 1 && "The AI scoring engine categorizes every question by topic (e.g. 'Term Life', 'Annuities', 'State Regulations') and calculates a mastery percentage per topic."}
                  {active === 2 && "Topics scoring below 70% are automatically flagged as weak areas. Flagged topics are stored in the topic_mastery table and surfaced to the AI Companion."}
                  {active === 3 && "The AI generates a personalized study plan prioritizing the 2-3 weakest topics. The plan includes specific lessons, flashcard sets, and drill questions."}
                  {active === 4 && "The next time the student opens the app, the AI Coach immediately surfaces their custom remediation content. Weak-area questions appear more frequently in future practice exams."}
                </div>
              </div>
            )}
          </div>
        )}

        {/* Gamification */}
        {tab === "gamification" && (
          <div>
            <h2 style={{ fontFamily: "'Syne'", fontSize: 24, fontWeight: 800, letterSpacing: -0.5, marginBottom: 8 }}>Gamification System</h2>
            <p style={{ color: "#666", fontSize: 14, marginBottom: 32 }}>Five interlocking engagement mechanisms that keep students studying daily and feeling progress.</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              {gamification.map((item, i) => (
                <div key={i} className="gam-row" style={{ display: "grid", gridTemplateColumns: "48px 1fr 1fr 120px", alignItems: "center", gap: 16, padding: "16px 16px" }}>
                  <div style={{ width: 44, height: 44, borderRadius: 12, background: `${item.color}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>{item.icon}</div>
                  <div>
                    <div style={{ fontFamily: "'Syne'", fontWeight: 700, fontSize: 15, marginBottom: 2 }}>{item.name}</div>
                    <div style={{ fontSize: 12, color: "#666", lineHeight: 1.5 }}>{item.how}</div>
                  </div>
                  <div style={{ fontSize: 13, color: "#666" }}></div>
                  <div style={{ background: `${item.color}15`, border: `1px solid ${item.color}30`, color: item.color, padding: "5px 12px", borderRadius: 20, fontSize: 11, fontFamily: "'JetBrains Mono'", textAlign: "center" }}>{item.purpose}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Agency */}
        {tab === "agency" && (
          <div>
            <h2 style={{ fontFamily: "'Syne'", fontSize: 24, fontWeight: 800, letterSpacing: -0.5, marginBottom: 8 }}>Agency Admin Dashboard</h2>
            <p style={{ color: "#666", fontSize: 14, marginBottom: 32 }}>The B2B plan includes a separate admin portal for agency managers to monitor team progress and drive pass rates.</p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 16, marginBottom: 32 }}>
              {agencyFeatures.map((f, i) => (
                <div key={i} className="card" style={{ background: "#fff", border: "1px solid #e8e6e0", borderRadius: 14, padding: 24 }}>
                  <div style={{ width: 44, height: 44, borderRadius: 12, background: f.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, marginBottom: 16 }}>{f.icon}</div>
                  <div style={{ fontFamily: "'Syne'", fontWeight: 700, fontSize: 16, marginBottom: 8, color: f.color }}>{f.title}</div>
                  <div style={{ fontSize: 13, color: "#666", lineHeight: 1.6 }}>{f.desc}</div>
                </div>
              ))}
            </div>
            <div style={{ background: "#0a0a0f", borderRadius: 12, padding: 24, color: "#fff" }}>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "#f59e0b", letterSpacing: 2, marginBottom: 12 }}>AGENCY PRICING</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20 }}>
                {[["Starter Agency", "$299/mo", "Up to 5 seats"], ["Growth Agency", "$499/mo", "Up to 15 seats"], ["Enterprise", "$999/mo", "Unlimited seats"]].map(([name, price, seats], i) => (
                  <div key={i} style={{ padding: 16, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 10 }}>
                    <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.3)", marginBottom: 6 }}>{name}</div>
                    <div style={{ fontFamily: "'Syne'", fontSize: 26, fontWeight: 800, color: "#f59e0b", marginBottom: 4 }}>{price}</div>
                    <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)" }}>{seats}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(FeatureSpec));
</script>
</body>
</html>
