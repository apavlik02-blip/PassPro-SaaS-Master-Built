<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassPro — 15-compliance-tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #06060c; } #root { min-height: 100vh; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const units = [
  { id: 1, title: "Foundations of Life Insurance", requiredMins: 150, type: "core", color: "#00c896" },
  { id: 2, title: "Types of Life Insurance Policies", requiredMins: 240, type: "core", color: "#38bdf8" },
  { id: 3, title: "Policy Provisions, Riders & Options", requiredMins: 210, type: "core", color: "#a78bfa" },
  { id: 4, title: "Annuities", requiredMins: 180, type: "core", color: "#f59e0b" },
  { id: 5, title: "Underwriting & Premiums", requiredMins: 150, type: "core", color: "#f87171" },
  { id: 6, title: "Life Insurance Needs & Planning", requiredMins: 120, type: "core", color: "#4ade80" },
  { id: 7, title: "Taxes, Retirement & Social Security", requiredMins: 150, type: "core", color: "#fb923c" },
  { id: 8, title: "Wisconsin State Regulations", requiredMins: 180, type: "state", color: "#c084fc" },
];

// Simulated progress — in production this comes from DB
const initialProgress = [
  { id: 1, spentMins: 150, sessions: 3 },
  { id: 2, spentMins: 190, sessions: 4 },
  { id: 3, spentMins: 85, sessions: 2 },
  { id: 4, spentMins: 20, sessions: 1 },
  { id: 5, spentMins: 0, sessions: 0 },
  { id: 6, spentMins: 0, sessions: 0 },
  { id: 7, spentMins: 0, sessions: 0 },
  { id: 8, spentMins: 62, sessions: 2 },
];

const totalRequired = 20 * 60; // 1200 minutes = 20 hours
const totalSpent = initialProgress.reduce((a, p) => a + p.spentMins, 0);

const sessions = [
  { date: "Jun 3, 2026", duration: "48 min", unit: "Types of Life Insurance", modules: ["Term Life", "Whole Life"], status: "verified" },
  { date: "Jun 2, 2026", duration: "52 min", unit: "Types of Life Insurance", modules: ["Universal Life", "Variable Life"], status: "verified" },
  { date: "Jun 1, 2026", duration: "61 min", unit: "Foundations", modules: ["Insurance Contract", "Insurable Interest"], status: "verified" },
  { date: "May 31, 2026", duration: "44 min", unit: "Wisconsin Regulations", modules: ["OCI & Licensing"], status: "verified" },
  { date: "May 30, 2026", duration: "38 min", unit: "Wisconsin Regulations", modules: ["License Maintenance"], status: "verified" },
  { date: "May 29, 2026", duration: "55 min", unit: "Foundations", modules: ["What Is Life Insurance?", "Insurance Contract (intro)"], status: "verified" },
  { date: "May 28, 2026", duration: "45 min", unit: "Policy Provisions", modules: ["Standard Provisions", "Nonforfeiture Options"], status: "verified" },
  { date: "May 27, 2026", duration: "40 min", unit: "Types of Life Insurance", modules: ["Other Policy Types"], status: "verified" },
  { date: "May 26, 2026", duration: "30 min", unit: "Policy Provisions", modules: ["Riders"], status: "verified" },
  { date: "May 25, 2026", duration: "100 min", unit: "Annuities", modules: ["Annuity Fundamentals", "Types of Annuities"], status: "verified" },
];

const complianceRules = [
  { rule: "Minimum 20 hours of pre-licensing education", source: "OCI Wis. Stat. § 628.03", status: "in_progress", note: "507/1200 minutes completed" },
  { rule: "8 of 20 hours must cover WI Laws, Principles & Ethics", source: "OCI Pre-Licensing Requirements", status: "in_progress", note: "Unit 8: 62/180 minutes completed" },
  { rule: "Seat time tracked per session — inactivity limit applies", source: "OCI Provider Standards", status: "active", note: "30-minute inactivity timeout enforced" },
  { rule: "Certificate valid for 12 months from completion", source: "Kaplan / OCI Standards", status: "pending", note: "Not yet earned — complete 20 hours first" },
  { rule: "Must present certificate at PSI testing center", source: "PSI Candidate Handbook", status: "pending", note: "Certificate issued automatically upon completion" },
  { rule: "Annuity Best Interest Certification (4 hrs) — one-time", source: "Wis. Admin. Code Ins., eff. Oct 1 2022", status: "pending", note: "Required before selling annuities in Wisconsin" },
];

const fmtTime = (mins) => {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
};

function ComplianceTracker() {
  const [tab, setTab] = useState("tracker");
  const [activeSession, setActiveSession] = useState(false);
  const [sessionTimer, setSessionTimer] = useState(0);
  const [inactiveWarning, setInactiveWarning] = useState(false);

  useEffect(() => {
    let interval;
    if (activeSession) {
      interval = setInterval(() => {
        setSessionTimer(t => {
          if (t > 0 && t % 1800 === 0) setInactiveWarning(true);
          return t + 1;
        });
      }, 1000);
    }
    return () => clearInterval(interval);
  }, [activeSession]);

  const pct = Math.min(100, (totalSpent / totalRequired) * 100);
  const hoursLeft = ((totalRequired - totalSpent) / 60).toFixed(1);
  const wiUnit = initialProgress.find(p => p.id === 8);
  const wiReq = units.find(u => u.id === 8);
  const wiPct = Math.min(100, (wiUnit.spentMins / wiReq.requiredMins) * 100);

  const fmtTimer = (s) => `${String(Math.floor(s / 3600)).padStart(2, "0")}:${String(Math.floor((s % 3600) / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;

  return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: "#07090d", minHeight: "100vh", color: "#fff" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .tab-btn { cursor: pointer; border: none; transition: all 0.2s; }
        .unit-row { transition: background 0.15s; }
        .unit-row:hover { background: rgba(255,255,255,0.03); }
        .session-btn { cursor: pointer; border: none; transition: all 0.15s; }
        .session-btn:hover { opacity: 0.85; transform: scale(0.98); }
        .pulse { animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      `}</style>

      {/* Header */}
      <div style={{ padding: "40px 40px 28px", borderBottom: "1px solid rgba(255,255,255,0.06)", background: "linear-gradient(to right, #07090d, #0a0d12)" }}>
        <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: "#c084fc", letterSpacing: 3, textTransform: "uppercase", marginBottom: 12 }}>15 — Compliance Time Tracker</div>
        <h1 style={{ fontFamily: "'Syne'", fontSize: "clamp(28px,4vw,48px)", fontWeight: 800, letterSpacing: -2, marginBottom: 12 }}>
          20-Hour Seat Time<br /><span style={{ color: "#c084fc" }}>Compliance System</span>
        </h1>
        <p style={{ color: "rgba(255,255,255,0.4)", fontSize: 14, maxWidth: 560, lineHeight: 1.7 }}>
          Wisconsin OCI requires a minimum of 20 hours of approved pre-licensing education before sitting for the PSI exam. PassPro tracks every minute — and locks the exam simulation until compliance is met.
        </p>

        {/* Live session banner */}
        {activeSession && (
          <div style={{ marginTop: 20, background: "rgba(0,200,150,0.1)", border: "1px solid rgba(0,200,150,0.3)", borderRadius: 10, padding: "14px 20px", display: "flex", alignItems: "center", gap: 16 }}>
            <div className="pulse" style={{ width: 10, height: 10, borderRadius: "50%", background: "#00c896" }} />
            <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 13, color: "#00c896" }}>SESSION ACTIVE — {fmtTimer(sessionTimer)}</span>
            <span style={{ fontSize: 13, color: "rgba(255,255,255,0.5)" }}>Unit 3: Policy Provisions</span>
            <button className="session-btn" onClick={() => { setActiveSession(false); setSessionTimer(0); }} style={{ marginLeft: "auto", background: "rgba(248,113,113,0.15)", border: "1px solid rgba(248,113,113,0.3)", color: "#f87171", padding: "6px 14px", borderRadius: 8, fontSize: 12, fontFamily: "'DM Sans'" }}>End Session</button>
          </div>
        )}
        {inactiveWarning && (
          <div style={{ marginTop: 10, background: "rgba(245,158,11,0.1)", border: "1px solid rgba(245,158,11,0.3)", borderRadius: 8, padding: "10px 16px", fontSize: 13, color: "#f59e0b" }}>
            ⚠️ Inactivity detected — move your mouse to confirm you're still studying. Session will pause in 5 minutes.
            <button onClick={() => setInactiveWarning(false)} style={{ marginLeft: 12, background: "none", border: "none", color: "#f59e0b", cursor: "pointer", textDecoration: "underline", fontSize: 13 }}>I'm here</button>
          </div>
        )}
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 4, padding: "0 40px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
        {[["tracker", "Time Tracker"], ["sessions", "Session Log"], ["compliance", "Compliance Rules"]].map(([val, label]) => (
          <button key={val} className="tab-btn" onClick={() => setTab(val)} style={{ padding: "12px 18px", fontSize: 13, fontFamily: "'DM Sans'", background: "transparent", color: tab === val ? "#c084fc" : "rgba(255,255,255,0.35)", borderBottom: tab === val ? "2px solid #c084fc" : "2px solid transparent" }}>{label}</button>
        ))}
      </div>

      <div style={{ padding: "32px 40px" }}>

        {tab === "tracker" && (
          <div>
            {/* Big progress */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16, marginBottom: 32 }}>
              <div style={{ background: "#111118", border: "1px solid rgba(0,200,150,0.2)", borderRadius: 14, padding: 24, gridColumn: "span 1" }}>
                <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.3)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>Total Progress</div>
                <div style={{ fontFamily: "'Syne'", fontSize: 42, fontWeight: 800, color: "#00c896", lineHeight: 1 }}>{fmtTime(totalSpent)}</div>
                <div style={{ fontSize: 13, color: "rgba(255,255,255,0.35)", marginTop: 4 }}>of 20h 0m required</div>
                <div style={{ marginTop: 14, height: 8, background: "rgba(255,255,255,0.06)", borderRadius: 4, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${pct}%`, background: "linear-gradient(to right, #00c896, #00a07a)", borderRadius: 4, transition: "width 1s ease" }} />
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                  <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "#00c896" }}>{pct.toFixed(1)}% complete</span>
                  <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.3)" }}>{hoursLeft}h remaining</span>
                </div>
              </div>
              <div style={{ background: "#111118", border: "1px solid rgba(192,132,252,0.2)", borderRadius: 14, padding: 24 }}>
                <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.3)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>WI Laws & Ethics (8h req.)</div>
                <div style={{ fontFamily: "'Syne'", fontSize: 42, fontWeight: 800, color: "#c084fc", lineHeight: 1 }}>{fmtTime(wiUnit.spentMins)}</div>
                <div style={{ fontSize: 13, color: "rgba(255,255,255,0.35)", marginTop: 4 }}>of 3h 0m required</div>
                <div style={{ marginTop: 14, height: 8, background: "rgba(255,255,255,0.06)", borderRadius: 4, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${wiPct}%`, background: "#c084fc", borderRadius: 4 }} />
                </div>
                <div style={{ marginTop: 6, fontFamily: "'JetBrains Mono'", fontSize: 10, color: "#c084fc" }}>{wiPct.toFixed(0)}% of mandatory WI component</div>
              </div>
              <div style={{ background: "#111118", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 14, padding: 24, display: "flex", flexDirection: "column", justifyContent: "space-between" }}>
                <div>
                  <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.3)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>Exam Unlock</div>
                  <div style={{ fontFamily: "'Syne'", fontSize: 16, fontWeight: 700, color: "rgba(255,255,255,0.5)" }}>🔒 Locked</div>
                  <div style={{ fontSize: 13, color: "rgba(255,255,255,0.3)", marginTop: 6, lineHeight: 1.5 }}>Need {hoursLeft}h more to unlock Exam Simulation</div>
                </div>
                {!activeSession && (
                  <button className="session-btn" onClick={() => setActiveSession(true)} style={{ background: "#00c896", color: "#000", padding: "12px", borderRadius: 10, fontSize: 13, fontWeight: 600, fontFamily: "'DM Sans'", marginTop: 16 }}>▶ Start Study Session</button>
                )}
              </div>
            </div>

            {/* Per-unit breakdown */}
            <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.25)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>Time Per Unit</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {units.map((unit, i) => {
                const prog = initialProgress.find(p => p.id === unit.id);
                const unitPct = Math.min(100, (prog.spentMins / unit.requiredMins) * 100);
                const done = prog.spentMins >= unit.requiredMins;
                return (
                  <div key={i} className="unit-row" style={{ padding: "14px 16px", background: "rgba(255,255,255,0.02)", border: `1px solid ${done ? unit.color + "30" : "rgba(255,255,255,0.06)"}`, borderRadius: 10 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                      <div style={{ width: 8, height: 8, borderRadius: "50%", background: done ? unit.color : "rgba(255,255,255,0.15)", flexShrink: 0 }} />
                      <span style={{ fontSize: 13, flex: 1, color: done ? "#fff" : "rgba(255,255,255,0.6)" }}>{unit.title}</span>
                      {unit.type === "state" && <span style={{ background: "rgba(192,132,252,0.12)", color: "#c084fc", padding: "2px 8px", borderRadius: 8, fontSize: 9, fontFamily: "'JetBrains Mono'" }}>WI REQUIRED</span>}
                      {done && <span style={{ background: "rgba(0,200,150,0.12)", color: "#00c896", padding: "2px 8px", borderRadius: 8, fontSize: 9, fontFamily: "'JetBrains Mono'" }}>✓ COMPLETE</span>}
                      <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: done ? unit.color : "rgba(255,255,255,0.3)", minWidth: 80, textAlign: "right" }}>{fmtTime(prog.spentMins)} / {fmtTime(unit.requiredMins)}</span>
                    </div>
                    <div style={{ height: 4, background: "rgba(255,255,255,0.05)", borderRadius: 4, overflow: "hidden", marginLeft: 20 }}>
                      <div style={{ height: "100%", width: `${unitPct}%`, background: unit.color, borderRadius: 4, transition: "width 0.8s ease" }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab === "sessions" && (
          <div>
            <p style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", marginBottom: 24 }}>Every study session is logged, timestamped, and verified for OCI compliance reporting. Your certificate of completion is generated automatically when you hit 20 hours.</p>
            <div style={{ background: "#0d0d14", borderRadius: 12, overflow: "hidden", border: "1px solid rgba(255,255,255,0.06)" }}>
              <div style={{ display: "grid", gridTemplateColumns: "120px 80px 1fr 1fr 80px", padding: "10px 16px", background: "rgba(255,255,255,0.03)", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
                {["Date", "Time", "Unit", "Modules Covered", "Status"].map(h => (
                  <div key={h} style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.25)", letterSpacing: 2, textTransform: "uppercase" }}>{h}</div>
                ))}
              </div>
              {sessions.map((s, i) => (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "120px 80px 1fr 1fr 80px", padding: "13px 16px", borderBottom: i < sessions.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none", alignItems: "center" }}>
                  <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: "rgba(255,255,255,0.4)" }}>{s.date}</span>
                  <span style={{ fontFamily: "'Syne'", fontSize: 13, fontWeight: 700, color: "#00c896" }}>{s.duration}</span>
                  <span style={{ fontSize: 13, color: "rgba(255,255,255,0.6)" }}>{s.unit}</span>
                  <span style={{ fontSize: 12, color: "rgba(255,255,255,0.35)" }}>{s.modules.join(", ")}</span>
                  <span style={{ background: "rgba(0,200,150,0.1)", color: "#00c896", padding: "3px 8px", borderRadius: 8, fontSize: 10, fontFamily: "'JetBrains Mono'", width: "fit-content" }}>✓ {s.status}</span>
                </div>
              ))}
            </div>
            <div style={{ marginTop: 16, padding: "14px 18px", background: "rgba(192,132,252,0.06)", border: "1px solid rgba(192,132,252,0.15)", borderRadius: 10, fontSize: 13, color: "rgba(255,255,255,0.5)", lineHeight: 1.6 }}>
              🔒 All session records are immutable once verified. Inactivity periods are excluded from seat time automatically. Records retained for 3 years per OCI provider standards.
            </div>
          </div>
        )}

        {tab === "compliance" && (
          <div>
            <p style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", marginBottom: 24 }}>Wisconsin OCI compliance requirements tracked in real time. These rules are baked into the platform — students cannot advance past checkpoints without meeting them.</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {complianceRules.map((rule, i) => {
                const statusStyle = {
                  verified: { bg: "rgba(0,200,150,0.1)", color: "#00c896", label: "✓ MET" },
                  in_progress: { bg: "rgba(245,158,11,0.1)", color: "#f59e0b", label: "⏳ IN PROGRESS" },
                  active: { bg: "rgba(56,189,248,0.1)", color: "#38bdf8", label: "● ACTIVE" },
                  pending: { bg: "rgba(255,255,255,0.05)", color: "rgba(255,255,255,0.3)", label: "◯ PENDING" },
                }[rule.status];
                return (
                  <div key={i} style={{ background: "#111118", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: "18px 20px", display: "flex", alignItems: "flex-start", gap: 16 }}>
                    <div style={{ background: statusStyle.bg, color: statusStyle.color, padding: "4px 10px", borderRadius: 8, fontSize: 10, fontFamily: "'JetBrains Mono'", whiteSpace: "nowrap", marginTop: 2 }}>{statusStyle.label}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 4 }}>{rule.rule}</div>
                      <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.25)", marginBottom: 4 }}>{rule.source}</div>
                      <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)" }}>{rule.note}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ComplianceTracker));
</script>
</body>
</html>
