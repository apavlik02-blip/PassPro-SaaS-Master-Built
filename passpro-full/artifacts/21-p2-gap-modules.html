        duration: "10 min",
        content: `A **Modified Endowment Contract (MEC)** is a life insurance policy that has been overfunded — meaning too much premium has been paid relative to the death benefit. When a policy becomes a MEC, it loses some of the favorable tax treatment that normally applies to life insurance.

**Why MECs Exist**
In the 1980s, investors discovered they could overfund life insurance policies to exploit the tax-free growth of cash value. Congress responded with the Technical and Miscellaneous Revenue Act of 1988 (TAMRA), which created the MEC rules to prevent this abuse.

**The 7-Pay Test**
A policy becomes a MEC if cumulative premiums paid during the first 7 years exceed the **7-pay limit** — the amount of premium needed to pay the policy up in 7 level annual payments. The IRS sets this limit based on the policy's death benefit.

**Once a MEC, Always a MEC**
Once a policy fails the 7-pay test and becomes a MEC, it remains a MEC permanently — even if premiums stop or the cash value decreases. This is irreversible.

**Material Changes Reset the 7-Pay Clock**
If a policyholder makes a **material change** to the policy — such as increasing the death benefit — the 7-pay test restarts from the date of the change. This means a previously compliant policy could become a MEC after a material change.`,

**Signed Acknowledgment Required**
The policyowner and agent must both sign an acknowledgment that the illustration was received and that they understand non-guaranteed values are not guaranteed. A copy must be kept in the file.`,
        keyTerms: [
          { term: "In-Force Illustration", def: "Updated illustration showing current policy performance — must be provided within 25 days of policyholder request." },
          { term: "Signed Acknowledgment", def: "Both agent and policyowner must sign confirming receipt of illustration and understanding of non-guaranteed elements." },
          { term: "Non-Guaranteed Elements Disclosure", def: "Must be clearly labeled — cannot be represented as guaranteed or shown at values exceeding what the current rate produces." },
        ],
        wiNote: "Two Wisconsin-specific numbers to remember: (1) In-force illustrations must be provided within **25 calendar days** of request. (2) The signed illustration acknowledgment must be retained in the file. Both are tested on the WI exam.",
      },
    ],
    questions: [
      { q: "Under Wisconsin's life insurance illustration rules (s. Ins 2.17), which of the following policies is EXEMPT from the illustration requirements?", options: ["A $500,000 whole life policy", "A universal life policy", "A variable life insurance policy", "A $250,000 term life policy"], correct: 2, exp: "Variable life insurance is specifically exempt from s. Ins 2.17 illustration requirements, along with annuities, credit life, and policies with no illustrated death benefits exceeding $10,000. Variable products have separate prospectus requirements under federal securities law." },
      { q: "When using a life insurance illustration during a sales presentation, an agent is PROHIBITED from:", options: ["Showing both guaranteed and non-guaranteed values", "Providing the illustration before the sale is complete", "Representing that non-guaranteed values are guaranteed", "Providing an in-force illustration upon request"], correct: 2, exp: "Under s. Ins 2.17(5)(b), agents cannot state or imply that non-guaranteed amounts are guaranteed. This is one of the most serious illustration violations — misleading customers about which policy values are contractually guaranteed." },
      { q: "A policyowner requests an in-force illustration from their life insurer. Under Wisconsin's illustration rules, the insurer must provide it within:", options: ["10 calendar days", "25 calendar days", "30 calendar days", "60 calendar days"], correct: 1, exp: "Wisconsin's illustration rule (s. Ins 2.17) requires insurers to provide an in-force illustration within 25 calendar days of the policyowner's request. This allows policyowners to see how their policy is actually performing versus original projections." },
      { q: "A basic life insurance illustration used in Wisconsin must include which of the following?", options: ["The agent's commission on the policy", "The insurer's A.M. Best rating", "The generic name of the policy and form number", "A comparison to three competing policies"], correct: 2, exp: "Under s. Ins 2.17(5)(a), required illustration disclosures include the generic name of the policy, the insurer's product name if different, and the form number. Agent commissions and competitor comparisons are not required illustration elements." },
    ],
  },
};

const ModuleView = ({ mod }) => {
  const [lessonIdx, setLessonIdx] = useState(0);
  const [view, setView] = useState("lesson");
  const [answers, setAnswers] = useState({});
  const lesson = mod.lessons[lessonIdx];

  const fmt = (text) =>
    text.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#fff">$1</strong>');

  return (
    <div>
      {/* Lesson tabs */}
      <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
        {mod.lessons.map((l, i) => (
          <button key={i} onClick={() => { setLessonIdx(i); setView("lesson"); }} style={{ padding: "7px 14px", borderRadius: 20, fontSize: 12, cursor: "pointer", border: "none", background: view === "lesson" && lessonIdx === i ? `${mod.color}20` : "rgba(255,255,255,0.04)", color: view === "lesson" && lessonIdx === i ? mod.color : "rgba(255,255,255,0.4)", fontFamily: "'DM Sans', sans-serif" }}>
            {l.title}
          </button>
        ))}
        <button onClick={() => setView("quiz")} style={{ padding: "7px 14px", borderRadius: 20, fontSize: 12, cursor: "pointer", border: "none", background: view === "quiz" ? "rgba(245,158,11,0.15)" : "rgba(255,255,255,0.04)", color: view === "quiz" ? "#f59e0b" : "rgba(255,255,255,0.4)", fontFamily: "'DM Sans', sans-serif" }}>
          📝 Quiz ({mod.questions.length}Q)
        </button>
      </div>

      {view === "lesson" && lesson && (
        <div>
          <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
            <span style={{ background: `${mod.color}15`, color: mod.color, padding: "3px 10px", borderRadius: 8, fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>{mod.psiDomain}</span>
            <span style={{ background: "rgba(255,255,255,0.05)", color: "rgba(255,255,255,0.35)", padding: "3px 10px", borderRadius: 8, fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>⏱ {lesson.duration}</span>
          </div>
          <h2 style={{ fontFamily: "'Syne', sans-serif", fontSize: "clamp(17px,2.5vw,24px)", fontWeight: 800, letterSpacing: -0.5, marginBottom: 18 }}>{lesson.title}</h2>
          <div style={{ fontSize: 14, color: "rgba(255,255,255,0.65)", lineHeight: 1.85, marginBottom: 24 }} dangerouslySetInnerHTML={{ __html: `<p>${lesson.content.replace(/\n\n/g, '</p><p style="margin-top:13px">').replace(/\*\*(.*?)\*\*/g, '<strong style="color:#fff">$1</strong>')}</p>` }} />

          {lesson.keyTerms && (
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: "rgba(255,255,255,0.22)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>Key Terms</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 8 }}>
                {lesson.keyTerms.map((kt, i) => (
                  <div key={i} style={{ background: "rgba(255,255,255,0.03)", border: `1px solid ${mod.color}18`, borderLeft: `2px solid ${mod.color}60`, borderRadius: 8, padding: "11px 14px" }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: mod.color, marginBottom: 3 }}>{kt.term}</div>
                    <div style={{ fontSize: 12, color: "rgba(255,255,255,0.45)", lineHeight: 1.5 }}>{kt.def}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {lesson.wiNote && (
            <div style={{ padding: "13px 17px", background: "rgba(192,132,252,0.07)", border: "1px solid rgba(192,132,252,0.2)", borderLeft: "3px solid #c084fc", borderRadius: 9 }}>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: "#c084fc", letterSpacing: 2, marginBottom: 5 }}>🏛 WISCONSIN EXAM NOTE</div>
              <p style={{ fontSize: 13, color: "rgba(255,255,255,0.55)", lineHeight: 1.7 }}>{lesson.wiNote}</p>
            </div>
          )}
        </div>
      )}

      {view === "quiz" && (
        <div>
          <h2 style={{ fontFamily: "'Syne', sans-serif", fontSize: 20, fontWeight: 800, marginBottom: 20 }}>{mod.title} — Knowledge Check</h2>
          <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
            {mod.questions.map((q, qi) => (
              <div key={qi} style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: "18px 20px" }}>
                <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 14, fontWeight: 600, marginBottom: 14, lineHeight: 1.5 }}>Q{qi + 1}. {q.q}</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
                  {q.options.map((opt, oi) => {
                    const sel = answers[qi] === oi;
                    const correct = oi === q.correct;
                    const answered = answers[qi] !== undefined;
                    let bg = "rgba(255,255,255,0.03)", border = "rgba(255,255,255,0.07)", col = "rgba(255,255,255,0.65)";
                    if (answered && correct) { bg = "rgba(0,200,150,0.1)"; border = "rgba(0,200,150,0.4)"; col = "#fff"; }
                    if (answered && sel && !correct) { bg = "rgba(248,113,113,0.1)"; border = "rgba(248,113,113,0.4)"; col = "#fff"; }
                    return (
                      <div key={oi} onClick={() => !answered && setAnswers(p => ({ ...p, [qi]: oi }))} style={{ padding: "10px 14px", background: bg, border: `1px solid ${border}`, borderRadius: 8, fontSize: 13, color: col, cursor: answered ? "default" : "pointer", display: "flex", gap: 10, alignItems: "flex-start", transition: "all 0.12s" }}>
                        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, fontWeight: 700, color: answered ? (correct ? "#00c896" : sel ? "#f87171" : "rgba(255,255,255,0.2)") : "rgba(255,255,255,0.25)", flexShrink: 0, marginTop: 2 }}>{String.fromCharCode(65 + oi)}</span>
                        {opt}
                        {answered && correct && <span style={{ marginLeft: "auto", color: "#00c896", flexShrink: 0 }}>✓</span>}
                        {answered && sel && !correct && <span style={{ marginLeft: "auto", color: "#f87171", flexShrink: 0 }}>✗</span>}
                      </div>
                    );
                  })}
                </div>
                {answers[qi] !== undefined && (
                  <div style={{ marginTop: 11, padding: "10px 14px", background: answers[qi] === q.correct ? "rgba(0,200,150,0.07)" : "rgba(248,113,113,0.07)", border: `1px solid ${answers[qi] === q.correct ? "rgba(0,200,150,0.2)" : "rgba(248,113,113,0.2)"}`, borderRadius: 8, fontSize: 13, color: "rgba(255,255,255,0.6)", lineHeight: 1.6 }}>
                    {answers[qi] === q.correct ? "✓ Correct — " : "✗ Incorrect — "}{q.exp}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

            <div style={{ fontFamily: "'Syne'", fontSize: 20, fontWeight: 800, color: "#00c896" }}>OCI Ready</div>

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(P2GapModules));
</script>
</body>
