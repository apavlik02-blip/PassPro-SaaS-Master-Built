                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                        <span style={{ fontFamily: "'Syne'", fontSize: 15, fontWeight: 700 }}>{domain.domain}</span>
                        <span style={{ background: domain.type === "state" ? "rgba(192,132,252,0.12)" : "rgba(255,255,255,0.06)", color: domain.type === "state" ? "#c084fc" : "rgba(255,255,255,0.35)", padding: "2px 8px", borderRadius: 8, fontSize: 10, fontFamily: "'JetBrains Mono'" }}>{domain.type === "state" ? "WI STATE" : "GENERAL"}</span>
                      </div>
                      <div style={{ fontSize: 12, color: "rgba(255,255,255,0.3)" }}>{domain.subdomains.length} subdomains</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontFamily: "'Syne'", fontWeight: 800, fontSize: 22, color: domain.color }}>{domain.psiWeight}%</div>
                      <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.25)" }}>{domain.psiQuestions} questions</div>
                    </div>
                    <div style={{ display: "flex", gap: 4, marginLeft: 12 }}>
                      {domain.subdomains.map((s, si) => <div key={si} style={{ width: 8, height: 8, borderRadius: "50%", background: coverageStyle[s.coverage].dot }} />)}
                    </div>
                    <span style={{ color: "rgba(255,255,255,0.2)", marginLeft: 8 }}>{expanded === di ? "▲" : "▼"}</span>
                  </div>

                  {/* Subdomains */}
                  {expanded === di && (
                    <div style={{ padding: "8px 16px 16px", background: `${domain.color}05` }}>
                      {domain.subdomains.map((sub, si) => {
                        const cs = coverageStyle[sub.coverage];
                        return (
                          <div key={si} className="sub-row" style={{ animationDelay: `${si * 0.06}s`, background: "#0d0d16", border: `1px solid ${cs.border}`, borderLeft: `3px solid ${cs.dot}`, borderRadius: 10, padding: "16px 18px", marginTop: 8 }}>
                            <div style={{ display: "flex", alignItems: "flex-start", gap: 12, marginBottom: 10 }}>
                              <div>
                                <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
                                  <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: domain.color }}>{sub.id}</span>
                                  <span style={{ fontFamily: "'Syne'", fontSize: 14, fontWeight: 700 }}>{sub.title}</span>
                                </div>
                                <div style={{ background: cs.bg, border: `1px solid ${cs.border}`, color: cs.color, padding: "2px 10px", borderRadius: 8, fontSize: 10, fontFamily: "'JetBrains Mono'", display: "inline-block" }}>{cs.label}</div>
                              </div>
                              <div style={{ marginLeft: "auto", textAlign: "right", flexShrink: 0 }}>
                                <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.25)", marginBottom: 3 }}>PassPro Maps To</div>
                                <div style={{ fontSize: 12, color: sub.coverage === "missing" ? "#f87171" : "rgba(255,255,255,0.55)", maxWidth: 240 }}>{sub.passProModule}</div>
                              </div>
                            </div>

                            {sub.statutes.length > 0 && (
                              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
                                {sub.statutes.slice(0, 4).map((st, sti) => (
                                  <span key={sti} style={{ background: "rgba(192,132,252,0.08)", color: "#c084fc", padding: "2px 8px", borderRadius: 6, fontSize: 10, fontFamily: "'JetBrains Mono'" }}>{st}</span>
                                ))}
                                {sub.statutes.length > 4 && <span style={{ fontSize: 10, color: "rgba(255,255,255,0.2)", padding: "2px 4px" }}>+{sub.statutes.length - 4} more</span>}
                              </div>
                            )}

                            {sub.gaps.length > 0 && (
                              <div>
                                <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "#f87171", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>Content Gaps</div>
                                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                                  {sub.gaps.map((gap, gi) => (
                                    <div key={gi} style={{ display: "flex", gap: 8, fontSize: 12, color: "rgba(255,255,255,0.45)" }}>
                                      <span style={{ color: "#f87171", flexShrink: 0 }}>→</span> {gap}
                                    </div>
                                  ))}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* GAP REPORT */}
        {tab === "gaps" && (
          <div>
            <div style={{ padding: "16px 20px", background: "rgba(248,113,113,0.07)", border: "1px solid rgba(248,113,113,0.2)", borderLeft: "3px solid #f87171", borderRadius: 10, marginBottom: 24 }}>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "#f87171", letterSpacing: 2, marginBottom: 6 }}>COMPLIANCE WARNING</div>
              <p style={{ fontSize: 14, color: "rgba(255,255,255,0.6)", lineHeight: 1.7 }}>
                <strong style={{ color: "#fff" }}>{allGaps.length} content gaps</strong> identified against the official PSI Series 22-01 exam outline. These topics appear on the Wisconsin exam but are not currently covered in the PassPro curriculum. OCI approval requires full alignment to the PSI outline.
              </p>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {allGaps.map((g, i) => (
                <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 14, padding: "12px 16px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(248,113,113,0.1)", borderRadius: 9 }}>
                  <div style={{ width: 6, height: 6, borderRadius: "50%", background: g.color, flexShrink: 0, marginTop: 6 }} />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, color: "rgba(255,255,255,0.7)", marginBottom: 3 }}>{g.gap}</div>
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.25)", fontFamily: "'JetBrains Mono'" }}>{g.domain} → {g.subdomain}</div>
                  </div>
                  <div style={{ background: `${g.color}12`, color: g.color, padding: "2px 8px", borderRadius: 6, fontSize: 10, fontFamily: "'JetBrains Mono'", flexShrink: 0 }}>{g.priority}% of exam</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* PRIORITY FIXES */}
        {tab === "priority" && (
          <div>
            <p style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", marginBottom: 24, lineHeight: 1.7 }}>
              Gaps sorted by exam weight — fix these first to maximize coverage of the most-tested material.
            </p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {[
                { priority: "P1", label: "Beneficiary Designations (Domain 5.2)", why: "14% of exam — beneficiary rules are heavily tested. Revocable vs. irrevocable, spendthrift clause, common disaster, WI marital property implications.", effort: "Medium", color: "#f87171" },
                { priority: "P1", label: "Federal Regulation — FCRA & Fraud Statutes (Domain 1.3)", why: "Part of 35% Insurance Regulation domain. Fair Credit Reporting Act and 18 USC 1033/1034 appear on every WI exam.", effort: "Low", color: "#f87171" },
                { priority: "P1", label: "Types of Insurers & Agency Law (Domain 2.2–2.3)", why: "10% of exam. Stock vs. mutual, fraternal, reciprocal, admitted vs. nonadmitted, express/implied/apparent authority — all standard exam topics.", effort: "Low", color: "#f87171" },
                { priority: "P1", label: "Life Settlements & STOLI (Domain 3.3)", why: "Tested on WI exam under s. 632.69. Increasingly important topic — STOLI is a WI-specific concern.", effort: "Low", color: "#f87171" },
                { priority: "P2", label: "Modified Endowment Contracts (MECs) — 7-Pay Test (Domain 7)", why: "5% of exam but highly specific — MEC rules, 7-pay test, and distribution taxation are standard exam questions.", effort: "Low", color: "#f59e0b" },
                { priority: "P2", label: "WI Insurance Security Fund (ch. 646) (Domain 1.2)", why: "Part of 35% domain. ch. 646 is tested specifically — distinct from WLGA guaranty association.", effort: "Low", color: "#f59e0b" },
                { priority: "P2", label: "Field Underwriting & Policy Delivery (Domain 3.7–3.9)", why: "MIB, HIV consent rules (s. Ins 3.53), policy delivery procedures, and buyer's guide requirement are frequently tested.", effort: "Medium", color: "#f59e0b" },
                { priority: "P2", label: "Life Insurance Illustrations (s. Ins 2.14) (Domain 1.4)", why: "WI-specific illustration rules are part of the 35% regulation domain. Required disclosure standards must be covered.", effort: "Medium", color: "#f59e0b" },
                { priority: "P3", label: "Joint Life / First-to-Die Policies (Domain 4.4)", why: "12% domain. Joint life policies are a tested policy type that is currently missing.", effort: "Low", color: "#4ade80" },
                { priority: "P3", label: "Market Value Adjusted Annuities & GLB Riders (Domain 6.4)", why: "10% domain. MVA annuities and guaranteed living benefit riders are increasingly on exams.", effort: "Medium", color: "#4ade80" },
              ].map((fix, i) => (
                <div key={i} style={{ display: "flex", gap: 16, padding: "18px 20px", background: "#0d0d14", border: `1px solid ${fix.color}20`, borderRadius: 12, alignItems: "flex-start" }}>
                  <div style={{ background: `${fix.color}15`, border: `1px solid ${fix.color}30`, color: fix.color, padding: "4px 10px", borderRadius: 8, fontSize: 11, fontFamily: "'JetBrains Mono'", fontWeight: 600, flexShrink: 0, minWidth: 36, textAlign: "center" }}>{fix.priority}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: "'Syne'", fontSize: 14, fontWeight: 700, marginBottom: 5 }}>{fix.label}</div>
                    <div style={{ fontSize: 13, color: "rgba(255,255,255,0.45)", lineHeight: 1.6 }}>{fix.why}</div>
                  </div>
                  <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.07)", color: "rgba(255,255,255,0.4)", padding: "4px 10px", borderRadius: 8, fontSize: 11, fontFamily: "'JetBrains Mono'", flexShrink: 0 }}>Effort: {fix.effort}</div>
                </div>
              ))}
            </div>
            <div style={{ marginTop: 20, padding: "18px 22px", background: "rgba(0,200,150,0.06)", border: "1px solid rgba(0,200,150,0.15)", borderLeft: "3px solid #00c896", borderRadius: 10 }}>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "#00c896", letterSpacing: 2, marginBottom: 8 }}>CURRENT COVERAGE ESTIMATE</div>
              <p style={{ fontSize: 14, color: "rgba(255,255,255,0.6)", lineHeight: 1.7 }}>
                PassPro currently covers approximately <strong style={{ color: "#f59e0b" }}>68–72%</strong> of the PSI exam outline content. Addressing all P1 gaps brings coverage to an estimated <strong style={{ color: "#00c896" }}>88–92%</strong>. Full P1 + P2 coverage reaches <strong style={{ color: "#00c896" }}>95%+</strong>, which is the industry standard for OCI-approved providers.
              </p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(PSIAlignment));
</script>
</body>
</html>
