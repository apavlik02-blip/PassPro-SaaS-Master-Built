// ── CHART COMPONENTS ─────────────────────────────────────────────

const LineChart = ({ data, height = 120, color = "#00c896", showDots = true }) => {
  const values = data.map(d => d.pct);
  const min = Math.min(...values) - 5;
  const max = Math.max(...values) + 5;
  const range = max - min;
  const w = 100 / (values.length - 1);

  const points = values.map((v, i) => ({
    x: i * w,
    y: 100 - ((v - min) / range) * 100,
  }));

  const pathD = points.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ");
  const areaD = `${pathD} L ${points[points.length - 1].x} 100 L 0 100 Z`;

  return (
    <div style={{ position: "relative", height }}>
      <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ width: "100%", height: "100%", overflow: "visible" }}>
        <defs>
          <linearGradient id={`grad-${color.replace("#", "")}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.25" />
            <stop offset="100%" stopColor={color} stopOpacity="0.02" />
          </linearGradient>
        </defs>
        <path d={areaD} fill={`url(#grad-${color.replace("#", "")})`} />
        <path d={pathD} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
        {showDots && points.map((p, i) => (
          <circle key={i} cx={p.x} cy={p.y} r="1.8" fill={color} />
        ))}
      </svg>
      {/* X labels */}
      <div style={{ position: "absolute", bottom: -18, left: 0, right: 0, display: "flex", justifyContent: "space-between" }}>
        {data.map((d, i) => (
          <div key={i} style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.25)", textAlign: "center" }}>{d.week.slice(-2)}</div>
        ))}
      </div>
    </div>
  );
};

const BarChart = ({ data, height = 80, color = "#a78bfa" }) => {
  const max = Math.max(...data);
  return (
    <div style={{ height, display: "flex", alignItems: "flex-end", gap: 2 }}>
      {data.map((v, i) => {
        const pct = max > 0 ? (v / max) * 100 : 0;
        const isToday = i === data.length - 1;
        return (
          <div key={i} style={{ flex: 1, height: `${Math.max(pct, v > 0 ? 4 : 0)}%`, background: v === 0 ? "rgba(255,255,255,0.04)" : isToday ? color : `${color}70`, borderRadius: "3px 3px 0 0", transition: "height 0.8s ease", minHeight: v > 0 ? 2 : 0 }} />
        );
      })}
    </div>
  );
};

const RadialProgress = ({ pct, size = 80, stroke = 7, color = "#00c896", label }) => {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke} />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: "stroke-dashoffset 1.2s cubic-bezier(0.16,1,0.3,1)" }} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <div style={{ fontFamily: "'Syne'", fontWeight: 800, fontSize: size * 0.22, color, lineHeight: 1 }}>{pct}</div>

                <div style={{ fontFamily: "'Syne'", fontSize: 36, fontWeight: 800, color: "#00c896" }}>{Math.round(TOPICS.reduce((a, t) => a + t.mastery, 0) / TOPICS.length)}%</div>
              </div>
              <div style={{ width: 1, background: "rgba(255,255,255,0.07)" }} />
              {[
                { label: "Strong (80%+)", count: TOPICS.filter(t => t.mastery >= 80).length, color: "#00c896" },
                { label: "Good (60–79%)", count: TOPICS.filter(t => t.mastery >= 60 && t.mastery < 80).length, color: "#f59e0b" },
                { label: "Weak (<60%)", count: TOPICS.filter(t => t.mastery < 60).length, color: "#f87171" },
              ].map(s => (
                <div key={s.label} style={{ display: "flex", gap: 10, alignItems: "center" }}>
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: s.color }} />
                  <div>
                    <div style={{ fontFamily: "'Syne'", fontWeight: 800, fontSize: 20, color: s.color }}>{s.count}</div>
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)" }}>{s.label}</div>
                  </div>
                </div>
              ))}
              <div style={{ marginLeft: "auto", display: "flex", gap: 12 }}>
                {sortedTopics.slice(0, 5).map((t, i) => (
                  <RadialProgress key={i} pct={t.mastery} size={64} stroke={5} color={t.mastery >= 80 ? "#00c896" : t.mastery >= 60 ? "#f59e0b" : "#f87171"} label="%" />
                ))}
              </div>
            </div>

            {/* Topic table */}
            <div style={{ background: "#0d0d14", borderRadius: 14, overflow: "hidden", border: "1px solid rgba(255,255,255,0.06)" }}>
              <div style={{ display: "grid", gridTemplateColumns: "2fr 1.2fr 80px 80px 90px", padding: "10px 16px", background: "rgba(255,255,255,0.03)", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                {["Topic", "Mastery", "Attempts", "Trend", "Status"].map(h => (
                  <div key={h} style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.25)", letterSpacing: 2, textTransform: "uppercase" }}>{h}</div>
                ))}
              </div>
              {sortedTopics.map((t, i) => (
                <div key={i} className="topic-row" style={{ display: "grid", gridTemplateColumns: "2fr 1.2fr 80px 80px 90px", padding: "13px 16px", borderBottom: i < sortedTopics.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none", alignItems: "center" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 8, height: 8, borderRadius: "50%", background: t.color, flexShrink: 0 }} />
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 500, color: "rgba(255,255,255,0.8)" }}>{t.name}</div>
                      <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.25)", marginTop: 2 }}>Unit {t.unit}</div>
                    </div>
                  </div>
                  <div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                      <div style={{ fontFamily: "'Syne'", fontWeight: 800, fontSize: 16, color: t.mastery >= 80 ? "#00c896" : t.mastery >= 60 ? "#f59e0b" : "#f87171" }}>{t.mastery}%</div>
                    </div>
                    <div style={{ height: 4, width: 100, background: "rgba(255,255,255,0.05)", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${t.mastery}%`, background: t.mastery >= 80 ? "#00c896" : t.mastery >= 60 ? "#f59e0b" : "#f87171", borderRadius: 3 }} />
                    </div>
                  </div>
                  <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 12, color: "rgba(255,255,255,0.5)" }}>{t.attempts}</div>
                  <div style={{ color: "#00c896", fontSize: 12, fontFamily: "'JetBrains Mono'" }}>+{t.trend}%</div>
                  <div>
                    <span style={{ background: t.mastery >= 80 ? "rgba(0,200,150,0.1)" : t.mastery >= 60 ? "rgba(245,158,11,0.1)" : "rgba(248,113,113,0.1)", color: t.mastery >= 80 ? "#00c896" : t.mastery >= 60 ? "#f59e0b" : "#f87171", padding: "3px 9px", borderRadius: 7, fontSize: 10, fontFamily: "'JetBrains Mono'", border: `1px solid ${t.mastery >= 80 ? "rgba(0,200,150,0.2)" : t.mastery >= 60 ? "rgba(245,158,11,0.2)" : "rgba(248,113,113,0.2)"}` }}>
                      {t.mastery >= 80 ? "Strong" : t.mastery >= 60 ? "Good" : "Weak"}
                    </span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── STUDY SESSIONS ── */}
        {tab === "sessions" && (
          <div className="fade">
            <h2 style={{ fontFamily: "'Syne'", fontSize: 20, fontWeight: 800, marginBottom: 6 }}>Study Sessions</h2>
            <p style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", marginBottom: 24 }}>Every session logged for OCI compliance and personal tracking.</p>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 24 }}>
              {[
                { label: "Total Sessions", value: "18", color: "#a78bfa" },
                { label: "Total Study Time", value: `${Math.floor(totalMins / 60)}h ${totalMins % 60}m`, color: "#00c896" },
                { label: "Avg Session", value: `${avgMins} min`, color: "#38bdf8" },
                { label: "OCI Seat Time", value: `${STUDENT.hoursLogged}h / 20h`, color: "#c084fc" },
              ].map((s, i) => (
                <div key={i} className="stat-card" style={{ background: `${s.color}0c`, border: `1px solid ${s.color}22`, borderRadius: 12, padding: "16px" }}>
                  <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.25)", letterSpacing: 2, marginBottom: 8 }}>{s.label}</div>
                  <div style={{ fontFamily: "'Syne'", fontSize: 22, fontWeight: 800, color: s.color }}>{s.value}</div>
                </div>
              ))}
            </div>

            <div style={{ background: "#0d0d14", borderRadius: 14, overflow: "hidden", border: "1px solid rgba(255,255,255,0.06)" }}>
              <div style={{ display: "grid", gridTemplateColumns: "90px 80px 1fr 70px 120px", padding: "10px 16px", background: "rgba(255,255,255,0.03)", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                {["Date", "Duration", "Unit", "Score", "Type"].map(h => (
                  <div key={h} style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.25)", letterSpacing: 2, textTransform: "uppercase" }}>{h}</div>
                ))}
              </div>
              {SESSIONS.map((s, i) => (
                <div key={i} className="topic-row" style={{ display: "grid", gridTemplateColumns: "90px 80px 1fr 70px 120px", padding: "13px 16px", borderBottom: i < SESSIONS.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none", alignItems: "center" }}>
                  <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: "rgba(255,255,255,0.4)" }}>{s.date}</div>
                  <div style={{ fontFamily: "'Syne'", fontWeight: 700, color: "#a78bfa" }}>{s.duration}m</div>
                  <div style={{ fontSize: 13, color: "rgba(255,255,255,0.7)" }}>{s.unit}</div>
                  <div style={{ fontFamily: "'Syne'", fontWeight: 700, color: s.score ? (s.score >= 80 ? "#00c896" : s.score >= 70 ? "#f59e0b" : "#f87171") : "rgba(255,255,255,0.25)" }}>{s.score ? `${s.score}%` : "—"}</div>
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", fontFamily: "'JetBrains Mono'" }}>{s.type}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── PREDICTIONS ── */}
        {tab === "predictions" && (
          <div className="fade">
            <h2 style={{ fontFamily: "'Syne'", fontSize: 20, fontWeight: 800, marginBottom: 6 }}>AI Predictions</h2>
            <p style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", marginBottom: 24 }}>Based on your study trajectory, session frequency, and topic mastery trends.</p>

            {/* Big prediction cards */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14, marginBottom: 24 }}>
              {[
                { label: "Pass Likelihood", value: `${PREDICTIONS.passLikelihood}%`, sub: "if current pace continues", color: "#00c896", icon: "🎯", detail: "Based on your 8-week readiness trajectory and topic mastery distribution" },
                { label: "Projected Readiness at Exam", value: `${PREDICTIONS.projectedAtExam}%`, sub: `on ${STUDENT.examDate}`, color: "#38bdf8", icon: "📈", detail: "Extrapolating your +4.1% weekly improvement rate over 41 remaining days" },
                { label: "Days to 80% Ready", value: `${PREDICTIONS.daysToTarget80}`, sub: "at current pace", color: "#f59e0b", icon: "⏰", detail: "80% readiness is the recommended threshold before booking your exam" },
              ].map((p, i) => (
                <div key={i} style={{ background: `${p.color}08`, border: `1px solid ${p.color}25`, borderRadius: 16, padding: "22px 20px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                    <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.25)", letterSpacing: 2 }}>{p.label}</div>
                    <span style={{ fontSize: 20 }}>{p.icon}</span>
                  </div>
                  <div style={{ fontFamily: "'Syne'", fontSize: 40, fontWeight: 800, color: p.color, lineHeight: 1, marginBottom: 4 }}>{p.value}</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.35)", marginBottom: 12 }}>{p.sub}</div>
                  <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", lineHeight: 1.6, padding: "10px 12px", background: "rgba(255,255,255,0.03)", borderRadius: 8 }}>{p.detail}</div>
                </div>
              ))}
            </div>

            {/* Personalized recommendations */}
            <div style={{ background: "rgba(0,200,150,0.05)", border: "1px solid rgba(0,200,150,0.15)", borderLeft: "3px solid #00c896", borderRadius: 12, padding: "20px 24px", marginBottom: 16 }}>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "#00c896", letterSpacing: 2, marginBottom: 12 }}>🤖 AI COACH RECOMMENDATIONS</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {[
                  { icon: "🔴", text: `Prioritize WI Security Fund — you're at 38% mastery and it's part of the 35% Insurance Regulation domain. One focused 30-minute session could add +8pts to your score.` },
                  { icon: "🟡", text: `Annuities (45% mastery) are on 10% of the exam. You've been improving (+7% trend) — keep the momentum with daily flashcard reviews.` },
                  { icon: "🟢", text: `Life Insurance Types (92% mastery) — you've mastered this. Shift study time away and invest it in your weak areas.` },
                  { icon: "⏱", text: `Your sessions are averaging 38 minutes. To hit 80% readiness by ${new Date(Date.now() + PREDICTIONS.daysToTarget80 * 86400000).toLocaleDateString("en-US", { month: "short", day: "numeric" })}, aim for 45–50 minutes daily.` },
                ].map((r, i) => (
                  <div key={i} style={{ display: "flex", gap: 10, padding: "10px 14px", background: "rgba(255,255,255,0.02)", borderRadius: 8, fontSize: 13, color: "rgba(255,255,255,0.65)", lineHeight: 1.6 }}>
                    <span style={{ flexShrink: 0 }}>{r.icon}</span>
                    {r.text}
                  </div>
                ))}
              </div>
            </div>

            {/* Weakest vs strongest */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
              <div style={{ background: "rgba(248,113,113,0.06)", border: "1px solid rgba(248,113,113,0.15)", borderRadius: 12, padding: "18px 20px" }}>
                <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "#f87171", letterSpacing: 2, marginBottom: 8 }}>BIGGEST RISK AREAS</div>
                {TOPICS.filter(t => t.mastery < 60).map((t, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                    <div style={{ fontFamily: "'Syne'", fontWeight: 800, fontSize: 16, color: "#f87171", minWidth: 36 }}>{t.mastery}%</div>
                    <div style={{ fontSize: 12, color: "rgba(255,255,255,0.6)" }}>{t.name}</div>
                    <div style={{ marginLeft: "auto", fontSize: 11, color: "#00c896", fontFamily: "'JetBrains Mono'" }}>+{t.trend}%</div>
                  </div>
                ))}
              </div>
              <div style={{ background: "rgba(0,200,150,0.06)", border: "1px solid rgba(0,200,150,0.15)", borderRadius: 12, padding: "18px 20px" }}>
                <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "#00c896", letterSpacing: 2, marginBottom: 8 }}>STRENGTHS TO MAINTAIN</div>
                {TOPICS.filter(t => t.mastery >= 80).map((t, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                    <div style={{ fontFamily: "'Syne'", fontWeight: 800, fontSize: 16, color: "#00c896", minWidth: 36 }}>{t.mastery}%</div>
                    <div style={{ fontSize: 12, color: "rgba(255,255,255,0.6)" }}>{t.name}</div>
                    <span style={{ marginLeft: "auto", color: "#00c896", fontSize: 12 }}>✓</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(AnalyticsDashboard));
</script>
</body>
</html>
