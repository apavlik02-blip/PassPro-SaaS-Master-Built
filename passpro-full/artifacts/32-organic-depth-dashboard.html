<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassPro — 32-organic-depth-dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #06060c; } #root { min-height: 100vh; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const STUDENT = {
  name: "Amanda",
  state: "WI",
  examDate: "Jul 15, 2026",
  daysUntil: 41,
  readiness: 74,
  hoursLogged: 8.5,
  streakDays: 7,
  xp: 2840,
  level: "Silver II",
  plan: "Pro",
  weakTopics: ["Annuities", "Tax Treatment", "WI Security Fund"],
  currentModule: "4.1 — Annuity Fundamentals",
};

const MODULES = [
  { id: 1, title: "Foundations", pct: 100, color: "#7ecfa0" },
  { id: 2, title: "Policy Types", pct: 100, color: "#7ecfa0" },
  { id: 3, title: "Provisions & Riders", pct: 62, color: "#c8a96e" },
  { id: 4, title: "Annuities", pct: 30, color: "#e07b6a" },
  { id: 5, title: "Underwriting", pct: 0, color: "#6b7280" },
  { id: 6, title: "Planning", pct: 0, color: "#6b7280" },
  { id: 7, title: "Tax Treatment", pct: 0, color: "#6b7280" },
  { id: 8, title: "WI Regulations", pct: 35, color: "#a78bfa" },
];

const ACTIVITY = [
  { icon: "📝", text: "Passed Module 3 Quiz — 84%", time: "2h ago", color: "#7ecfa0" },
  { icon: "🔥", text: "7-day streak milestone", time: "Today", color: "#c8a96e" },
  { icon: "🎓", text: "AI Coach session — Annuities", time: "Yesterday", color: "#a78bfa" },
  { icon: "🃏", text: "24 flashcards reviewed", time: "Yesterday", color: "#60cfe8" },
];

const NAV_ITEMS = [
  { id: "dashboard", icon: "◈", label: "Dashboard" },
  { id: "study", icon: "◎", label: "Study" },
  { id: "practice", icon: "◇", label: "Practice" },
  { id: "flashcards", icon: "⬡", label: "Flashcards" },
  { id: "coach", icon: "✦", label: "AI Coach" },
  { id: "progress", icon: "◉", label: "Progress" },
  { id: "compliance", icon: "⬣", label: "Compliance" },
];

function OrganicDashboard() {
  const [activePage, setActivePage] = useState("dashboard");
  const [coachOpen, setCoachOpen] = useState(false);
  const [coachInput, setCoachInput] = useState("");
  const [messages, setMessages] = useState([
    { role: "assistant", text: `Hey ${STUDENT.name} 🌿 You're on a ${STUDENT.streakDays}-day streak — that consistency is everything. Annuities is your biggest gap right now. Want to tackle it together, or is there something else on your mind?` }
  ]);
  const [sending, setSending] = useState(false);

  const sendMessage = async () => {
    if (!coachInput.trim() || sending) return;
    const userText = coachInput.trim();
    setCoachInput("");
    setMessages(prev => [...prev, { role: "user", text: userText }]);
    setSending(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: `You are Coach, a warm and expert Wisconsin Life Insurance exam tutor inside PassPro. The student is ${STUDENT.name}, 41 days from her WI life insurance exam (PSI Series 22-01, 100 questions, 70% to pass). She's at 74% readiness. Weak areas: Annuities, Tax Treatment, WI Security Fund. Keep responses under 80 words. Warm, direct, human tone. End with a question or offer to quiz.`,
          messages: [...messages.filter(m => m.role === "user" || m.role === "assistant").map(m => ({ role: m.role, content: m.text })), { role: "user", content: userText }],
        }),
      });
      const data = await res.json();
      const reply = data.content?.map(b => b.text || "").join("") || "Let me think on that...";
      setMessages(prev => [...prev, { role: "assistant", text: reply }]);
    } catch {
      setMessages(prev => [...prev, { role: "assistant", text: "Connection hiccup — try again in a moment." }]);
    }
    setSending(false);
  };

  return (
    <div style={{ fontFamily: "'Instrument Sans', system-ui, sans-serif", background: "#14120e", minHeight: "100vh", color: "#f0e8d8", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .nav-item { cursor: pointer; border: none; background: none; transition: all 0.2s; width: 100%; text-align: left; }
        .nav-item:hover { opacity: 0.85; }
        .card { transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), box-shadow 0.25s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 48px rgba(0,0,0,0.35); }
        .orb1 { animation: drift1 9s ease-in-out infinite; }
        .orb2 { animation: drift2 12s ease-in-out infinite; }
        .orb3 { animation: drift3 7s ease-in-out infinite; }
        @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-15px)} }
        @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-15px,20px)} }
        @keyframes drift3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(10px,12px)} }
        .module-bar { transition: width 1.2s cubic-bezier(0.16,1,0.3,1); }
        .coach-btn { cursor: pointer; border: none; transition: all 0.2s; }
        .coach-btn:hover { transform: scale(1.05); }
        .send-btn { cursor: pointer; border: none; transition: all 0.15s; }
        .send-btn:hover:not(:disabled) { transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        textarea { resize: none; outline: none; font-family: inherit; }
        textarea::placeholder { color: rgba(240,232,216,0.25); }
        .action-chip { cursor: pointer; transition: all 0.15s; }
        .action-chip:hover { background: rgba(126,207,160,0.15) !important; color: #7ecfa0 !important; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16,1,0.3,1) both; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
        .streak-dot { transition: transform 0.15s; }
        .streak-dot:hover { transform: scale(1.3); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(240,232,216,0.1); border-radius: 4px; }
        input::placeholder { color: rgba(240,232,216,0.2); }
      `}</style>

      {/* ── AMBIENT BACKGROUND ORBS ── */}
      <div style={{ position: "fixed", inset: 0, overflow: "hidden", pointerEvents: "none", zIndex: 0 }}>
        <div className="orb1" style={{ position: "absolute", width: 600, height: 600, borderRadius: "50%", background: "radial-gradient(circle, rgba(180,130,50,0.12) 0%, transparent 65%)", top: -180, right: -100 }} />
        <div className="orb2" style={{ position: "absolute", width: 500, height: 500, borderRadius: "50%", background: "radial-gradient(circle, rgba(0,150,100,0.10) 0%, transparent 65%)", bottom: -120, left: -100 }} />
        <div className="orb3" style={{ position: "absolute", width: 300, height: 300, borderRadius: "50%", background: "radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 65%)", top: "40%", left: "40%" }} />
        {/* Subtle grain */}
        <div style={{ position: "absolute", inset: 0, opacity: 0.025, backgroundImage: "url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\")" }} />
      </div>

      {/* ── TOPBAR ── */}
      <div style={{ position: "relative", zIndex: 10, height: 56, background: "rgba(20,18,14,0.85)", backdropFilter: "blur(20px)", borderBottom: "1px solid rgba(240,232,216,0.07)", display: "flex", alignItems: "center", padding: "0 24px", gap: 14, flexShrink: 0 }}>
        <div style={{ fontFamily: "'Instrument Serif'", fontSize: 20, color: "#f0e8d8", letterSpacing: -0.5 }}>Pass<em style={{ color: "#7ecfa0" }}>Pro</em></div>
        <div style={{ width: 1, height: 16, background: "rgba(240,232,216,0.12)" }} />
        <div style={{ fontSize: 12, color: "rgba(240,232,216,0.4)", fontWeight: 500 }}>Wisconsin · Life Insurance</div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8, alignItems: "center" }}>
          {/* Exam countdown */}
          <div style={{ background: "rgba(200,169,110,0.1)", border: "1px solid rgba(200,169,110,0.2)", borderRadius: 20, padding: "4px 12px", fontSize: 12, color: "#c8a96e", display: "flex", gap: 6, alignItems: "center" }}>
            <span>📅</span><span>{STUDENT.daysUntil} days to exam</span>
          </div>
          <div style={{ background: "rgba(240,180,0,0.1)", border: "1px solid rgba(240,180,0,0.15)", borderRadius: 20, padding: "4px 12px", fontSize: 12, color: "#f0b400" }}>🔥 {STUDENT.streakDays}</div>
          {/* Avatar */}
          <div style={{ width: 32, height: 32, borderRadius: "50%", background: "linear-gradient(135deg, #7ecfa0, #5aaa7c)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Instrument Serif'", fontSize: 14, color: "#0a1a10", cursor: "pointer" }}>A</div>
        </div>
      </div>

      <div style={{ position: "relative", zIndex: 1, flex: 1, display: "flex", overflow: "hidden" }}>

        {/* ── SIDEBAR ── */}
        <div style={{ width: 200, background: "rgba(16,14,10,0.7)", backdropFilter: "blur(16px)", borderRight: "1px solid rgba(240,232,216,0.06)", padding: "20px 12px", display: "flex", flexDirection: "column", flexShrink: 0 }}>
          {/* Student card */}
          <div style={{ padding: "12px 14px", background: "rgba(126,207,160,0.07)", border: "1px solid rgba(126,207,160,0.14)", borderRadius: 14, marginBottom: 24 }}>
            <div style={{ fontFamily: "'Instrument Serif'", fontSize: 15, color: "#f0e8d8", marginBottom: 2 }}>{STUDENT.name}</div>
            <div style={{ fontSize: 11, color: "rgba(240,232,216,0.4)", marginBottom: 10 }}>{STUDENT.level} · {STUDENT.xp.toLocaleString()} XP</div>
            <div style={{ height: 3, background: "rgba(255,255,255,0.08)", borderRadius: 10, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${STUDENT.readiness}%`, background: "linear-gradient(to right, #7ecfa0, #5aaa7c)", borderRadius: 10 }} />
            </div>
            <div style={{ fontSize: 10, color: "rgba(126,207,160,0.6)", marginTop: 3 }}>{STUDENT.readiness}% exam ready</div>
          </div>

          {/* Nav */}
          <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
            {NAV_ITEMS.map(item => (
              <button key={item.id} className="nav-item" onClick={() => setActivePage(item.id)} style={{ padding: "9px 12px", borderRadius: 10, background: activePage === item.id ? "rgba(126,207,160,0.1)" : "transparent", color: activePage === item.id ? "#7ecfa0" : "rgba(240,232,216,0.4)", display: "flex", alignItems: "center", gap: 10, fontSize: 13, fontWeight: activePage === item.id ? 600 : 400, border: "none" }}>
                <span style={{ fontSize: 14, opacity: activePage === item.id ? 1 : 0.7 }}>{item.icon}</span>
                {item.label}
              </button>
            ))}
          </div>

          {/* OCI compliance */}
          <div style={{ marginTop: "auto", padding: "12px 14px", background: "rgba(167,139,250,0.07)", border: "1px solid rgba(167,139,250,0.12)", borderRadius: 12 }}>
            <div style={{ fontSize: 10, color: "rgba(167,139,250,0.6)", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 6 }}>OCI Compliance</div>
            <div style={{ height: 4, background: "rgba(255,255,255,0.07)", borderRadius: 10, overflow: "hidden", marginBottom: 4 }}>
              <div style={{ height: "100%", width: "42.5%", background: "linear-gradient(to right, #a78bfa, #7c5cbf)", borderRadius: 10 }} />
            </div>
            <div style={{ fontSize: 10, color: "rgba(240,232,216,0.3)" }}>8.5h / 20h logged</div>
          </div>
        </div>

        {/* ── MAIN CONTENT ── */}
        <div className="fade-in" key={activePage} style={{ flex: 1, overflowY: "auto", padding: "32px 36px" }}>

          {/* DASHBOARD */}
          {activePage === "dashboard" && (
            <div style={{ maxWidth: 960, margin: "0 auto" }}>
              {/* Hero greeting */}
              <div style={{ marginBottom: 32 }}>
                <div style={{ fontSize: 12, color: "rgba(126,207,160,0.6)", letterSpacing: 2, textTransform: "uppercase", fontWeight: 600, marginBottom: 8 }}>Welcome back</div>
                <div style={{ fontFamily: "'Instrument Serif'", fontSize: "clamp(32px,5vw,52px)", color: "#f0e8d8", lineHeight: 1.05, marginBottom: 10, letterSpacing: -1 }}>
                  Good morning,<br /><em style={{ color: "#7ecfa0" }}>{STUDENT.name}.</em>
                </div>
                <p style={{ fontSize: 15, color: "rgba(240,232,216,0.45)", maxWidth: 460, lineHeight: 1.7, marginBottom: 20 }}>
                  You're {STUDENT.daysUntil} days from your Wisconsin exam with a {STUDENT.streakDays}-day streak. Your AI Coach has a personalized drill ready for Annuities.
                </p>
                <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                  <button onClick={() => setActivePage("study")} style={{ background: "#7ecfa0", color: "#0a1a10", border: "none", padding: "11px 24px", borderRadius: 50, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "'Instrument Sans'", letterSpacing: 0.3 }}>Continue Studying →</button>
                  <button onClick={() => setCoachOpen(true)} style={{ background: "rgba(126,207,160,0.1)", color: "#7ecfa0", border: "1px solid rgba(126,207,160,0.25)", padding: "11px 22px", borderRadius: 50, fontSize: 13, cursor: "pointer", fontFamily: "'Instrument Sans'" }}>Open AI Coach ✦</button>
                </div>
              </div>

              {/* Stat row */}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 24 }}>
                {[
                  { label: "Readiness", value: `${STUDENT.readiness}%`, sub: "+33pts since start", color: "#7ecfa0", icon: "🎯" },
                  { label: "Study Streak", value: `${STUDENT.streakDays} days`, sub: "🔥 keep it going", color: "#c8a96e", icon: "⚡" },
                  { label: "XP Earned", value: STUDENT.xp.toLocaleString(), sub: STUDENT.level, color: "#a78bfa", icon: "✦" },
                  { label: "Hours Logged", value: `${STUDENT.hoursLogged}h`, sub: "of 20h required", color: "#60cfe8", icon: "⏱" },
                ].map((s, i) => (
                  <div key={i} className="card" style={{ background: "rgba(240,232,216,0.04)", border: `1px solid ${s.color}20`, borderRadius: 18, padding: "18px 16px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                      <div style={{ fontSize: 10, color: "rgba(240,232,216,0.3)", letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 600 }}>{s.label}</div>
                      <span style={{ fontSize: 16 }}>{s.icon}</span>
                    </div>
                    <div style={{ fontFamily: "'Instrument Serif'", fontSize: 28, color: s.color, lineHeight: 1, marginBottom: 4 }}>{s.value}</div>
                    <div style={{ fontSize: 11, color: "rgba(240,232,216,0.3)" }}>{s.sub}</div>
                  </div>
                ))}
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 16, marginBottom: 20 }}>
                {/* Curriculum */}
                <div className="card" style={{ background: "rgba(240,232,216,0.03)", border: "1px solid rgba(240,232,216,0.08)", borderRadius: 20, padding: "24px" }}>
                  <div style={{ fontSize: 11, color: "rgba(240,232,216,0.35)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 18, fontWeight: 600 }}>Curriculum Progress</div>
                  {MODULES.map((m, i) => (
                    <div key={i} style={{ marginBottom: 12 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 5 }}>
                        <span style={{ color: m.pct > 0 ? "rgba(240,232,216,0.75)" : "rgba(240,232,216,0.3)", fontWeight: m.pct > 0 ? 500 : 400 }}>Unit {m.id} — {m.title}</span>
                        <span style={{ color: m.pct === 100 ? m.color : m.pct > 0 ? m.color : "rgba(240,232,216,0.2)", fontWeight: 600, fontSize: 12 }}>{m.pct === 100 ? "✓ Done" : m.pct > 0 ? `${m.pct}%` : "—"}</span>
                      </div>
                      <div style={{ height: 3, background: "rgba(255,255,255,0.06)", borderRadius: 10, overflow: "hidden" }}>
                        <div className="module-bar" style={{ height: "100%", width: `${m.pct}%`, background: m.color, borderRadius: 10, opacity: 0.85 }} />
                      </div>
                    </div>
                  ))}
                </div>

                {/* Right column */}
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  {/* Exam countdown */}
                  <div className="card" style={{ background: "rgba(200,169,110,0.07)", border: "1px solid rgba(200,169,110,0.15)", borderRadius: 18, padding: "20px" }}>
                    <div style={{ fontSize: 10, color: "rgba(200,169,110,0.55)", letterSpacing: 2, textTransform: "uppercase", fontWeight: 600, marginBottom: 8 }}>Exam Countdown</div>
                    <div style={{ fontFamily: "'Instrument Serif'", fontSize: 44, color: "#c8a96e", lineHeight: 1, marginBottom: 4 }}>{STUDENT.daysUntil}</div>
                    <div style={{ fontSize: 12, color: "rgba(240,232,216,0.4)", marginBottom: 12 }}>days · {STUDENT.examDate}</div>
                    <div style={{ height: 4, background: "rgba(255,255,255,0.06)", borderRadius: 10, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: "62%", background: "linear-gradient(to right, #c8a96e, #e0c080)", borderRadius: 10 }} />
                    </div>
                    <div style={{ fontSize: 10, color: "rgba(200,169,110,0.4)", marginTop: 4 }}>8.5h / 20h OCI seat time</div>
                  </div>

                  {/* Weak areas */}
                  <div className="card" style={{ background: "rgba(224,123,106,0.06)", border: "1px solid rgba(224,123,106,0.12)", borderRadius: 18, padding: "18px", flex: 1 }}>
                    <div style={{ fontSize: 10, color: "rgba(224,123,106,0.55)", letterSpacing: 2, textTransform: "uppercase", fontWeight: 600, marginBottom: 10 }}>Weak Areas</div>
                    {STUDENT.weakTopics.map((t, i) => (
                      <div key={i} onClick={() => setCoachOpen(true)} className="action-chip" style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", background: "rgba(224,123,106,0.07)", border: "1px solid rgba(224,123,106,0.1)", borderRadius: 10, marginBottom: 7, cursor: "pointer" }}>
                        <div style={{ width: 5, height: 5, borderRadius: "50%", background: "#e07b6a", flexShrink: 0 }} />
                        <span style={{ fontSize: 12, color: "rgba(240,232,216,0.65)", flex: 1 }}>{t}</span>
                        <span style={{ fontSize: 10, color: "#e07b6a" }}>drill →</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Activity feed */}
              <div className="card" style={{ background: "rgba(240,232,216,0.03)", border: "1px solid rgba(240,232,216,0.07)", borderRadius: 18, padding: "20px 22px" }}>
                <div style={{ fontSize: 11, color: "rgba(240,232,216,0.3)", letterSpacing: 2, textTransform: "uppercase", fontWeight: 600, marginBottom: 14 }}>Recent Activity</div>
                {ACTIVITY.map((a, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "9px 0", borderBottom: i < ACTIVITY.length - 1 ? "1px solid rgba(240,232,216,0.05)" : "none" }}>
                    <span style={{ fontSize: 16 }}>{a.icon}</span>
                    <span style={{ fontSize: 13, color: "rgba(240,232,216,0.6)", flex: 1 }}>{a.text}</span>
                    <span style={{ fontSize: 11, color: "rgba(240,232,216,0.2)" }}>{a.time}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* STUDY */}
          {activePage === "study" && (
            <div style={{ maxWidth: 800, margin: "0 auto" }}>
              <div style={{ fontFamily: "'Instrument Serif'", fontSize: 36, marginBottom: 6, letterSpacing: -1 }}>Study <em style={{ color: "#7ecfa0" }}>Modules</em></div>
              <p style={{ fontSize: 14, color: "rgba(240,232,216,0.4)", marginBottom: 28 }}>Wisconsin Life Insurance · 8 units · 23h estimated</p>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {MODULES.map((m, i) => (
                  <div key={i} className="card" style={{ background: `${m.color}09`, border: `1px solid ${m.color}20`, borderRadius: 16, padding: "18px 22px", display: "flex", alignItems: "center", gap: 16, cursor: "pointer" }}>
                    <div style={{ width: 40, height: 40, borderRadius: 12, background: `${m.color}18`, border: `1.5px solid ${m.color}30`, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Instrument Serif'", fontSize: 16, color: m.color, flexShrink: 0 }}>{i + 1}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 600, fontSize: 14, color: "rgba(240,232,216,0.85)", marginBottom: 6 }}>{m.title}</div>
                      <div style={{ height: 3, background: "rgba(255,255,255,0.06)", borderRadius: 10, overflow: "hidden", maxWidth: 200 }}>
                        <div style={{ height: "100%", width: `${m.pct}%`, background: m.color, borderRadius: 10 }} />
                      </div>
                    </div>
                    <div style={{ fontFamily: "'Instrument Serif'", fontSize: 18, color: m.pct === 100 ? m.color : "rgba(240,232,216,0.4)" }}>{m.pct === 100 ? "✓" : `${m.pct}%`}</div>
                    {i === 2 && <div style={{ background: "rgba(200,169,110,0.15)", color: "#c8a96e", padding: "3px 10px", borderRadius: 20, fontSize: 10, fontWeight: 700, letterSpacing: 0.5 }}>IN PROGRESS</div>}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* PRACTICE */}
          {activePage === "practice" && (
            <div style={{ maxWidth: 800, margin: "0 auto" }}>
              <div style={{ fontFamily: "'Instrument Serif'", fontSize: 36, marginBottom: 6, letterSpacing: -1 }}>Practice & <em style={{ color: "#7ecfa0" }}>Testing</em></div>
              <p style={{ fontSize: 14, color: "rgba(240,232,216,0.4)", marginBottom: 28 }}>Four modes — from quick checks to full exam simulation.</p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                {[
                  { icon: "⚡", title: "Knowledge Check", desc: "5 questions, instant feedback. Perfect after a lesson.", color: "#7ecfa0", tag: "5Q · Untimed" },
                  { icon: "📋", title: "Module Quiz", desc: "15 questions per module with full explanations.", color: "#60cfe8", tag: "15Q · Untimed" },
                  { icon: "🎯", title: "Unit Test", desc: "30 questions with section-end feedback.", color: "#a78bfa", tag: "30Q · Untimed" },
                  { icon: "🏆", title: "Exam Simulation", desc: "Full 100-question PSI Series 22-01 simulation.", color: "#c8a96e", tag: "100Q · 2hr", locked: true },
                ].map((m, i) => (
                  <div key={i} className="card" style={{ background: `${m.color}08`, border: `1px solid ${m.color}20`, borderRadius: 18, padding: "24px 22px", cursor: m.locked ? "not-allowed" : "pointer", opacity: m.locked ? 0.55 : 1, position: "relative" }}>
                    {m.locked && <div style={{ position: "absolute", top: 14, right: 14, fontSize: 10, color: "rgba(240,232,216,0.3)", background: "rgba(240,232,216,0.06)", padding: "3px 8px", borderRadius: 6 }}>🔒 20h needed</div>}
                    <div style={{ fontSize: 28, marginBottom: 12 }}>{m.icon}</div>
                    <div style={{ fontSize: 10, color: m.color, letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 700, marginBottom: 6 }}>{m.tag}</div>
                    <div style={{ fontFamily: "'Instrument Serif'", fontSize: 20, color: "#f0e8d8", marginBottom: 8 }}>{m.title}</div>
                    <div style={{ fontSize: 13, color: "rgba(240,232,216,0.45)", lineHeight: 1.6 }}>{m.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* FLASHCARDS */}
          {activePage === "flashcards" && (
            <div style={{ maxWidth: 800, margin: "0 auto" }}>
              <div style={{ fontFamily: "'Instrument Serif'", fontSize: 36, marginBottom: 6, letterSpacing: -1 }}>Flash<em style={{ color: "#7ecfa0" }}>cards</em></div>
              <p style={{ fontSize: 14, color: "rgba(240,232,216,0.4)", marginBottom: 24 }}>SM-2 spaced repetition — 37 cards across all 8 units.</p>
              <div style={{ display: "flex", gap: 10, marginBottom: 24, flexWrap: "wrap" }}>
                {[["12", "Due Today", "#c8a96e"], ["18", "New Cards", "#60cfe8"], ["7", "Mastered", "#7ecfa0"]].map(([v, l, c]) => (
                  <div key={l} style={{ background: `${c}0d`, border: `1px solid ${c}22`, borderRadius: 12, padding: "10px 16px", display: "flex", gap: 10, alignItems: "center" }}>
                    <span style={{ fontFamily: "'Instrument Serif'", fontSize: 22, color: c }}>{v}</span>
                    <span style={{ fontSize: 12, color: "rgba(240,232,216,0.4)" }}>{l}</span>
                  </div>
                ))}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                {[
                  { title: "Review Due Cards", count: 12, color: "#c8a96e", icon: "⏰", desc: "Scheduled by the spaced repetition algorithm" },
                  { title: "New Cards", count: 18, color: "#60cfe8", icon: "✨", desc: "Cards you haven't studied yet" },
                  { title: "Wisconsin Only", count: 11, color: "#a78bfa", icon: "🏛", desc: "WI-specific rules with statute references" },
                  { title: "All 37 Cards", count: 37, color: "#7ecfa0", icon: "✦", desc: "Complete deck in random order" },
                ].map((d, i) => (
                  <div key={i} className="card" style={{ background: `${d.color}08`, border: `1px solid ${d.color}22`, borderRadius: 16, padding: "20px", cursor: "pointer" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
                      <span style={{ fontSize: 24 }}>{d.icon}</span>
                      <span style={{ fontFamily: "'Instrument Serif'", fontSize: 28, color: d.color }}>{d.count}</span>
                    </div>
                    <div style={{ fontFamily: "'Instrument Serif'", fontSize: 18, color: d.color, marginBottom: 4 }}>{d.title}</div>
                    <div style={{ fontSize: 12, color: "rgba(240,232,216,0.4)" }}>{d.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* PROGRESS */}
          {activePage === "progress" && (
            <div style={{ maxWidth: 800, margin: "0 auto" }}>
              <div style={{ fontFamily: "'Instrument Serif'", fontSize: 36, marginBottom: 6, letterSpacing: -1 }}>Your <em style={{ color: "#7ecfa0" }}>Progress</em></div>
              <p style={{ fontSize: 14, color: "rgba(240,232,216,0.4)", marginBottom: 28 }}>Topic mastery and study trajectory.</p>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 24 }}>
                {[["74%", "Readiness", "+33pts", "#7ecfa0"], ["312", "Questions", "78% correct", "#60cfe8"], ["18", "Sessions", "38 min avg", "#a78bfa"]].map(([v, l, s, c]) => (
                  <div key={l} className="card" style={{ background: `${c}08`, border: `1px solid ${c}20`, borderRadius: 16, padding: "18px" }}>
                    <div style={{ fontFamily: "'Instrument Serif'", fontSize: 36, color: c, lineHeight: 1, marginBottom: 4 }}>{v}</div>
                    <div style={{ fontSize: 13, color: "rgba(240,232,216,0.6)", fontWeight: 600 }}>{l}</div>
                    <div style={{ fontSize: 11, color: "rgba(240,232,216,0.3)", marginTop: 3 }}>{s}</div>
                  </div>
                ))}
              </div>
              <div className="card" style={{ background: "rgba(240,232,216,0.03)", border: "1px solid rgba(240,232,216,0.07)", borderRadius: 18, padding: "22px" }}>
                <div style={{ fontSize: 11, color: "rgba(240,232,216,0.3)", letterSpacing: 2, textTransform: "uppercase", fontWeight: 600, marginBottom: 16 }}>Topic Mastery</div>
                {[["Life Insurance Types", 92, "#7ecfa0"], ["Policy Provisions", 78, "#60cfe8"], ["WI Regulations", 71, "#a78bfa"], ["Annuities", 45, "#c8a96e"], ["Tax Treatment", 52, "#e07b6a"], ["WI Security Fund", 38, "#e07b6a"]].map(([t, p, c]) => (
                  <div key={t} style={{ marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 5 }}>
                      <span style={{ color: "rgba(240,232,216,0.65)" }}>{t}</span>
                      <span style={{ color: c, fontWeight: 600 }}>{p}%</span>
                    </div>
                    <div style={{ height: 4, background: "rgba(255,255,255,0.06)", borderRadius: 10, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${p}%`, background: c, borderRadius: 10, opacity: 0.8 }} />
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* COMPLIANCE */}
          {activePage === "compliance" && (
            <div style={{ maxWidth: 800, margin: "0 auto" }}>
              <div style={{ fontFamily: "'Instrument Serif'", fontSize: 36, marginBottom: 6, letterSpacing: -1 }}>OCI <em style={{ color: "#a78bfa" }}>Compliance</em></div>
              <p style={{ fontSize: 14, color: "rgba(240,232,216,0.4)", marginBottom: 28 }}>Wisconsin requires 20 verified hours before you can sit for the PSI exam.</p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 20 }}>
                <div className="card" style={{ background: "rgba(126,207,160,0.06)", border: "1px solid rgba(126,207,160,0.15)", borderRadius: 18, padding: "22px" }}>
                  <div style={{ fontSize: 10, color: "rgba(126,207,160,0.5)", letterSpacing: 2, textTransform: "uppercase", fontWeight: 600, marginBottom: 8 }}>Total Seat Time</div>
                  <div style={{ fontFamily: "'Instrument Serif'", fontSize: 52, color: "#7ecfa0", lineHeight: 1, marginBottom: 4 }}>8.5h</div>
                  <div style={{ fontSize: 13, color: "rgba(240,232,216,0.4)", marginBottom: 14 }}>of 20h required</div>
                  <div style={{ height: 6, background: "rgba(255,255,255,0.07)", borderRadius: 10, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: "42.5%", background: "linear-gradient(to right, #7ecfa0, #5aaa7c)", borderRadius: 10 }} />
                  </div>
                  <div style={{ fontSize: 11, color: "rgba(126,207,160,0.5)", marginTop: 4 }}>42.5% — 11.5h remaining</div>
                </div>
                <div className="card" style={{ background: "rgba(167,139,250,0.06)", border: "1px solid rgba(167,139,250,0.15)", borderRadius: 18, padding: "22px" }}>
                  <div style={{ fontSize: 10, color: "rgba(167,139,250,0.5)", letterSpacing: 2, textTransform: "uppercase", fontWeight: 600, marginBottom: 8 }}>WI Laws & Ethics (8h req)</div>
                  <div style={{ fontFamily: "'Instrument Serif'", fontSize: 52, color: "#a78bfa", lineHeight: 1, marginBottom: 4 }}>1.0h</div>
                  <div style={{ fontSize: 13, color: "rgba(240,232,216,0.4)", marginBottom: 14 }}>of 8h required</div>
                  <div style={{ height: 6, background: "rgba(255,255,255,0.07)", borderRadius: 10, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: "12.5%", background: "#a78bfa", borderRadius: 10 }} />
                  </div>
                </div>
              </div>
              <div style={{ padding: "16px 20px", background: "rgba(224,123,106,0.07)", border: "1px solid rgba(224,123,106,0.15)", borderLeft: "3px solid #e07b6a", borderRadius: 12, fontSize: 13, color: "rgba(240,232,216,0.5)", lineHeight: 1.7 }}>
                🔒 <strong style={{ color: "#f0e8d8" }}>Exam Simulation locked</strong> — complete 20 verified hours to unlock. Study sessions are automatically tracked.
              </div>
            </div>
          )}

          {/* COACH page */}
          {activePage === "coach" && (
            <div style={{ maxWidth: 700, margin: "0 auto" }}>
              <div style={{ fontFamily: "'Instrument Serif'", fontSize: 36, marginBottom: 6, letterSpacing: -1 }}>AI <em style={{ color: "#7ecfa0" }}>Coach</em></div>
              <p style={{ fontSize: 14, color: "rgba(240,232,216,0.4)", marginBottom: 24 }}>Powered by Claude — your personal Wisconsin Life Insurance expert.</p>
              <button onClick={() => setCoachOpen(true)} style={{ background: "#7ecfa0", color: "#0a1a10", border: "none", padding: "14px 32px", borderRadius: 50, fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: "'Instrument Sans'", letterSpacing: 0.3, display: "flex", alignItems: "center", gap: 8 }}>
                <span>✦</span> Open AI Coach Chat
              </button>
            </div>
          )}

        </div>
      </div>

      {/* ── AI COACH DRAWER ── */}
      {coachOpen && (
        <div style={{ position: "fixed", inset: 0, zIndex: 100, display: "flex" }}>
          {/* Backdrop */}
          <div style={{ flex: 1, background: "rgba(0,0,0,0.5)", backdropFilter: "blur(4px)" }} onClick={() => setCoachOpen(false)} />
          {/* Drawer */}
          <div style={{ width: 420, background: "#1a1712", borderLeft: "1px solid rgba(240,232,216,0.1)", display: "flex", flexDirection: "column", boxShadow: "-20px 0 60px rgba(0,0,0,0.4)" }}>
            {/* Drawer header */}
            <div style={{ padding: "20px 20px 16px", borderBottom: "1px solid rgba(240,232,216,0.08)", display: "flex", gap: 12, alignItems: "center" }}>
              <div style={{ width: 38, height: 38, borderRadius: "50%", background: "linear-gradient(135deg, #7ecfa0, #5aaa7c)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>🎓</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: "'Instrument Serif'", fontSize: 16, color: "#f0e8d8" }}>AI Coach</div>
                <div style={{ fontSize: 11, color: "rgba(126,207,160,0.6)" }}>Wisconsin Life Insurance Expert · Online</div>
              </div>
              <button onClick={() => setCoachOpen(false)} style={{ background: "none", border: "none", color: "rgba(240,232,216,0.3)", fontSize: 18, cursor: "pointer" }}>✕</button>
            </div>

            {/* Readiness bar */}
            <div style={{ padding: "10px 20px", background: "rgba(200,169,110,0.05)", borderBottom: "1px solid rgba(240,232,216,0.06)" }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 4, color: "rgba(240,232,216,0.3)" }}>
                <span>Exam readiness</span><span style={{ color: "#c8a96e" }}>{STUDENT.daysUntil} days to exam</span>
              </div>
              <div style={{ height: 3, background: "rgba(255,255,255,0.06)", borderRadius: 10, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${STUDENT.readiness}%`, background: "linear-gradient(to right, #c8a96e, #e0c080)", borderRadius: 10 }} />
              </div>
            </div>

            {/* Messages */}
            <div style={{ flex: 1, overflowY: "auto", padding: "16px" }}>
              {messages.map((m, i) => (
                <div key={i} style={{ display: "flex", gap: 8, marginBottom: 14, justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
                  {m.role === "assistant" && <div style={{ width: 28, height: 28, borderRadius: "50%", background: "linear-gradient(135deg, #7ecfa0, #5aaa7c)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, flexShrink: 0 }}>🎓</div>}
                  <div style={{ maxWidth: "78%", padding: "11px 14px", background: m.role === "user" ? "rgba(126,207,160,0.12)" : "rgba(240,232,216,0.06)", border: `1px solid ${m.role === "user" ? "rgba(126,207,160,0.25)" : "rgba(240,232,216,0.08)"}`, borderRadius: m.role === "user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px", fontSize: 13, color: "rgba(240,232,216,0.82)", lineHeight: 1.65 }}>
                    {m.text}
                  </div>
                </div>
              ))}
              {sending && (
                <div style={{ display: "flex", gap: 8 }}>
                  <div style={{ width: 28, height: 28, borderRadius: "50%", background: "linear-gradient(135deg, #7ecfa0, #5aaa7c)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}>🎓</div>
                  <div style={{ padding: "12px 16px", background: "rgba(240,232,216,0.06)", border: "1px solid rgba(240,232,216,0.08)", borderRadius: "14px 14px 14px 4px", display: "flex", gap: 5 }}>
                    {[0, 1, 2].map(i => <div key={i} style={{ width: 7, height: 7, borderRadius: "50%", background: "#7ecfa0", animation: `bounce 1.2s ease-in-out ${i * 0.2}s infinite` }} />)}
                  </div>
                </div>
              )}
            </div>

            {/* Weak area chips */}
            <div style={{ padding: "8px 16px", borderTop: "1px solid rgba(240,232,216,0.05)", display: "flex", gap: 6, flexWrap: "wrap" }}>
              <span style={{ fontSize: 10, color: "rgba(240,232,216,0.2)", alignSelf: "center" }}>Quick:</span>
              {STUDENT.weakTopics.map((t, i) => (
                <div key={i} className="action-chip" onClick={() => { setCoachInput(`Help me with ${t}`); }} style={{ padding: "4px 10px", background: "rgba(224,123,106,0.08)", border: "1px solid rgba(224,123,106,0.15)", borderRadius: 20, fontSize: 11, color: "#e07b6a", cursor: "pointer" }}>⚡ {t}</div>
              ))}
            </div>

            {/* Input */}
            <div style={{ padding: "10px 16px 16px", borderTop: "1px solid rgba(240,232,216,0.07)" }}>
              <div style={{ background: "rgba(240,232,216,0.05)", border: "1px solid rgba(240,232,216,0.1)", borderRadius: 14, padding: "10px 12px", display: "flex", gap: 8, alignItems: "flex-end" }}>
                <textarea value={coachInput} onChange={e => setCoachInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }} placeholder="Ask Coach anything..." rows={1} style={{ flex: 1, background: "none", border: "none", color: "#f0e8d8", fontSize: 13, lineHeight: 1.5, maxHeight: 80, overflowY: "auto" }} onInput={e => { e.target.style.height = "auto"; e.target.style.height = Math.min(e.target.scrollHeight, 80) + "px"; }} />
                <button className="send-btn" onClick={sendMessage} disabled={!coachInput.trim() || sending} style={{ width: 32, height: 32, borderRadius: 10, background: coachInput.trim() && !sending ? "#7ecfa0" : "rgba(255,255,255,0.07)", color: coachInput.trim() && !sending ? "#0a1a10" : "rgba(255,255,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, flexShrink: 0 }}>
                  {sending ? <div style={{ width: 12, height: 12, border: "2px solid rgba(255,255,255,0.3)", borderTop: "2px solid #fff", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} /> : "↑"}
                </button>
              </div>
              <div style={{ fontSize: 10, color: "rgba(240,232,216,0.15)", marginTop: 5, textAlign: "center" }}>↵ to send · Live Claude API</div>
            </div>
          </div>
        </div>
      )}

      <style>{`
        @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }
        @keyframes spin { to{transform:rotate(360deg)} }
      `}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(OrganicDashboard));
</script>
</body>
</html>
