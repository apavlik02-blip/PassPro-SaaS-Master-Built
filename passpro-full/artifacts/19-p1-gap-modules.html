**Stock Insurance Company**
Owned by stockholders (shareholders) who provide capital and receive dividends based on company profitability. Policyholders are customers — not owners. Stock companies issue **non-participating** policies (no policy dividends). Wisconsin: governed by ch. 611.

Policyholders insure each other through an attorney-in-fact who manages the exchange. Each member is both an insured and an insurer of others. Less common but tested. Also called an interinsurance exchange.

**The Agency Relationship**
In insurance, the **insurer is the principal** and the **agent is the agent**. The agent acts on behalf of the insurer and can bind the insurer within the scope of their authority. The acts of the agent within that authority are the acts of the insurer.

**Three Types of Agent Authority**

**Express Authority**
Authority that is specifically and explicitly granted to the agent in the agency agreement (written contract). Example: "Agent may bind coverage up to $500,000."

**Implied Authority**
Authority that is not explicitly stated but is customarily associated with the agent's role. Example: An agent has implied authority to accept premiums even if this isn't written in the agreement — it's implied by the nature of the job.

**Apparent Authority**
Authority that a third party (the public) reasonably believes the agent has, based on the insurer's conduct or representations — even if the agent doesn't actually have it. If the insurer creates the appearance of authority, they may be bound by the agent's actions.

**Waiver and Estoppel**
- **Waiver:** The voluntary surrender of a known right. If an insurer accepts a late premium without objection, they may have waived the right to lapse the policy.

**Agent vs. Broker**
- **Agent:** Represents the insurer — owes primary duty to the insurer

**How It Works**
1. Policyowner sells their policy to a life settlement provider
2. Provider pays a lump sum — more than CSV, less than death benefit
3. Provider becomes the new policyowner and beneficiary
4. Provider pays future premiums and receives the death benefit when the insured dies

**Who Uses Life Settlements?**
Typically seniors (65+) or individuals with serious illness who no longer need the coverage, can't afford premiums, or need liquidity. Life settlements provide more value than simply surrendering the policy.

**Wisconsin Regulation — s. 632.69**
Wisconsin regulates life settlements under s. 632.69. Key requirements:
- Life settlement providers and brokers must be licensed in Wisconsin
- The policyowner has a 15-day right to rescind the settlement after execution
- A 2-year waiting period applies — policies generally cannot be settled within 2 years of issue (with exceptions for terminal illness, disability, divorce, job loss)
- Disclosures required about alternatives (accelerated benefits, policy loans, etc.)
- The provider must pay the agreed amount within 3 business days of receiving the policy

**Tax Treatment of Life Settlements**
- Amount received up to cost basis (premiums paid) = tax-free return of basis
- Amount above basis up to CSV = taxable as ordinary income
- Amount above CSV = taxable as capital gain`,

        content: `**Stranger-Originated Life Insurance (STOLI)** — also called investor-originated life insurance (IOLI) — is an arrangement where an investor with no insurable interest in the insured finances the purchase of a life insurance policy with the intent to profit from the insured's death.

**How STOLI Schemes Work**
1. A third-party investor approaches a senior with an offer: "We'll pay your premiums for 2 years, then you sell us the policy"
2. The senior applies for a policy naming the investor's entity as future owner/beneficiary
3. After the 2-year contestability period, the policy is transferred to the investor
4. The investor profits when the insured dies

**Why STOLI is Illegal**
STOLI violates the fundamental principle of **insurable interest**. The investor has no insurable interest in the life of the insured — they are essentially wagering on the insured's death. This is considered a form of insurance fraud.

**Wisconsin's Position on STOLI**
Wisconsin, like most states, has specific anti-STOLI provisions. Under Wisconsin law:
- Policies procured with the intent to sell to someone without insurable interest are void
- Producers who knowingly participate in STOLI arrangements risk license revocation and criminal penalties
- The 2-year waiting period for life settlements was specifically designed to discourage STOLI

**STOLI vs. Legitimate Life Settlements**

- **Legitimate:** Policy was obtained for genuine insurance need, later no longer needed → life settlement

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      {/* Lesson nav */}
      <div style={{ display: "flex", gap: 6, padding: "12px 0 16px", flexWrap: "wrap" }}>
        {mod.lessons.map((l, i) => (
          <button key={i} onClick={() => { setActiveLesson(i); setActiveView("lesson"); }} style={{ padding: "6px 14px", borderRadius: 20, fontSize: 12, cursor: "pointer", border: "none", background: activeLesson === i && activeView === "lesson" ? `${mod.color}20` : "rgba(255,255,255,0.04)", color: activeLesson === i && activeView === "lesson" ? mod.color : "rgba(255,255,255,0.45)", fontFamily: "'DM Sans'" }}>
            {l.title}
          </button>
        ))}
        <button onClick={() => setActiveView("quiz")} style={{ padding: "6px 14px", borderRadius: 20, fontSize: 12, cursor: "pointer", border: "none", background: activeView === "quiz" ? "rgba(245,158,11,0.15)" : "rgba(255,255,255,0.04)", color: activeView === "quiz" ? "#f59e0b" : "rgba(255,255,255,0.45)", fontFamily: "'DM Sans'" }}>
          📝 Quiz ({mod.questions.length}Q)
        </button>
      </div>

      {activeView === "lesson" && lesson && (
        <div style={{ flex: 1, overflowY: "auto" }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
            <span style={{ background: `${mod.color}12`, color: mod.color, padding: "3px 10px", borderRadius: 8, fontSize: 11, fontFamily: "'JetBrains Mono'" }}>{mod.psiDomain}</span>
            <span style={{ background: "rgba(255,255,255,0.05)", color: "rgba(255,255,255,0.4)", padding: "3px 10px", borderRadius: 8, fontSize: 11, fontFamily: "'JetBrains Mono'" }}>⏱ {lesson.duration}</span>
          </div>

          <h2 style={{ fontFamily: "'Syne'", fontSize: "clamp(18px,2.5vw,26px)", fontWeight: 800, letterSpacing: -0.5, marginBottom: 20 }}>{lesson.title}</h2>

          <div style={{ fontSize: 14, color: "rgba(255,255,255,0.68)", lineHeight: 1.85, marginBottom: 24 }}>
            <p dangerouslySetInnerHTML={{ __html: `<p style="margin-top:0">${formatContent(lesson.content)}</p>` }} />
          </div>

          {lesson.keyTerms && (
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.25)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>Key Terms</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 8 }}>
                {lesson.keyTerms.map((kt, i) => (
                  <div key={i} style={{ background: "rgba(255,255,255,0.03)", border: `1px solid ${mod.color}18`, borderLeft: `2px solid ${mod.color}`, borderRadius: 8, padding: "12px 14px" }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: mod.color, marginBottom: 4 }}>{kt.term}</div>
                    <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", lineHeight: 1.5 }}>{kt.def}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {lesson.wiNote && (
            <div style={{ padding: "14px 18px", background: "rgba(192,132,252,0.07)", border: "1px solid rgba(192,132,252,0.2)", borderLeft: "3px solid #c084fc", borderRadius: 10, marginBottom: 16 }}>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "#c084fc", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>🏛 Wisconsin Exam Note</div>
              <p style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", lineHeight: 1.7 }}>{lesson.wiNote}</p>
            </div>
          )}

          {mod.wiStatutes?.length > 0 && (
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {mod.wiStatutes.map((s, i) => <span key={i} style={{ background: "rgba(192,132,252,0.08)", color: "#c084fc", padding: "3px 9px", borderRadius: 6, fontSize: 10, fontFamily: "'JetBrains Mono'" }}>{s}</span>)}
            </div>
          )}
        </div>
      )}

      {activeView === "quiz" && (
        <div style={{ flex: 1, overflowY: "auto" }}>
          <h2 style={{ fontFamily: "'Syne'", fontSize: 20, fontWeight: 800, marginBottom: 20 }}>{mod.title} — Quiz</h2>
          <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            {mod.questions.map((q, qi) => (
              <div key={qi} style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: "18px 20px" }}>
                <div style={{ fontFamily: "'Syne'", fontSize: 14, fontWeight: 600, marginBottom: 14, lineHeight: 1.5 }}>Q{qi + 1}. {q.q}</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
                  {q.options.map((opt, oi) => {
                    const sel = answers[qi] === oi;
                    const correct = oi === q.correct;
                    const answered = answers[qi] !== undefined;
                    let bg = "rgba(255,255,255,0.03)"; let border = "rgba(255,255,255,0.07)"; let col = "rgba(255,255,255,0.65)";
                    if (answered && correct) { bg = "rgba(0,200,150,0.1)"; border = "#00c896"; col = "#fff"; }
                    if (answered && sel && !correct) { bg = "rgba(248,113,113,0.1)"; border = "#f87171"; col = "#fff"; }
                    return (
                      <div key={oi} onClick={() => !answered && setAnswers(prev => ({ ...prev, [qi]: oi }))} style={{ padding: "10px 14px", background: bg, border: `1px solid ${border}`, borderRadius: 8, fontSize: 13, color: col, cursor: answered ? "default" : "pointer", display: "flex", alignItems: "center", gap: 10, transition: "all 0.12s" }}>
                        <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, fontWeight: 600, color: answered ? (correct ? "#00c896" : sel ? "#f87171" : "rgba(255,255,255,0.2)") : "rgba(255,255,255,0.25)", flexShrink: 0 }}>{String.fromCharCode(65 + oi)}</span>
                        {opt}
                        {answered && correct && <span style={{ marginLeft: "auto", color: "#00c896" }}>✓</span>}
                      </div>
                    );
                  })}
                </div>
                {answers[qi] !== undefined && (
                  <div style={{ marginTop: 12 }}>
                    <div style={{ padding: "10px 14px", background: answers[qi] === q.correct ? "rgba(0,200,150,0.07)" : "rgba(248,113,113,0.07)", border: `1px solid ${answers[qi] === q.correct ? "rgba(0,200,150,0.2)" : "rgba(248,113,113,0.2)"}`, borderRadius: 8, fontSize: 13, color: "rgba(255,255,255,0.6)", lineHeight: 1.6 }}>
                      {answers[qi] === q.correct ? "✓ Correct — " : "✗ Incorrect — "}{q.exp}
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

function MissingModules() {
  const [activeModule, setActiveModule] = useState("beneficiary");
  const mod = modules[activeModule];

  return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: "#08080f", minHeight: "100vh", color: "#fff" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .mod-btn { cursor: pointer; border: none; transition: all 0.18s; }
        .mod-btn:hover { transform: translateY(-2px); }
        button { font-family: "'DM Sans'", system-ui, sans-serif; }
      `}</style>

      {/* Header */}
      <div style={{ padding: "40px 40px 24px", borderBottom: "1px solid rgba(255,255,255,0.06)", background: "linear-gradient(135deg, #08080f, #0d0c18)" }}>
        <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: "#f87171", letterSpacing: 3, textTransform: "uppercase", marginBottom: 10 }}>19 — P1 Gap Modules</div>
        <h1 style={{ fontFamily: "'Syne'", fontSize: "clamp(26px,4vw,48px)", fontWeight: 800, letterSpacing: -2, marginBottom: 10 }}>
          Priority Content<br /><span style={{ color: "#f87171" }}>Gap Modules</span>
        </h1>
        <p style={{ color: "rgba(255,255,255,0.4)", fontSize: 14, maxWidth: 520, lineHeight: 1.7 }}>
          Four P1 gaps identified from the PSI Series 22-01 exam outline — now fully built out. Each module includes full lesson content, key terms, Wisconsin statute references, and a practice quiz.
        </p>
      </div>

      {/* Module selector */}
      <div style={{ padding: "20px 40px", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", gap: 10, flexWrap: "wrap" }}>
        {Object.entries(modules).map(([key, m]) => (
          <button key={key} className="mod-btn" onClick={() => setActiveModule(key)} style={{ padding: "10px 18px", borderRadius: 10, background: activeModule === key ? `${m.color}15` : "rgba(255,255,255,0.03)", border: `1px solid ${activeModule === key ? m.color + "40" : "rgba(255,255,255,0.07)"}`, color: activeModule === key ? m.color : "rgba(255,255,255,0.5)", fontSize: 13, fontWeight: activeModule === key ? 600 : 400 }}>
            <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, opacity: 0.6, marginRight: 6 }}>{m.id}</span>
            {m.title}
          </button>
        ))}
      </div>

      {/* Module info bar */}
      <div style={{ padding: "14px 40px", borderBottom: "1px solid rgba(255,255,255,0.05)", background: `${mod.color}06`, display: "flex", gap: 12, flexWrap: "wrap", alignItems: "center" }}>
        <span style={{ fontFamily: "'Syne'", fontSize: 15, fontWeight: 800, color: mod.color }}>{mod.title}</span>
        <span style={{ background: `${mod.color}15`, color: mod.color, padding: "3px 10px", borderRadius: 8, fontSize: 11, fontFamily: "'JetBrains Mono'" }}>{mod.examWeight}</span>
        <span style={{ background: "rgba(248,113,113,0.1)", color: "#f87171", padding: "3px 10px", borderRadius: 8, fontSize: 11, fontFamily: "'JetBrains Mono'" }}>P1 Gap — Now Fixed</span>
        <span style={{ fontSize: 12, color: "rgba(255,255,255,0.3)" }}>{mod.lessons.length} lessons · {mod.questions.length} quiz questions</span>
      </div>

      {/* Content */}
      <div style={{ padding: "24px 40px", maxWidth: 900 }}>
        <ModuleContent mod={mod} key={activeModule} />
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(MissingModules));
</script>
</body>
</html>
