<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassPro — 17-ai-question-generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #06060c; } #root { min-height: 100vh; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const topics = [
  { id: "term_life", label: "Term Life Insurance", unit: 2, color: "#38bdf8" },
  { id: "whole_life", label: "Whole Life Insurance", unit: 2, color: "#38bdf8" },
  { id: "universal_life", label: "Universal Life Insurance", unit: 2, color: "#38bdf8" },
  { id: "annuities", label: "Annuities", unit: 4, color: "#f59e0b" },
  { id: "policy_provisions", label: "Policy Provisions & Riders", unit: 3, color: "#a78bfa" },
  { id: "nonforfeiture", label: "Nonforfeiture Options", unit: 3, color: "#a78bfa" },
  { id: "underwriting", label: "Underwriting & Premiums", unit: 5, color: "#f87171" },
  { id: "tax_treatment", label: "Tax Treatment of Life Insurance", unit: 7, color: "#fb923c" },
  { id: "wi_regulations", label: "Wisconsin State Regulations", unit: 8, color: "#c084fc" },
  { id: "wi_licensing", label: "Wisconsin Licensing & OCI", unit: 8, color: "#c084fc" },
  { id: "business_insurance", label: "Business Life Insurance", unit: 6, color: "#4ade80" },
  { id: "insurable_interest", label: "Insurable Interest & Contracts", unit: 1, color: "#00c896" },
];

const difficulties = [
  { id: "easy", label: "Easy", desc: "Recall & recognition", color: "#00c896" },
  { id: "medium", label: "Medium", desc: "Application & analysis", color: "#f59e0b" },
  { id: "hard", label: "Hard", desc: "Synthesis & edge cases", color: "#f87171" },
];

const questionTypes = [
  { id: "4_choice", label: "4-Choice MCQ", desc: "Standard exam format" },
  { id: "scenario", label: "Scenario-Based", desc: "Real-world situation" },
  { id: "wi_specific", label: "WI Regulation Focus", desc: "Wisconsin-specific rule tested" },
  { id: "calculation", label: "Calculation/Comparison", desc: "Requires reasoning through numbers or comparisons" },
];

const buildPrompt = (topic, difficulty, type, count, state) => {
  const topicLabel = topics.find(t => t.id === topic)?.label || topic;
  const stateClause = state === "WI"
    ? `Where relevant, include Wisconsin-specific rules (OCI requirements, WI statute references, WI-specific numbers like the 10-day free look period, $300K WLGA limit, 20-hour pre-licensing requirement, 31-day grace period, 2-year incontestability/suicide exclusion). Flag Wisconsin-specific questions with "wi_specific": true.`
    : "";

  return `You are an expert insurance licensing exam question writer for the Wisconsin Life Insurance pre-licensing exam. Generate exactly ${count} multiple-choice question(s) on the topic of "${topicLabel}".

Requirements:
- Difficulty: ${difficulty} (${difficulties.find(d => d.id === difficulty)?.desc})
- Type: ${type === "4_choice" ? "Standard 4-choice MCQ" : type === "scenario" ? "Scenario-based — describe a realistic situation then ask the question" : type === "wi_specific" ? "Wisconsin-specific regulation question — must test a WI-specific rule, number, or statute" : "Comparison or calculation-style — student must reason through two or more concepts"}
- Each question must have exactly 4 answer options (A, B, C, D)
- Only one correct answer per question
- Provide a detailed explanation (2-4 sentences) for the correct answer
- Explain why incorrect options are wrong (briefly)
${stateClause}
- Questions must be realistic exam-style, not trivially easy
- Do not repeat information from the question stem in the correct answer

Respond ONLY with a valid JSON array. No preamble, no markdown fences. Example format:
[
  {
    "question": "Question text here?",
    "options": ["Option A", "Option B", "Option C", "Option D"],
    "correct": 0,
    "explanation": "Full explanation of why the correct answer is right.",
    "wrongExplanations": ["Why A is wrong (if not correct)", "Why B is wrong", "Why C is wrong", "Why D is wrong"],
    "topic": "${topicLabel}",
    "difficulty": "${difficulty}",
    "wi_specific": false
  }
]`;
};

const GeneratedCard = ({ q, idx, revealed, onReveal }) => {
  const [selected, setSelected] = useState(null);
  const [showWrong, setShowWrong] = useState(false);

  const pick = (oi) => {
    if (selected !== null) return;
    setSelected(oi);
    onReveal(idx);
  };

  return (
    <div style={{ background: "#0f1018", border: `1px solid ${q.wi_specific ? "rgba(192,132,252,0.25)" : "rgba(255,255,255,0.07)"}`, borderRadius: 16, overflow: "hidden", marginBottom: 16 }}>
      {/* Card header */}
      <div style={{ padding: "14px 20px", background: q.wi_specific ? "rgba(192,132,252,0.08)" : "rgba(255,255,255,0.02)", borderBottom: "1px solid rgba(255,255,255,0.05)", display: "flex", gap: 8, flexWrap: "wrap" }}>
        <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.3)", letterSpacing: 1 }}>Q{idx + 1}</span>
        <span style={{ background: "rgba(255,255,255,0.05)", color: "rgba(255,255,255,0.4)", padding: "1px 8px", borderRadius: 6, fontSize: 10, fontFamily: "'JetBrains Mono'" }}>{q.topic}</span>
        <span style={{ background: q.difficulty === "hard" ? "rgba(248,113,113,0.12)" : q.difficulty === "medium" ? "rgba(245,158,11,0.12)" : "rgba(0,200,150,0.12)", color: q.difficulty === "hard" ? "#f87171" : q.difficulty === "medium" ? "#f59e0b" : "#00c896", padding: "1px 8px", borderRadius: 6, fontSize: 10, fontFamily: "'JetBrains Mono'" }}>{q.difficulty}</span>
        {q.wi_specific && <span style={{ background: "rgba(192,132,252,0.15)", color: "#c084fc", padding: "1px 8px", borderRadius: 6, fontSize: 10, fontFamily: "'JetBrains Mono'" }}>🏛 WI Specific</span>}
        <span style={{ marginLeft: "auto", fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.15)" }}>AI Generated</span>
      </div>

      {/* Question */}
      <div style={{ padding: "20px 20px 16px" }}>
        <p style={{ fontSize: 15, fontWeight: 500, lineHeight: 1.65, color: "rgba(255,255,255,0.88)", marginBottom: 18 }}>{q.question}</p>

        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {q.options.map((opt, oi) => {
            const isSelected = selected === oi;
            const isCorrect = oi === q.correct;
            let bg = "rgba(255,255,255,0.03)";
            let border = "rgba(255,255,255,0.07)";
            let col = "rgba(255,255,255,0.65)";
            if (selected !== null && isCorrect) { bg = "rgba(0,200,150,0.1)"; border = "rgba(0,200,150,0.4)"; col = "#fff"; }
            if (selected !== null && isSelected && !isCorrect) { bg = "rgba(248,113,113,0.1)"; border = "rgba(248,113,113,0.4)"; col = "#fff"; }
            if (selected === null && isSelected) { bg = "rgba(167,139,250,0.1)"; border = "#a78bfa"; col = "#fff"; }
            return (
              <div key={oi} onClick={() => pick(oi)} style={{ padding: "12px 16px", background: bg, border: `1px solid ${border}`, borderRadius: 10, fontSize: 14, color: col, cursor: selected === null ? "pointer" : "default", transition: "all 0.15s", display: "flex", gap: 12, alignItems: "flex-start" }}>
                <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: selected !== null ? (isCorrect ? "#00c896" : isSelected ? "#f87171" : "rgba(255,255,255,0.2)") : "rgba(255,255,255,0.25)", fontWeight: 600, flexShrink: 0, marginTop: 2 }}>{String.fromCharCode(65 + oi)}</span>
                {opt}
                {selected !== null && isCorrect && <span style={{ marginLeft: "auto", color: "#00c896", fontSize: 14 }}>✓</span>}
                {selected !== null && isSelected && !isCorrect && <span style={{ marginLeft: "auto", color: "#f87171", fontSize: 14 }}>✗</span>}
              </div>
            );
          })}
        </div>

        {/* Explanation */}
        {selected !== null && (
          <div style={{ marginTop: 16, padding: "16px 18px", background: selected === q.correct ? "rgba(0,200,150,0.06)" : "rgba(248,113,113,0.06)", border: `1px solid ${selected === q.correct ? "rgba(0,200,150,0.2)" : "rgba(248,113,113,0.2)"}`, borderLeft: `3px solid ${selected === q.correct ? "#00c896" : "#f87171"}`, borderRadius: 10 }}>
            <div style={{ fontFamily: "'Syne'", fontSize: 14, fontWeight: 700, color: selected === q.correct ? "#00c896" : "#f87171", marginBottom: 8 }}>{selected === q.correct ? "✓ Correct!" : "✗ Incorrect"}</div>
            <p style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", lineHeight: 1.7, marginBottom: q.wrongExplanations ? 10 : 0 }}>{q.explanation}</p>
            {q.wrongExplanations && (
              <div>
                <button onClick={() => setShowWrong(!showWrong)} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.3)", fontSize: 12, cursor: "pointer", fontFamily: "'DM Sans'", padding: 0, marginBottom: showWrong ? 8 : 0 }}>
                  {showWrong ? "▲ Hide" : "▼ Show"} why other options are wrong
                </button>
                {showWrong && q.wrongExplanations.map((we, wi) => (
                  wi !== q.correct && <div key={wi} style={{ fontSize: 12, color: "rgba(255,255,255,0.35)", padding: "4px 0", lineHeight: 1.5 }}><strong style={{ color: "rgba(255,255,255,0.5)" }}>{String.fromCharCode(65 + wi)}:</strong> {we}</div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

function AIQuestionGenerator() {
  const [selectedTopic, setSelectedTopic] = useState("wi_regulations");
  const [selectedDiff, setSelectedDiff] = useState("medium");
  const [selectedType, setSelectedType] = useState("4_choice");
  const [count, setCount] = useState(3);
  const [state] = useState("WI");
  const [generated, setGenerated] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [revealedCount, setRevealedCount] = useState(0);
  const [generationStats, setGenerationStats] = useState(null);

  const handleReveal = (idx) => setRevealedCount(prev => prev + 1);

  const generate = async () => {
    setLoading(true);
    setError(null);
    setGenerated([]);
    setRevealedCount(0);
    setGenerationStats(null);
    const startTime = Date.now();

    try {
      const prompt = buildPrompt(selectedTopic, selectedDiff, selectedType, count, state);

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }],
        }),
      });

      const data = await response.json();
      const raw = data.content.map(b => b.text || "").join("");
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);

      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      setGenerated(Array.isArray(parsed) ? parsed : [parsed]);
      setGenerationStats({ time: elapsed, count: Array.isArray(parsed) ? parsed.length : 1, topic: topics.find(t => t.id === selectedTopic)?.label });
    } catch (e) {
      setError("Generation failed. Check your API connection or try again.");
      console.error(e);
    } finally {
      setLoading(false);
    }
  };

  const topic = topics.find(t => t.id === selectedTopic);

  return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: "#080810", minHeight: "100vh", color: "#fff" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .topic-btn { cursor: pointer; border: none; transition: all 0.15s; }
        .topic-btn:hover { transform: scale(1.02); }
        .diff-btn { cursor: pointer; border: none; transition: all 0.18s; }
        .diff-btn:hover { transform: translateY(-2px); }
        .type-btn { cursor: pointer; border: none; transition: all 0.15s; }
        .gen-btn { cursor: pointer; border: none; transition: all 0.2s; }
        .gen-btn:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 0 40px rgba(167,139,250,0.3); }
        .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .slide-in { animation: slideIn 0.4s ease both; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
        .count-btn { cursor: pointer; border: none; transition: all 0.15s; user-select: none; }
        .count-btn:hover { opacity: 0.75; }
      `}</style>

      {/* Header */}
      <div style={{ padding: "44px 40px 28px", borderBottom: "1px solid rgba(255,255,255,0.06)", background: "linear-gradient(135deg, #080810 0%, #0e0820 50%, #080810 100%)", position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", width: 500, height: 500, borderRadius: "50%", background: "radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%)", top: -150, right: -100, pointerEvents: "none" }} />
        <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: "#a78bfa", letterSpacing: 3, textTransform: "uppercase", marginBottom: 14, position: "relative" }}>17 — AI Question Generator</div>
        <h1 style={{ fontFamily: "'Syne'", fontSize: "clamp(30px,4vw,56px)", fontWeight: 800, letterSpacing: -2, lineHeight: 0.95, marginBottom: 16, position: "relative" }}>
          Generate Exam<br /><span style={{ color: "#a78bfa" }}>Questions with AI</span>
        </h1>
        <p style={{ color: "rgba(255,255,255,0.4)", fontSize: 14, maxWidth: 520, lineHeight: 1.75, position: "relative" }}>
          Claude generates fresh, exam-quality questions from any topic in the curriculum. Pick a topic, difficulty, and question type — the AI writes questions, answer options, full explanations, and Wisconsin-specific regulation notes automatically.
        </p>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "360px 1fr", minHeight: "calc(100vh - 220px)" }}>

        {/* Config panel */}
        <div style={{ borderRight: "1px solid rgba(255,255,255,0.06)", padding: "28px 24px", background: "#0a0a14", overflowY: "auto" }}>

          {/* Topic */}
          <div style={{ marginBottom: 28 }}>
            <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.25)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 12 }}>Topic</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
              {topics.map(t => (
                <button key={t.id} className="topic-btn" onClick={() => setSelectedTopic(t.id)} style={{ padding: "10px 14px", borderRadius: 9, background: selectedTopic === t.id ? `${t.color}12` : "rgba(255,255,255,0.02)", border: `1px solid ${selectedTopic === t.id ? t.color + "35" : "rgba(255,255,255,0.05)"}`, textAlign: "left", display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: selectedTopic === t.id ? t.color : "rgba(255,255,255,0.15)", flexShrink: 0 }} />
                  <span style={{ fontSize: 13, color: selectedTopic === t.id ? "#fff" : "rgba(255,255,255,0.5)", fontWeight: selectedTopic === t.id ? 500 : 400 }}>{t.label}</span>
                  {t.unit === 8 && <span style={{ marginLeft: "auto", fontFamily: "'JetBrains Mono'", fontSize: 9, color: "#c084fc", background: "rgba(192,132,252,0.1)", padding: "1px 6px", borderRadius: 4 }}>WI</span>}
                </button>
              ))}
            </div>
          </div>

          {/* Difficulty */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.25)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 12 }}>Difficulty</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
              {difficulties.map(d => (
                <button key={d.id} className="diff-btn" onClick={() => setSelectedDiff(d.id)} style={{ padding: "12px 10px", borderRadius: 10, background: selectedDiff === d.id ? `${d.color}12` : "rgba(255,255,255,0.02)", border: `1px solid ${selectedDiff === d.id ? d.color + "40" : "rgba(255,255,255,0.06)"}`, textAlign: "center" }}>
                  <div style={{ fontFamily: "'Syne'", fontSize: 13, fontWeight: 700, color: selectedDiff === d.id ? d.color : "rgba(255,255,255,0.45)", marginBottom: 2 }}>{d.label}</div>
                  <div style={{ fontSize: 10, color: "rgba(255,255,255,0.2)" }}>{d.desc}</div>
                </button>
              ))}
            </div>
          </div>

          {/* Question Type */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.25)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 12 }}>Question Type</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {questionTypes.map(qt => (
                <button key={qt.id} className="type-btn" onClick={() => setSelectedType(qt.id)} style={{ padding: "10px 14px", borderRadius: 9, background: selectedType === qt.id ? "rgba(167,139,250,0.1)" : "rgba(255,255,255,0.02)", border: `1px solid ${selectedType === qt.id ? "rgba(167,139,250,0.3)" : "rgba(255,255,255,0.05)"}`, textAlign: "left", display: "flex", gap: 10, alignItems: "center" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, color: selectedType === qt.id ? "#a78bfa" : "rgba(255,255,255,0.5)", fontWeight: selectedType === qt.id ? 500 : 400 }}>{qt.label}</div>
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.2)", marginTop: 1 }}>{qt.desc}</div>
                  </div>
                  {selectedType === qt.id && <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#a78bfa" }} />}
                </button>
              ))}
            </div>
          </div>

          {/* Count */}
          <div style={{ marginBottom: 28 }}>
            <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.25)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 12 }}>How Many Questions</div>
            <div style={{ display: "flex", alignItems: "center", gap: 0, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 10, overflow: "hidden", width: "fit-content" }}>
              <button className="count-btn" onClick={() => setCount(c => Math.max(1, c - 1))} style={{ width: 40, height: 40, background: "none", color: "rgba(255,255,255,0.4)", fontSize: 18 }}>−</button>
              <div style={{ width: 48, textAlign: "center", fontFamily: "'Syne'", fontSize: 20, fontWeight: 800, color: "#a78bfa" }}>{count}</div>
              <button className="count-btn" onClick={() => setCount(c => Math.min(5, c + 1))} style={{ width: 40, height: 40, background: "none", color: "rgba(255,255,255,0.4)", fontSize: 18 }}>+</button>
            </div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.2)", marginTop: 6 }}>Max 5 per generation</div>
          </div>

          {/* Generate button */}
          <button className="gen-btn" onClick={generate} disabled={loading} style={{ width: "100%", padding: "16px", background: loading ? "rgba(167,139,250,0.1)" : "rgba(167,139,250,0.15)", border: "1px solid rgba(167,139,250,0.4)", borderRadius: 12, color: "#a78bfa", fontSize: 15, fontWeight: 700, fontFamily: "'Syne'", display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
            {loading ? (
              <>
                <div className="spin" style={{ width: 18, height: 18, border: "2px solid rgba(167,139,250,0.3)", borderTop: "2px solid #a78bfa", borderRadius: "50%" }} />
                Generating {count} question{count > 1 ? "s" : ""}...
              </>
            ) : (
              <>✦ Generate {count} Question{count > 1 ? "s" : ""}</>
            )}
          </button>

          {/* Config summary */}
          {!loading && (
            <div style={{ marginTop: 16, padding: "12px 14px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 9 }}>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.2)", letterSpacing: 2, marginBottom: 8 }}>CURRENT CONFIG</div>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.35)", lineHeight: 1.8 }}>
                <div><span style={{ color: topic?.color }}>{topic?.label}</span></div>
                <div>{difficulties.find(d => d.id === selectedDiff)?.label} · {questionTypes.find(t => t.id === selectedType)?.label}</div>
                <div>{count} question{count > 1 ? "s" : ""} · State: {state}</div>
              </div>
            </div>
          )}
        </div>

        {/* Output panel */}
        <div style={{ padding: "28px 32px", overflowY: "auto" }}>
          {!loading && generated.length === 0 && !error && (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", gap: 16, opacity: 0.4 }}>
              <div style={{ fontSize: 48 }}>✦</div>
              <div style={{ fontFamily: "'Syne'", fontSize: 18, fontWeight: 700, textAlign: "center" }}>Configure & Generate</div>
              <div style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", textAlign: "center", maxWidth: 300 }}>Select a topic, difficulty, and question type on the left, then hit Generate.</div>
            </div>
          )}

          {loading && (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", gap: 20 }}>
              <div style={{ position: "relative", width: 80, height: 80 }}>
                <div className="spin" style={{ position: "absolute", inset: 0, border: "2px solid rgba(167,139,250,0.15)", borderTop: "2px solid #a78bfa", borderRadius: "50%" }} />
                <div style={{ position: "absolute", inset: 8, border: "1px solid rgba(167,139,250,0.08)", borderBottom: "1px solid rgba(167,139,250,0.4)", borderRadius: "50%", animation: "spin 1.5s linear infinite reverse" }} />
                <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>✦</div>
              </div>
              <div style={{ fontFamily: "'Syne'", fontSize: 18, fontWeight: 700 }}>Claude is writing your questions...</div>
              <div style={{ fontSize: 13, color: "rgba(255,255,255,0.35)", textAlign: "center", maxWidth: 340, lineHeight: 1.7 }}>
                Generating {count} {difficulties.find(d => d.id === selectedDiff)?.label.toLowerCase()} question{count > 1 ? "s" : ""} on <span style={{ color: topic?.color }}>{topic?.label}</span>
              </div>
            </div>
          )}

          {error && (
            <div style={{ padding: "20px 24px", background: "rgba(248,113,113,0.08)", border: "1px solid rgba(248,113,113,0.2)", borderRadius: 12, color: "#f87171", fontSize: 14 }}>
              ⚠️ {error}
            </div>
          )}

          {!loading && generated.length > 0 && (
            <div className="slide-in">
              {/* Gen stats */}
              {generationStats && (
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20, padding: "10px 14px", background: "rgba(167,139,250,0.06)", border: "1px solid rgba(167,139,250,0.15)", borderRadius: 10 }}>
                  <span style={{ fontSize: 14 }}>✦</span>
                  <span style={{ fontSize: 13, color: "rgba(255,255,255,0.5)" }}>Generated <strong style={{ color: "#a78bfa" }}>{generationStats.count} question{generationStats.count > 1 ? "s" : ""}</strong> on <strong style={{ color: topic?.color }}>{generationStats.topic}</strong> in {generationStats.time}s</span>
                  <button onClick={generate} style={{ marginLeft: "auto", background: "none", border: "1px solid rgba(167,139,250,0.25)", color: "#a78bfa", padding: "4px 12px", borderRadius: 6, fontSize: 12, cursor: "pointer", fontFamily: "'DM Sans'" }}>↻ Regenerate</button>
                </div>
              )}

              {generated.map((q, i) => (
                <div key={i} className="slide-in" style={{ animationDelay: `${i * 0.1}s` }}>
                  <GeneratedCard q={q} idx={i} revealed={false} onReveal={handleReveal} />
                </div>
              ))}

              <div style={{ marginTop: 8, padding: "14px 18px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 10, fontSize: 13, color: "rgba(255,255,255,0.35)", lineHeight: 1.6 }}>
                💡 These questions are AI-generated from curriculum content. In production, approved questions are reviewed by a licensed insurance educator before being added to the live question bank.
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(AIQuestionGenerator));
</script>
</body>
</html>
