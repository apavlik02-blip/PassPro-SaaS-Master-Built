// SM-2 spaced repetition algorithm
const SM2 = (card, quality) => {
  // quality: 0=again, 1=hard, 2=good, 3=easy
  let { interval = 1, repetitions = 0, efactor = 2.5 } = card;
  if (quality < 2) {
    repetitions = 0;
    interval = 1;
  } else {
    if (repetitions === 0) interval = 1;
    else if (repetitions === 1) interval = 6;
    else interval = Math.round(interval * efactor);
    repetitions++;
  }
  efactor = Math.max(1.3, efactor + 0.1 - (3 - quality) * (0.08 + (3 - quality) * 0.02));
  const nextReview = new Date();
  nextReview.setDate(nextReview.getDate() + interval);
  return { interval, repetitions, efactor, nextReview, lastReviewed: new Date() };
};

function FlashcardSystem() {

  const [flipped, setFlipped] = useState(false);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [sessionCards, setSessionCards] = useState([]);
  const [sessionResults, setSessionResults] = useState([]);
  const [filter, setFilter] = useState("all");
  const [unitFilter, setUnitFilter] = useState("all");
  const [sessionComplete, setSessionComplete] = useState(false);
  const [xpEarned, setXpEarned] = useState(0);

    const state = cardStates[c.id];
    if (!state?.nextReview) return true;
    return new Date(state.nextReview) <= new Date();
  });

  const getNew = () => ALL_CARDS.filter(c => !cardStates[c.id]);
  const getMastered = () => ALL_CARDS.filter(c => cardStates[c.id]?.repetitions >= 3);

  const dueCards = getDue();
  const newCards = getNew();
  const masteredCards = getMastered();

  const startSession = (cards) => {
    const shuffled = [...cards].sort(() => Math.random() - 0.5);
    setSessionCards(shuffled);
    setCurrentIdx(0);
    setFlipped(false);
    setSessionResults([]);
    setSessionComplete(false);
    setXpEarned(0);
    setView("study");
  };

  const handleQuality = (quality) => {
    const card = sessionCards[currentIdx];
    const existing = cardStates[card.id] || {};
    const updated = SM2({ ...existing }, quality);
    setCardStates(prev => ({ ...prev, [card.id]: updated }));
    setSessionResults(prev => [...prev, { card, quality, updated }]);
    const xp = [5, 10, 15, 25][quality];
    setXpEarned(prev => prev + xp);
    if (currentIdx + 1 >= sessionCards.length) {
      setSessionComplete(true);
    } else {
      setCurrentIdx(prev => prev + 1);
      setFlipped(false);
    }
  };

  const filteredBrowse = ALL_CARDS.filter(c => {
    const unitMatch = unitFilter === "all" || c.unit === unitFilter;
    const filterMatch = filter === "all" || (filter === "due" && dueCards.find(d => d.id === c.id)) || (filter === "new" && !cardStates[c.id]) || (filter === "mastered" && getMastered().find(m => m.id === c.id)) || (filter === "wi" && c.wiNote);
    return unitMatch && filterMatch;
  });

  const card = sessionCards[currentIdx];
  const cardState = card ? cardStates[card.id] : null;
  const progress = sessionCards.length > 0 ? ((currentIdx) / sessionCards.length) * 100 : 0;

        * { box-sizing: border-box; margin: 0; padding: 0; }

        .stat-chip { transition: transform 0.15s; }
        .stat-chip:hover { transform: scale(1.04); }

      {/* Header */}

        <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: "#a78bfa", letterSpacing: 3, textTransform: "uppercase", marginBottom: 12 }}>25 — Flashcard System</div>

            { icon: "✨", title: "Study New Cards", desc: `${newCards.length} cards you haven't seen yet. Start here if you're new to a unit.`, color: "#38bdf8", cards: newCards, disabled: newCards.length === 0 },
            { icon: "🔥", title: "Study All Cards", desc: `All ${ALL_CARDS.length} cards in a random order. Good for a full review session.`, color: "#a78bfa", cards: ALL_CARDS, disabled: false },
            { icon: "🏛", title: "Wisconsin Only", desc: "Only cards with Wisconsin-specific exam notes. Focus on what makes WI unique.", color: "#c084fc", cards: ALL_CARDS.filter(c => c.wiNote), disabled: false },
            { icon: "⚡", title: "Weak Areas Only", desc: "Cards you've marked 'Again' or 'Hard' — target your trouble spots directly.", color: "#f87171", cards: ALL_CARDS.filter(c => cardStates[c.id]?.repetitions === 0 || (!cardStates[c.id] && false)), disabled: false },
            { icon: "📚", title: "Browse All Cards", desc: "View all cards by unit, filter by status, and read front & back before studying.", color: "#4ade80", action: () => setView("browse"), disabled: false },
          ].map((mode, i) => (
            <div key={i} className="deck-card" onClick={() => mode.disabled ? null : (mode.action ? mode.action() : startSession(mode.cards))} style={{ background: mode.disabled ? "rgba(255,255,255,0.02)" : `${mode.color}08`, border: `1px solid ${mode.disabled ? "rgba(255,255,255,0.06)" : mode.color + "25"}`, borderRadius: 14, padding: "22px 20px", opacity: mode.disabled ? 0.4 : 1, cursor: mode.disabled ? "not-allowed" : "pointer" }}>
              <div style={{ fontSize: 28, marginBottom: 12 }}>{mode.icon}</div>
              <div style={{ fontFamily: "'Syne'", fontSize: 16, fontWeight: 700, color: mode.disabled ? "rgba(255,255,255,0.4)" : mode.color, marginBottom: 6 }}>{mode.title}</div>
              <div style={{ fontSize: 13, color: "rgba(255,255,255,0.4)", lineHeight: 1.55 }}>{mode.desc}</div>
            </div>
          ))}
        </div>

        {/* Algorithm explainer */}
        <div style={{ background: "rgba(167,139,250,0.06)", border: "1px solid rgba(167,139,250,0.15)", borderLeft: "3px solid #a78bfa", borderRadius: 10, padding: "18px 22px" }}>
          <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "#a78bfa", letterSpacing: 2, marginBottom: 8 }}>🧠 SM-2 SPACED REPETITION ALGORITHM</div>
          <p style={{ fontSize: 13, color: "rgba(255,255,255,0.55)", lineHeight: 1.7 }}>
            Rate each card after flipping: <strong style={{ color: "#f87171" }}>Again</strong> (didn't know), <strong style={{ color: "#f59e0b" }}>Hard</strong> (almost), <strong style={{ color: "#00c896" }}>Good</strong> (correct), <strong style={{ color: "#38bdf8" }}>Easy</strong> (too easy). The algorithm schedules the next review — sooner for difficult cards, longer for easy ones. This is the same algorithm used by Anki and proven in hundreds of memory research studies.
          </p>
        </div>
      </div>
    </div>
  );

  // ── SESSION COMPLETE ──────────────────────────────────────────────
  if (view === "study" && sessionComplete) {
    const again = sessionResults.filter(r => r.quality === 0).length;
    const hard = sessionResults.filter(r => r.quality === 1).length;
    const good = sessionResults.filter(r => r.quality === 2).length;
    const easy = sessionResults.filter(r => r.quality === 3).length;
    const pct = Math.round(((good + easy) / sessionResults.length) * 100);
    return (
      <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: "#06070c", minHeight: "100vh", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", padding: 40 }}>
        <style>{`@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap'); * { box-sizing: border-box; margin: 0; padding: 0; } .btn { cursor: pointer; border: none; transition: all 0.18s; } .btn:hover { opacity: 0.85; transform: scale(0.98); }`}</style>
        <div style={{ maxWidth: 560, width: "100%", textAlign: "center" }}>
          <div style={{ fontSize: 52, marginBottom: 16 }}>{pct >= 80 ? "🎉" : pct >= 60 ? "💪" : "📚"}</div>
          <h1 style={{ fontFamily: "'Syne'", fontSize: "clamp(28px,4vw,48px)", fontWeight: 800, letterSpacing: -2, marginBottom: 8 }}>Session Complete!</h1>
          <div style={{ fontFamily: "'Syne'", fontSize: 56, fontWeight: 800, color: pct >= 80 ? "#00c896" : pct >= 60 ? "#f59e0b" : "#f87171", marginBottom: 8 }}>{pct}%</div>
          <div style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", marginBottom: 32 }}>{sessionResults.length} cards reviewed · +{xpEarned} XP earned</div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10, marginBottom: 28 }}>
            {[["Again", again, "#f87171"], ["Hard", hard, "#f59e0b"], ["Good", good, "#00c896"], ["Easy", easy, "#38bdf8"]].map(([label, count, color]) => (
              <div key={label} style={{ background: `${color}0d`, border: `1px solid ${color}25`, borderRadius: 10, padding: "14px 10px" }}>
                <div style={{ fontFamily: "'Syne'", fontSize: 24, fontWeight: 800, color }}>{count}</div>
                <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 3 }}>{label}</div>
              </div>
            ))}
          </div>

          <div style={{ padding: "14px 18px", background: "rgba(167,139,250,0.07)", border: "1px solid rgba(167,139,250,0.15)", borderRadius: 10, marginBottom: 24, fontSize: 13, color: "rgba(255,255,255,0.55)", lineHeight: 1.7 }}>
            🧠 Cards marked "Again" or "Hard" will be scheduled for review sooner. Cards marked "Easy" won't appear for several days. The algorithm is calibrating to your memory.
          </div>

          <div style={{ display: "flex", gap: 10 }}>
            <button className="btn" onClick={() => startSession(sessionCards)} style={{ flex: 1, background: "rgba(167,139,250,0.12)", border: "1px solid rgba(167,139,250,0.3)", color: "#a78bfa", padding: "13px", borderRadius: 10, fontSize: 14, fontWeight: 600, fontFamily: "'Syne'" }}>↺ Study Again</button>
            <button className="btn" onClick={() => setView("home")} style={{ flex: 1, background: "#a78bfa", color: "#000", padding: "13px", borderRadius: 10, fontSize: 14, fontWeight: 600, fontFamily: "'Syne'" }}>← Back to Decks</button>
          </div>
        </div>
      </div>
    );
  }

  // ── STUDY SESSION ─────────────────────────────────────────────────
  if (view === "study" && card) return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: "#06070c", minHeight: "100vh", color: "#fff", display: "flex", flexDirection: "column" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .quality-btn { cursor: pointer; border: none; transition: all 0.18s; }
        .quality-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.4); }
        .card-face { transition: all 0.2s cubic-bezier(0.16,1,0.3,1); }
        .flip-btn { cursor: pointer; border: none; transition: all 0.2s; }
        .flip-btn:hover { transform: scale(1.02); opacity: 0.9; }
        .back-btn { cursor: pointer; border: none; background: none; transition: opacity 0.15s; }
        .back-btn:hover { opacity: 0.6; }
      `}</style>

      {/* Top bar */}
      <div style={{ padding: "14px 24px", background: "#0d0d18", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", gap: 14 }}>
        <button className="back-btn" onClick={() => setView("home")} style={{ color: "rgba(255,255,255,0.3)", fontSize: 14, fontFamily: "'DM Sans'", display: "flex", alignItems: "center", gap: 6 }}>← Exit</button>
        <div style={{ flex: 1, height: 4, background: "rgba(255,255,255,0.06)", borderRadius: 4, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${progress}%`, background: "linear-gradient(to right, #a78bfa, #00c896)", borderRadius: 4, transition: "width 0.4s ease" }} />
        </div>
        <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: "rgba(255,255,255,0.3)" }}>{currentIdx + 1} / {sessionCards.length}</div>
        <div style={{ background: "rgba(167,139,250,0.1)", border: "1px solid rgba(167,139,250,0.2)", borderRadius: 20, padding: "3px 10px", fontFamily: "'JetBrains Mono'", fontSize: 11, color: "#a78bfa" }}>+{xpEarned} XP</div>
      </div>

      {/* Card area */}
      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px", flexDirection: "column", gap: 20 }}>
        <div style={{ display: "flex", gap: 8, marginBottom: 4 }}>
          <span style={{ background: `${card.color}15`, color: card.color, padding: "3px 10px", borderRadius: 8, fontSize: 11, fontFamily: "'JetBrains Mono'" }}>Unit {card.unit}</span>
          <span style={{ background: "rgba(255,255,255,0.05)", color: "rgba(255,255,255,0.4)", padding: "3px 10px", borderRadius: 8, fontSize: 11, fontFamily: "'JetBrains Mono'" }}>{card.topic}</span>
          <span style={{ background: card.difficulty === "hard" ? "rgba(248,113,113,0.1)" : card.difficulty === "medium" ? "rgba(245,158,11,0.1)" : "rgba(0,200,150,0.1)", color: card.difficulty === "hard" ? "#f87171" : card.difficulty === "medium" ? "#f59e0b" : "#00c896", padding: "3px 10px", borderRadius: 8, fontSize: 11, fontFamily: "'JetBrains Mono'" }}>{card.difficulty}</span>
          {card.wiNote && <span style={{ background: "rgba(192,132,252,0.1)", color: "#c084fc", padding: "3px 10px", borderRadius: 8, fontSize: 11, fontFamily: "'JetBrains Mono'" }}>🏛 WI</span>}
        </div>

        {/* Card */}
        <div style={{ width: "100%", maxWidth: 640, minHeight: 280 }}>
          {!flipped ? (
            /* Front */
            <button className="flip-btn" onClick={() => setFlipped(true)} style={{ width: "100%", minHeight: 280, background: "#111120", border: `2px solid ${card.color}30`, borderRadius: 20, padding: "36px 40px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 20, textAlign: "center" }}>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.2)", letterSpacing: 3, textTransform: "uppercase" }}>Question</div>
              <div style={{ fontFamily: "'Syne'", fontSize: "clamp(18px,2.5vw,26px)", fontWeight: 700, lineHeight: 1.4, color: "#fff", letterSpacing: -0.5 }}>{card.front}</div>
              <div style={{ marginTop: 12, fontFamily: "'JetBrains Mono'", fontSize: 11, color: "rgba(255,255,255,0.2)", letterSpacing: 1 }}>tap to reveal answer</div>
            </button>
          ) : (
            /* Back */
            <div className="card-face" style={{ width: "100%", minHeight: 280, background: `${card.color}08`, border: `2px solid ${card.color}35`, borderRadius: 20, padding: "28px 36px", display: "flex", flexDirection: "column", gap: 16 }}>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: card.color, letterSpacing: 3, textTransform: "uppercase" }}>Answer</div>
              <div style={{ fontSize: 15, color: "rgba(255,255,255,0.85)", lineHeight: 1.75, whiteSpace: "pre-line" }}>{card.back}</div>
              {card.wiNote && (
                <div style={{ padding: "12px 16px", background: "rgba(192,132,252,0.08)", border: "1px solid rgba(192,132,252,0.2)", borderLeft: "3px solid #c084fc", borderRadius: 8, fontSize: 13, color: "#c084fc", lineHeight: 1.6 }}>
                  {card.wiNote}
                </div>
              )}
            </div>
          )}
        </div>

        {/* Quality buttons — shown after flip */}
        {flipped && (
          <div style={{ width: "100%", maxWidth: 640 }}>
            <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.2)", letterSpacing: 2, textTransform: "uppercase", textAlign: "center", marginBottom: 12 }}>How well did you know this?</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
              {QUALITY_BTNS.map(q => (
                <button key={q.id} className="quality-btn" onClick={() => handleQuality(q.id)} style={{ padding: "14px 10px", background: q.bg, border: `1px solid ${q.border}`, borderRadius: 12, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                  <span style={{ fontFamily: "'Syne'", fontSize: 15, fontWeight: 800, color: q.color }}>{q.label}</span>
                  <span style={{ fontSize: 11, color: "rgba(255,255,255,0.35)" }}>{q.sub}</span>
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );

  // ── BROWSE VIEW ───────────────────────────────────────────────────
  if (view === "browse") return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: "#06070c", minHeight: "100vh", color: "#fff" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap'); * { box-sizing:border-box; margin:0; padding:0; } .filter-btn { cursor:pointer; border:none; transition:all 0.15s; } .browse-card { transition: all 0.15s; } .browse-card:hover { transform: translateY(-2px); } .back-btn { cursor:pointer; border:none; background:none; transition:opacity 0.15s; } .back-btn:hover { opacity:0.6; }`}</style>

      <div style={{ padding: "20px 40px 16px", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
        <button className="back-btn" onClick={() => setView("home")} style={{ color: "rgba(255,255,255,0.4)", fontSize: 14, fontFamily: "'DM Sans'", display: "flex", alignItems: "center", gap: 6 }}>← Back</button>
        <div style={{ fontFamily: "'Syne'", fontSize: 18, fontWeight: 800 }}>Browse All Cards</div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8, flexWrap: "wrap" }}>
          <select value={unitFilter} onChange={e => setUnitFilter(e.target.value === "all" ? "all" : parseInt(e.target.value))} style={{ background: "#111118", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, padding: "7px 12px", fontSize: 12, color: "rgba(255,255,255,0.7)", cursor: "pointer", fontFamily: "'DM Sans'" }}>
            {UNITS.map(u => <option key={u.id} value={u.id}>{u.label}</option>)}
          </select>
          {[["all","All"], ["new","New"], ["wi","WI Only"], ["mastered","Mastered"]].map(([val, label]) => (
            <button key={val} className="filter-btn" onClick={() => setFilter(val)} style={{ padding: "6px 12px", borderRadius: 8, background: filter === val ? "rgba(167,139,250,0.12)" : "rgba(255,255,255,0.04)", border: `1px solid ${filter === val ? "rgba(167,139,250,0.3)" : "rgba(255,255,255,0.07)"}`, color: filter === val ? "#a78bfa" : "rgba(255,255,255,0.4)", fontSize: 12, fontFamily: "'DM Sans'" }}>{label}</button>
          ))}
        </div>
      </div>

      <div style={{ padding: "24px 40px" }}>
        <div style={{ marginBottom: 14, fontSize: 13, color: "rgba(255,255,255,0.35)" }}>{filteredBrowse.length} cards</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 12 }}>
          {filteredBrowse.map(c => {
            const state = cardStates[c.id];
            const mastered = state?.repetitions >= 3;
            const seen = !!state;
            return (
              <div key={c.id} className="browse-card" style={{ background: `${c.color}07`, border: `1px solid ${c.color}20`, borderRadius: 12, padding: "18px 20px" }}>
                <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
                  <span style={{ background: `${c.color}15`, color: c.color, padding: "2px 8px", borderRadius: 6, fontSize: 10, fontFamily: "'JetBrains Mono'" }}>{c.topic}</span>
                  {c.wiNote && <span style={{ background: "rgba(192,132,252,0.1)", color: "#c084fc", padding: "2px 8px", borderRadius: 6, fontSize: 10, fontFamily: "'JetBrains Mono'" }}>🏛 WI</span>}
                  {mastered && <span style={{ background: "rgba(0,200,150,0.1)", color: "#00c896", padding: "2px 8px", borderRadius: 6, fontSize: 10, fontFamily: "'JetBrains Mono'" }}>✓ Mastered</span>}
                  {!seen && <span style={{ background: "rgba(56,189,248,0.1)", color: "#38bdf8", padding: "2px 8px", borderRadius: 6, fontSize: 10, fontFamily: "'JetBrains Mono'" }}>New</span>}
                </div>
                <div style={{ fontSize: 13, fontWeight: 500, color: "rgba(255,255,255,0.8)", marginBottom: 8, lineHeight: 1.4 }}>{c.front}</div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", lineHeight: 1.5, whiteSpace: "pre-line" }}>{c.back.substring(0, 100)}{c.back.length > 100 ? "..." : ""}</div>
              </div>
            );
          })}
        </div>
        <div style={{ marginTop: 24, textAlign: "center" }}>
          <button onClick={() => startSession(filteredBrowse)} style={{ background: "#a78bfa", color: "#000", border: "none", padding: "13px 32px", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "'Syne'" }}>
            Study These {filteredBrowse.length} Cards →
          </button>
        </div>
      </div>
    </div>
  );

  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(FlashcardSystem));
</script>
</body>
</html>
