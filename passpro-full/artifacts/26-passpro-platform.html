    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: DS.ink, height: "100vh", display: "flex", flexDirection: "column", color: "#fff", overflow: "hidden" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .nav-item { cursor: pointer; border: none; transition: all 0.15s; width: 100%; text-align: left; display: flex; align-items: center; gap: 9px; padding: 8px 12px; border-radius: 8px; font-size: 13px; background: none; }
        .nav-item:hover { background: rgba(255,255,255,0.05) !important; }
        .top-btn { cursor: pointer; border: none; background: none; transition: all 0.15s; }
        .top-btn:hover { opacity: 0.7; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
        .screen-enter { animation: screenEnter 0.3s cubic-bezier(0.16,1,0.3,1) both; }
        @keyframes screenEnter { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
        .notif { animation: notifIn 0.3s ease both; }
        @keyframes notifIn { from { opacity:0; transform:translateY(-10px) scale(0.96); } to { opacity:1; transform:none; } }
        .artifact-row { cursor: pointer; transition: all 0.12s; border-radius: 8px; }
        .artifact-row:hover { background: rgba(255,255,255,0.04) !important; }
      `}</style>

      {/* ── TOPBAR ── */}
      <div style={{ height: 52, background: "#0a0a14", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", padding: "0 20px", gap: 14, flexShrink: 0, zIndex: 20 }}>
        <button className="top-btn" onClick={() => setSidebarOpen(o => !o)} style={{ color: "rgba(255,255,255,0.4)", fontSize: 18, padding: "4px 6px" }}>☰</button>
        <div style={{ fontFamily: "'Syne'", fontSize: 17, fontWeight: 800, letterSpacing: -0.5 }}>Pass<span style={{ color: DS.green }}>Pro</span></div>
        <div style={{ width: 1, height: 16, background: "rgba(255,255,255,0.1)" }} />
        <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.3)" }}>Wisconsin · Life Insurance</div>

        {/* Exam countdown */}
        <div style={{ marginLeft: "auto", display: "flex", gap: 10, alignItems: "center" }}>
          <div style={{ background: "rgba(245,158,11,0.1)", border: "1px solid rgba(245,158,11,0.2)", borderRadius: 20, padding: "4px 12px", fontFamily: "'JetBrains Mono'", fontSize: 11, color: DS.orange }}>📅 {STUDENT.daysUntil}d to exam</div>
          <div style={{ background: "rgba(245,158,11,0.1)", border: "1px solid rgba(245,158,11,0.2)", borderRadius: 20, padding: "4px 12px", fontFamily: "'JetBrains Mono'", fontSize: 11, color: DS.orange }}>🔥 {STUDENT.streakDays}</div>
          <button className="top-btn" onClick={() => setShowArtifacts(a => !a)} style={{ background: "rgba(167,139,250,0.1)", border: "1px solid rgba(167,139,250,0.25)", borderRadius: 20, padding: "5px 12px", fontFamily: "'JetBrains Mono'", fontSize: 11, color: DS.purple }}>25 Artifacts ✦</button>
          <div style={{ width: 30, height: 30, borderRadius: "50%", background: "linear-gradient(135deg, #a78bfa, #7c5cbf)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Syne'", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>A</div>
        </div>
      </div>

      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
        {/* ── SIDEBAR ── */}
        {sidebarOpen && (
          <div style={{ width: 210, background: "#0a0a12", borderRight: "1px solid rgba(255,255,255,0.05)", padding: "16px 10px", overflowY: "auto", flexShrink: 0, display: "flex", flexDirection: "column" }}>
            {/* Student card */}
            <div style={{ padding: "10px 12px", background: "rgba(0,200,150,0.06)", border: "1px solid rgba(0,200,150,0.12)", borderRadius: 10, marginBottom: 20 }}>
              <div style={{ fontFamily: "'Syne'", fontSize: 13, fontWeight: 700, marginBottom: 2 }}>{STUDENT.name} <span style={{ color: DS.green }}>·</span> {STUDENT.plan}</div>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.3)", letterSpacing: 1, marginBottom: 8 }}>{STUDENT.xpLevel} · {STUDENT.xp.toLocaleString()} XP</div>
              <div style={{ height: 3, background: "rgba(255,255,255,0.06)", borderRadius: 2, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${STUDENT.readiness}%`, background: DS.green, borderRadius: 2 }} />
              </div>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.25)", marginTop: 3 }}>{STUDENT.readiness}% exam ready</div>
            </div>

            {/* Nav items */}
            {NAV.map((item, i) => (
              <div key={item.id}>
                {item.section && <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 8, color: "rgba(255,255,255,0.18)", letterSpacing: 2, padding: "10px 12px 5px", textTransform: "uppercase" }}>{item.section}</div>}
                <button className="nav-item" onClick={() => navigate(item.id)} style={{ background: page === item.id ? "rgba(0,200,150,0.1)" : "transparent", color: page === item.id ? DS.green : "rgba(255,255,255,0.4)", fontWeight: page === item.id ? 500 : 400 }}>
                  <span style={{ fontSize: 14, width: 18, textAlign: "center" }}>{item.icon}</span>
                  <span style={{ fontSize: 12 }}>{item.label}</span>
                </button>
              </div>
            ))}

            {/* Compliance progress */}
            <div style={{ marginTop: "auto", padding: "12px", background: "rgba(192,132,252,0.06)", border: "1px solid rgba(192,132,252,0.12)", borderRadius: 9 }}>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 8, color: DS.wi, letterSpacing: 1.5, marginBottom: 5 }}>OCI COMPLIANCE</div>
              <div style={{ height: 4, background: "rgba(255,255,255,0.06)", borderRadius: 3, overflow: "hidden", marginBottom: 4 }}>
                <div style={{ height: "100%", width: "42.5%", background: DS.wi, borderRadius: 3 }} />
              </div>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.3)" }}>8.5h / 20h logged</div>
            </div>
          </div>
        )}

        {/* ── MAIN CONTENT ── */}
        <div style={{ flex: 1, overflowY: "auto", position: "relative" }}>
          <div className="screen-enter" key={page}>
            {screens[page]}
          </div>
        </div>

        {/* ── ARTIFACTS PANEL ── */}
        {showArtifacts && (
          <div style={{ width: 280, background: "#0a0a14", borderLeft: "1px solid rgba(255,255,255,0.06)", padding: "20px 16px", overflowY: "auto", flexShrink: 0 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ fontFamily: "'Syne'", fontSize: 15, fontWeight: 800 }}>All <span style={{ color: DS.purple }}>25</span> Artifacts</div>
              <button className="top-btn" onClick={() => setShowArtifacts(false)} style={{ color: "rgba(255,255,255,0.3)", fontSize: 16 }}>✕</button>
            </div>
            {["Product", "Business"].map(cat => (
              <div key={cat} style={{ marginBottom: 20 }}>
                <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.2)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>{cat}</div>
                {ARTIFACTS.filter(a => a.category === cat).map((a, i) => (
                  <div key={i} className="artifact-row" onClick={() => { if (a.nav) { navigate(a.nav); setShowArtifacts(false); } }} style={{ display: "flex", gap: 10, padding: "8px 10px", marginBottom: 2, opacity: a.nav ? 1 : 0.5 }}>
                    <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: a.nav ? DS.purple : "rgba(255,255,255,0.2)", minWidth: 24 }}>{a.id}</span>
                    <span style={{ fontSize: 12, color: a.nav ? "rgba(255,255,255,0.7)" : "rgba(255,255,255,0.35)" }}>{a.name}</span>
                    {a.nav && <span style={{ marginLeft: "auto", fontSize: 10, color: DS.green }}>→</span>}
                  </div>
                ))}
              </div>
            ))}
            <div style={{ padding: "12px 14px", background: "rgba(0,200,150,0.06)", border: "1px solid rgba(0,200,150,0.12)", borderRadius: 10, marginTop: 8, fontSize: 12, color: "rgba(255,255,255,0.4)", lineHeight: 1.6 }}>
              Artifacts with → are navigable in this demo. Business artifacts (specs, schemas, handoff docs) are standalone files.
            </div>
          </div>
        )}
      </div>

      {/* Notification toast */}
      {notification && (
        <div className="notif" style={{ position: "fixed", top: 64, right: 20, background: "#0f1018", border: "1px solid rgba(0,200,150,0.3)", borderRadius: 10, padding: "10px 16px", fontSize: 13, color: DS.green, fontFamily: "'JetBrains Mono'", zIndex: 100 }}>
          {notification}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(PassProPlatform));
</script>
</body>
</html>
