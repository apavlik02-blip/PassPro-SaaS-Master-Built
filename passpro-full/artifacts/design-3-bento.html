<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassPro — design-3-bento</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #06060c; } #root { min-height: 100vh; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const STUDENT = { name: "Amanda", readiness: 74, streak: 7, xp: 2840, daysLeft: 41, hours: 8.5, weak: ["Annuities", "Tax Treatment", "WI Security Fund"] };

function BentoGrid() {
  const [activeNav, setActiveNav] = useState("Dashboard");

  return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: "#f2f0eb", minHeight: "100vh", color: "#1a1a2e" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .bento { transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), box-shadow 0.25s; cursor: default; }
        .bento:hover { transform: scale(1.018); box-shadow: 0 16px 48px rgba(0,0,0,0.12) !important; }
        .nav-btn { cursor: pointer; border: none; transition: all 0.18s; font-family: 'DM Sans', sans-serif; border-radius: 10px; padding: 8px 14px; font-size: 13px; }
        .nav-btn:hover { background: rgba(0,0,0,0.06) !important; }
        .action-btn { cursor: pointer; border: none; transition: all 0.18s; font-family: 'DM Sans', sans-serif; }
        .action-btn:hover { opacity: 0.85; transform: scale(0.98); }
        .chip { cursor: pointer; transition: all 0.15s; }
        .chip:hover { transform: scale(1.05); }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
      `}</style>

      {/* ── TOP NAV ── */}
      <div style={{ background: "rgba(242,240,235,0.85)", backdropFilter: "blur(20px)", borderBottom: "1px solid rgba(0,0,0,0.08)", padding: "0 28px", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ display: "flex", alignItems: "center", height: 56, gap: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 28, height: 28, borderRadius: 8, background: "#1a1a2e", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>🎓</div>
            <div style={{ fontFamily: "'DM Sans'", fontWeight: 800, fontSize: 17, letterSpacing: -0.5, color: "#1a1a2e" }}>Pass<span style={{ color: "#00c896" }}>Pro</span></div>
          </div>
          <nav style={{ display: "flex", gap: 4, marginLeft: 8 }}>
            {["Dashboard", "Study", "Practice", "Flashcards", "AI Coach", "Progress"].map(item => (
              <button key={item} className="nav-btn" onClick={() => setActiveNav(item)} style={{ fontWeight: activeNav === item ? 600 : 400, background: activeNav === item ? "rgba(0,0,0,0.07)" : "transparent", color: activeNav === item ? "#1a1a2e" : "#666" }}>{item}</button>
            ))}
          </nav>
          <div style={{ marginLeft: "auto", display: "flex", gap: 10, alignItems: "center" }}>
            <div style={{ background: "rgba(245,158,11,0.12)", border: "1px solid rgba(245,158,11,0.3)", borderRadius: 20, padding: "5px 12px", fontSize: 12, color: "#b45309", fontWeight: 600 }}>📅 {STUDENT.daysLeft} days</div>
            <div style={{ width: 32, height: 32, borderRadius: "50%", background: "#1a1a2e", display: "flex", alignItems: "center", justifyContent: "center", color: "#00c896", fontWeight: 800, fontSize: 13 }}>A</div>
          </div>
        </div>
      </div>

      {/* ── BENTO GRID ── */}
      <div style={{ padding: "24px 28px", maxWidth: 1100, margin: "0 auto" }}>

        {/* Page title */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontFamily: "'DM Serif Display'", fontSize: 28, color: "#1a1a2e", letterSpacing: -0.5, marginBottom: 4 }}>Good morning, <em style={{ color: "#00c896" }}>{STUDENT.name}.</em></div>
          <div style={{ fontSize: 14, color: "#888" }}>Wisconsin Life Insurance · {STUDENT.daysLeft} days to exam · You're making great progress.</div>
        </div>

        {/* ROW 1 */}
        <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr", gap: 12, marginBottom: 12 }}>

          {/* Hero card — dark */}
          <div className="bento" style={{ background: "#1a1a2e", borderRadius: 24, padding: "28px", position: "relative", overflow: "hidden", boxShadow: "0 4px 20px rgba(0,0,0,0.12)" }}>
            <div style={{ position: "absolute", width: 180, height: 180, borderRadius: "50%", background: "radial-gradient(circle, rgba(0,200,150,0.25) 0%, transparent 70%)", top: -40, right: -20 }} />
            <div style={{ fontFamily: "'DM Serif Display'", fontSize: 32, color: "#fff", lineHeight: 1.1, letterSpacing: -1, marginBottom: 12, position: "relative" }}>
              You're {STUDENT.readiness}%<br /><em style={{ color: "#00c896" }}>exam ready.</em>
            </div>
            <div style={{ fontSize: 13, color: "rgba(255,255,255,0.5)", marginBottom: 20, lineHeight: 1.6 }}>Annuities is holding you back. One focused session today can push you to 80%.</div>
            <div style={{ display: "flex", gap: 8 }}>
              <button className="action-btn" style={{ background: "#00c896", color: "#000", padding: "9px 20px", borderRadius: 50, fontSize: 13, fontWeight: 700 }}>Continue →</button>
              <button className="action-btn" style={{ background: "rgba(255,255,255,0.1)", color: "#fff", padding: "9px 16px", borderRadius: 50, fontSize: 13 }}>Ask Coach</button>
            </div>
          </div>

          {/* Readiness */}
          <div className="bento" style={{ background: "#00c896", borderRadius: 24, padding: "22px", boxShadow: "0 4px 16px rgba(0,200,150,0.3)" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "rgba(0,0,0,0.4)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Readiness</div>
            <div style={{ fontFamily: "'DM Serif Display'", fontSize: 52, color: "#000", lineHeight: 0.9, letterSpacing: -2, marginBottom: 6 }}>{STUDENT.readiness}</div>
            <div style={{ fontFamily: "'DM Serif Display'", fontSize: 20, color: "rgba(0,0,0,0.5)", marginBottom: 12 }}>percent</div>
            <div style={{ fontSize: 11, fontWeight: 700, color: "rgba(0,0,0,0.5)" }}>↑ +3% this week</div>
          </div>

          {/* Streak */}
          <div className="bento" style={{ background: "#fff8e1", borderRadius: 24, padding: "22px", border: "1px solid #fde68a", boxShadow: "0 4px 16px rgba(245,158,11,0.15)" }}>
            <div style={{ fontSize: 32, marginBottom: 10 }}>🔥</div>
            <div style={{ fontFamily: "'DM Serif Display'", fontSize: 44, color: "#1a1a2e", lineHeight: 1, marginBottom: 4 }}>{STUDENT.streak}</div>
            <div style={{ fontSize: 13, color: "#b45309", fontWeight: 600 }}>day streak</div>
            <div style={{ fontSize: 10, color: "#d97706", marginTop: 8, fontWeight: 600, letterSpacing: 1 }}>KEEP IT GOING ✓</div>
          </div>

          {/* Days to exam */}
          <div className="bento" style={{ background: "#1a1a2e", borderRadius: 24, padding: "22px", boxShadow: "0 4px 16px rgba(0,0,0,0.15)" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.35)", letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Exam Date</div>
            <div style={{ fontFamily: "'DM Serif Display'", fontSize: 52, color: "#f59e0b", lineHeight: 0.9, letterSpacing: -2, marginBottom: 6 }}>{STUDENT.daysLeft}</div>
            <div style={{ fontFamily: "'DM Serif Display'", fontSize: 16, color: "rgba(255,255,255,0.4)", marginBottom: 12 }}>days away</div>
            <div style={{ height: 3, background: "rgba(255,255,255,0.08)", borderRadius: 10 }}>
              <div style={{ height: "100%", width: "65%", background: "#f59e0b", borderRadius: 10 }} />
            </div>
          </div>

        </div>

        {/* ROW 2 */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1.5fr 1fr", gap: 12, marginBottom: 12 }}>

          {/* XP & Level */}
          <div className="bento" style={{ background: "#f3e8ff", borderRadius: 24, padding: "22px", border: "1px solid #e9d5ff", boxShadow: "0 4px 16px rgba(167,139,250,0.15)" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#7c3aed", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>XP · Silver II</div>
            <div style={{ fontFamily: "'DM Serif Display'", fontSize: 44, color: "#1a1a2e", lineHeight: 1, letterSpacing: -1 }}>2,840</div>
            <div style={{ fontSize: 12, color: "#9333ea", fontWeight: 500, marginTop: 6 }}>+15 XP per session ✦</div>
            <div style={{ marginTop: 14, height: 4, background: "rgba(0,0,0,0.08)", borderRadius: 10 }}>
              <div style={{ height: "100%", width: "72%", background: "linear-gradient(90deg, #a78bfa, #7c3aed)", borderRadius: 10 }} />
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4, fontSize: 10, color: "#9333ea" }}>
              <span>Silver II</span><span>Gold →</span>
            </div>
          </div>

          {/* Progress */}
          <div className="bento" style={{ background: "#fff", borderRadius: 24, padding: "22px", border: "1px solid #e8e5df", boxShadow: "0 4px 16px rgba(0,0,0,0.05)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16, alignItems: "center" }}>
              <div style={{ fontFamily: "'DM Serif Display'", fontSize: 18, color: "#1a1a2e" }}>Curriculum</div>
              <div style={{ fontSize: 11, color: "#888" }}>5/8 units active</div>
            </div>
            {[
              { name: "Foundations", pct: 100, color: "#00c896" },
              { name: "Policy Types", pct: 100, color: "#00c896" },
              { name: "Provisions", pct: 62, color: "#f59e0b" },
              { name: "Annuities", pct: 30, color: "#f87171" },
              { name: "WI Regulations", pct: 35, color: "#c084fc" },
            ].map((m, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                <div style={{ width: 20, height: 20, borderRadius: "50%", background: m.pct === 100 ? "#00c896" : "#f2f0eb", border: `1.5px solid ${m.color}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: "#00c896", flexShrink: 0 }}>{m.pct === 100 ? "✓" : ""}</div>
                <div style={{ flex: 1, fontSize: 12, color: "#555", fontWeight: 500 }}>{m.name}</div>
                <div style={{ width: 80, height: 5, background: "#f0ede8", borderRadius: 10, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${m.pct}%`, background: m.color, borderRadius: 10 }} />
                </div>
                <div style={{ fontSize: 11, fontWeight: 700, color: m.color, minWidth: 28 }}>{m.pct}%</div>
              </div>
            ))}
          </div>

          {/* Weak areas */}
          <div className="bento" style={{ background: "#fff0f0", borderRadius: 24, padding: "22px", border: "1px solid #fecaca", boxShadow: "0 4px 16px rgba(248,113,113,0.1)" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#dc2626", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>Needs Work</div>
            {STUDENT.weak.map((t, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 12px", background: "#fff", border: "1px solid #fecaca", borderRadius: 12, marginBottom: 8, cursor: "pointer" }}>
                <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#f87171", flexShrink: 0 }} />
                <span style={{ fontSize: 12, fontWeight: 500, flex: 1, color: "#1a1a2e" }}>{t}</span>
                <span style={{ fontSize: 11, color: "#00c896", fontWeight: 700 }}>Drill →</span>
              </div>
            ))}
          </div>

        </div>

        {/* ROW 3 */}
        <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr 1fr", gap: 12 }}>

          {/* AI Coach */}
          <div className="bento" style={{ background: "linear-gradient(135deg, #0f172a, #1e1b4b)", borderRadius: 24, padding: "24px", boxShadow: "0 4px 24px rgba(30,27,75,0.3)" }}>
            <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 16 }}>
              <div style={{ width: 40, height: 40, borderRadius: "50%", background: "linear-gradient(135deg, #a78bfa, #7c5cbf)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>🎓</div>
              <div>
                <div style={{ fontFamily: "'DM Serif Display'", fontSize: 16, color: "#fff" }}>AI Coach</div>
                <div style={{ fontSize: 11, color: "#a78bfa" }}>● Online · WI Expert</div>
              </div>
            </div>
            <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 16, padding: "14px", marginBottom: 16, borderLeft: "2px solid #a78bfa" }}>
              <div style={{ fontSize: 13, color: "rgba(255,255,255,0.75)", lineHeight: 1.65 }}>
                Hey {STUDENT.name}! Your <strong style={{ color: "#fff" }}>Annuities</strong> mastery is at 45%. Let's do a focused drill — it'll take 15 min and push you to 65%+.
              </div>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
              {["▶ Start Drill", "💬 Ask Anything", "📋 My Plan", "🎯 Quiz Me"].map((c, i) => (
                <div key={i} className="chip" style={{ padding: "6px 13px", background: "rgba(167,139,250,0.15)", border: "1px solid rgba(167,139,250,0.3)", borderRadius: 20, fontSize: 12, color: "#c4b5fd" }}>{c}</div>
              ))}
            </div>
          </div>

          {/* OCI */}
          <div className="bento" style={{ background: "#fff", borderRadius: 24, padding: "22px", border: "1px solid #e0d9ff", boxShadow: "0 4px 16px rgba(192,132,252,0.1)" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#7c3aed", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>🏛 OCI Compliance</div>
            <div style={{ fontFamily: "'DM Serif Display'", fontSize: 38, color: "#1a1a2e", lineHeight: 1, marginBottom: 4 }}>{STUDENT.hours}h</div>
            <div style={{ fontSize: 12, color: "#888", marginBottom: 14 }}>of 20 hours required</div>
            <div style={{ height: 8, background: "#f3e8ff", borderRadius: 10, overflow: "hidden", marginBottom: 8 }}>
              <div style={{ height: "100%", width: `${(STUDENT.hours / 20) * 100}%`, background: "linear-gradient(90deg, #c084fc, #a78bfa)", borderRadius: 10 }} />
            </div>
            <div style={{ fontSize: 11, color: "#9333ea", fontWeight: 600 }}>42% complete · {(20 - STUDENT.hours).toFixed(1)}h remaining</div>
          </div>

          {/* Hours today */}
          <div className="bento" style={{ background: "#ecfdf5", borderRadius: 24, padding: "22px", border: "1px solid #a7f3d0", boxShadow: "0 4px 16px rgba(0,200,150,0.1)" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#065f46", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>Study Time</div>
            <div style={{ fontFamily: "'DM Serif Display'", fontSize: 44, color: "#1a1a2e", lineHeight: 1, marginBottom: 4 }}>38<span style={{ fontSize: 20, color: "#888" }}>m</span></div>
            <div style={{ fontSize: 12, color: "#059669", fontWeight: 600, marginBottom: 14 }}>today's session</div>
            <div style={{ display: "flex", gap: 4, alignItems: "flex-end" }}>
              {[20, 35, 45, 0, 38, 52, 48, 32, 55, 38].map((h, i) => (
                <div key={i} style={{ flex: 1, height: `${(h / 60) * 40 + 4}px`, background: i === 9 ? "#00c896" : h === 0 ? "#e5e7eb" : "#a7f3d0", borderRadius: 3 }} />
              ))}
            </div>
            <div style={{ fontSize: 10, color: "#888", marginTop: 6 }}>last 10 days</div>
          </div>

        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(BentoGrid));
</script>
</body>
</html>
