<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassPro — 02-system-architecture</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #06060c; } #root { min-height: 100vh; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const layers = [
  {
    label: "CLIENT",
    color: "#00c896",
    boxes: [
      { name: "Web App", sub: "React + Next.js", color: "rgba(0,200,150,0.12)", border: "rgba(0,200,150,0.25)", text: "#00c896" },
      { name: "iOS App", sub: "React Native (Phase 2)", color: "rgba(0,200,150,0.06)", border: "rgba(0,200,150,0.15)", text: "#4dd9b0" },
      { name: "Android App", sub: "React Native (Phase 2)", color: "rgba(0,200,150,0.06)", border: "rgba(0,200,150,0.15)", text: "#4dd9b0" },
    ]
  },
  {
    label: "API LAYER",
    color: "#38bdf8",
    boxes: [
      { name: "REST API", sub: "Node.js + Express", color: "rgba(56,189,248,0.12)", border: "rgba(56,189,248,0.25)", text: "#38bdf8" },
      { name: "Auth Service", sub: "Clerk / Auth0", color: "rgba(56,189,248,0.12)", border: "rgba(56,189,248,0.25)", text: "#38bdf8" },
      { name: "Payment Service", sub: "Stripe", color: "rgba(56,189,248,0.12)", border: "rgba(56,189,248,0.25)", text: "#38bdf8" },
      { name: "Email Service", sub: "Resend", color: "rgba(56,189,248,0.12)", border: "rgba(56,189,248,0.25)", text: "#38bdf8" },
    ]
  },
  {
    label: "AI LAYER",
    color: "#a78bfa",
    boxes: [
      { name: "AI Study Companion", sub: "Claude API (Sonnet)", color: "rgba(167,139,250,0.12)", border: "rgba(167,139,250,0.3)", text: "#a78bfa" },
      { name: "Roleplay Simulator", sub: "Claude API + Personas", color: "rgba(167,139,250,0.12)", border: "rgba(167,139,250,0.3)", text: "#a78bfa" },
      { name: "Gap Analysis Engine", sub: "Custom scoring model", color: "rgba(167,139,250,0.12)", border: "rgba(167,139,250,0.3)", text: "#a78bfa" },
      { name: "Voice Interface", sub: "Web Speech API (Phase 2)", color: "rgba(167,139,250,0.06)", border: "rgba(167,139,250,0.15)", text: "#c4b5fd" },
    ]
  },
  {
    label: "DATA",
    color: "#f59e0b",
    boxes: [
      { name: "PostgreSQL", sub: "Users, progress, exams", color: "rgba(245,158,11,0.12)", border: "rgba(245,158,11,0.25)", text: "#f59e0b" },
      { name: "Redis", sub: "Sessions, caching", color: "rgba(245,158,11,0.12)", border: "rgba(245,158,11,0.25)", text: "#f59e0b" },
      { name: "S3 / CDN", sub: "Videos, assets", color: "rgba(245,158,11,0.12)", border: "rgba(245,158,11,0.25)", text: "#f59e0b" },
      { name: "Vector DB", sub: "AI context (Pinecone)", color: "rgba(245,158,11,0.12)", border: "rgba(245,158,11,0.25)", text: "#f59e0b" },
    ]
  },
  {
    label: "INFRA",
    color: "rgba(255,255,255,0.5)",
    boxes: [
      { name: "Vercel", sub: "Frontend hosting", color: "rgba(255,255,255,0.04)", border: "rgba(255,255,255,0.1)", text: "rgba(255,255,255,0.7)" },
      { name: "Railway", sub: "API hosting", color: "rgba(255,255,255,0.04)", border: "rgba(255,255,255,0.1)", text: "rgba(255,255,255,0.7)" },
      { name: "Supabase", sub: "DB + Auth", color: "rgba(255,255,255,0.04)", border: "rgba(255,255,255,0.1)", text: "rgba(255,255,255,0.7)" },
      { name: "Cloudflare", sub: "CDN + DDoS", color: "rgba(255,255,255,0.04)", border: "rgba(255,255,255,0.1)", text: "rgba(255,255,255,0.7)" },
    ]
  }
];

const dataFlow = [
  { icon: "👤", label: "Student logs in", color: "#00c896" },
  { icon: "📱", label: "Client sends request", color: "#38bdf8" },
  { icon: "🔐", label: "Auth validates JWT", color: "#f59e0b" },
  { icon: "⚡", label: "API processes", color: "#38bdf8" },
  { icon: "🤖", label: "AI layer responds", color: "#a78bfa" },
  { icon: "💾", label: "DB persists state", color: "#f59e0b" },
  { icon: "📊", label: "Client renders", color: "#00c896" },
];

function SystemArchitecture() {
  const [activeLayer, setActiveLayer] = useState(null);
  const [view, setView] = useState("arch");

  return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: "#0a0a0f", minHeight: "100vh", color: "#fff" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .layer-row { transition: all 0.2s; cursor: pointer; border-radius: 12px; padding: 12px; }
        .layer-row:hover { background: rgba(255,255,255,0.02); }
        .arch-box { transition: transform 0.15s, box-shadow 0.15s; cursor: default; }
        .arch-box:hover { transform: scale(1.03); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .tab { cursor: pointer; border: none; transition: all 0.2s; }
        .flow-step { animation: floatIn 0.5s ease forwards; opacity: 0; }
        @keyframes floatIn { to { opacity: 1; transform: none; } from { opacity: 0; transform: translateY(10px); } }
      `}</style>

      {/* Header */}
      <div style={{ padding: "48px 40px 32px", borderBottom: "1px solid rgba(255,255,255,0.06)", background: "linear-gradient(to right, #0a0a0f, #0d0f1a)" }}>
        <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: "#a78bfa", letterSpacing: 3, textTransform: "uppercase", marginBottom: 12 }}>02 — System Architecture</div>
        <h1 style={{ fontFamily: "'Syne'", fontSize: "clamp(32px,5vw,56px)", fontWeight: 800, letterSpacing: -2, marginBottom: 12 }}>How the system<br />is <span style={{ color: "#a78bfa" }}>built</span></h1>
        <p style={{ color: "rgba(255,255,255,0.4)", fontSize: 14, maxWidth: 480, lineHeight: 1.7 }}>Cloud-native architecture with clear separation between frontend, API, AI services, and data. Designed to scale from 100 to 100,000 users.</p>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 4, padding: "20px 40px 0", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
        {["arch", "flow"].map(t => (
          <button key={t} className="tab" onClick={() => setView(t)} style={{ padding: "8px 18px", borderRadius: "6px 6px 0 0", fontSize: 13, fontFamily: "'DM Sans'", background: view === t ? "rgba(167,139,250,0.12)" : "transparent", color: view === t ? "#a78bfa" : "rgba(255,255,255,0.35)", borderBottom: view === t ? "2px solid #a78bfa" : "2px solid transparent" }}>
            {t === "arch" ? "Architecture Diagram" : "Data Flow"}
          </button>
        ))}
      </div>

      <div style={{ padding: "36px 40px" }}>
        {view === "arch" && (
          <div>
            <p style={{ fontSize: 13, color: "rgba(255,255,255,0.3)", marginBottom: 28, fontFamily: "'JetBrains Mono'" }}>Click any layer to highlight. Hover boxes for details.</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {layers.map((layer, li) => (
                <div key={li}>
                  <div className="layer-row" onClick={() => setActiveLayer(activeLayer === li ? null : li)} style={{ background: activeLayer === li ? "rgba(255,255,255,0.03)" : "transparent", border: activeLayer === li ? `1px solid ${layer.color}22` : "1px solid transparent" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                      <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: layer.color, letterSpacing: 2, minWidth: 72, textAlign: "right", opacity: 0.7 }}>{layer.label}</div>
                      <div style={{ width: 1, height: 40, background: `${layer.color}33` }} />
                      <div style={{ display: "flex", gap: 10, flex: 1, flexWrap: "wrap" }}>
                        {layer.boxes.map((box, bi) => (
                          <div key={bi} className="arch-box" style={{ background: box.color, border: `1px solid ${box.border}`, borderRadius: 10, padding: "12px 16px", minWidth: 140 }}>
                            <div style={{ fontSize: 13, fontWeight: 500, color: box.text }}>{box.name}</div>
                            <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.3)", marginTop: 3 }}>{box.sub}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                  {li < layers.length - 1 && (
                    <div style={{ display: "flex", alignItems: "center", padding: "4px 0 4px 90px" }}>
                      <div style={{ fontSize: 14, color: "rgba(255,255,255,0.12)" }}>↓</div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {view === "flow" && (
          <div>
            <p style={{ fontSize: 13, color: "rgba(255,255,255,0.3)", marginBottom: 36 }}>How a single student request flows through the entire system.</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
              {dataFlow.map((step, i) => (
                <div key={i} className="flow-step" style={{ animationDelay: `${i * 0.1}s`, display: "flex", alignItems: "center", gap: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 16, flex: 1, padding: "16px 24px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, margin: "4px 0" }}>
                    <div style={{ width: 44, height: 44, borderRadius: 12, background: `${step.color}15`, border: `1px solid ${step.color}30`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>{step.icon}</div>
                    <div>
                      <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: step.color, letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>Step {i + 1}</div>
                      <div style={{ fontSize: 15, fontWeight: 500 }}>{step.label}</div>
                    </div>
                    <div style={{ marginLeft: "auto", width: 8, height: 8, borderRadius: "50%", background: step.color, opacity: 0.6 }} />
                  </div>
                  {i < dataFlow.length - 1 && (
                    <div style={{ display: "none" }} />
                  )}
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(SystemArchitecture));
</script>
</body>
</html>
