  { id:10, domain:"Insurance Regulation", topic:"WI Guaranty", unit:8, difficulty:"medium", wi:true,

  { id:22, domain:"Insurance Regulation", topic:"Types of Insurers", unit:2, difficulty:"medium", wi:false,

  { id:23, domain:"Insurance Regulation", topic:"Agency Law", unit:2, difficulty:"medium", wi:false,

  { id:24, domain:"Insurance Regulation", topic:"Agency Law", unit:2, difficulty:"hard", wi:false,

  { id:28, domain:"Insurance Regulation", topic:"MIB", unit:3, difficulty:"medium", wi:false,

  { id:29, domain:"Insurance Regulation", topic:"Field Underwriting", unit:3, difficulty:"medium", wi:false,

  { id:30, domain:"Insurance Regulation", topic:"Field Underwriting", unit:3, difficulty:"medium", wi:false,

  { id:31, domain:"Insurance Regulation", topic:"WI Twisting", unit:8, difficulty:"medium", wi:true,

  { id:32, domain:"Insurance Regulation", topic:"Waiver & Estoppel", unit:1, difficulty:"hard", wi:false,

  { id:33, domain:"Insurance Regulation", topic:"Unfair Trade Practices", unit:8, difficulty:"medium", wi:true,

  // ── DOMAIN 2: LIFE INSURANCE BASICS (10 questions) ───────────────
  { id:36, domain:"Life Insurance Basics", topic:"Insurable Interest", unit:1, difficulty:"easy", wi:false,
    q:"In a life insurance contract, insurable interest must exist:",
    opts:["At the time of the claim only","At the time of application only","At both application and at the time of claim","Throughout the entire policy period"], correct:1,
    exp:"In life insurance, insurable interest must exist at the time of application — unlike property insurance where it must exist at the time of loss. It does NOT need to exist at the time of claim." },
  { id:37, domain:"Life Insurance Basics", topic:"Contract Elements", unit:1, difficulty:"medium", wi:false,
    q:"Which element of an insurance contract refers to the premium paid by the insured and the promise to pay claims by the insurer?",
    opts:["Offer and acceptance","Legal purpose","Consideration","Competent parties"], correct:2,
    exp:"Consideration is the exchange of value — the insured pays premiums, the insurer promises to pay claims. Both sides give something of value, which is a required element of any contract." },
  { id:38, domain:"Life Insurance Basics", topic:"Contract Characteristics", unit:1, difficulty:"medium", wi:false,
    q:"A life insurance contract is described as 'aleatory' because:",
    opts:["It is written by only one party","The exchange of value is unequal and based on chance","It can only be accepted as written","It requires utmost good faith"], correct:1,
    exp:"An aleatory contract involves unequal exchange based on chance. The insured pays relatively small premiums; the insurer may pay a much larger death benefit — or nothing — depending on whether a claim occurs." },
  { id:39, domain:"Life Insurance Basics", topic:"Representations", unit:1, difficulty:"hard", wi:true,
    q:"Under Wisconsin Statute s. 631.11, a misrepresentation on a life insurance application voids the policy if:",
    opts:["Any statement is false, regardless of materiality","It was made with intent to deceive OR materially affected the insurer's decision","It was made about the applicant's health only","It was discovered within the first year of the policy"], correct:1,
    exp:"Wisconsin s. 631.11 requires either intent to deceive OR material effect on the insurer's decision to void a policy — providing more protection to the insured than some other states." },
  { id:40, domain:"Life Insurance Basics", topic:"Human Life Value", unit:6, difficulty:"medium", wi:false,
    q:"The needs analysis approach to determining life insurance amounts considers:",
    opts:["Only the insured's annual income","Lump-sum needs plus income replacement needs minus existing assets","The insured's net worth only","Only outstanding debts at time of death"], correct:1,
    exp:"The needs analysis approach evaluates lump-sum needs (mortgage, debts, final expenses) plus income replacement needs for surviving dependents, minus existing assets and life insurance already in force." },
  { id:41, domain:"Life Insurance Basics", topic:"Key Person Insurance", unit:6, difficulty:"medium", wi:false,
    q:"In key person life insurance, the business is which of the following?",
    opts:["Insured only","Owner, premium payer, and beneficiary","Beneficiary only","Owner and insured only"], correct:1,
    exp:"In key person insurance, the BUSINESS is the owner, pays the premiums, and is the beneficiary. The key employee is the insured. The death benefit compensates the business for the loss of the key person." },
  { id:42, domain:"Life Insurance Basics", topic:"Life Settlements", unit:3, difficulty:"medium", wi:true,
    q:"A life settlement differs from surrendering a policy to the insurer because a life settlement:",
    opts:["Pays less than the cash surrender value","Pays more than the cash surrender value","Has no tax consequences","Can only be used by people under age 65"], correct:1,
    exp:"A life settlement pays the policyowner more than the cash surrender value (but less than the death benefit) by selling the policy to a third-party investor. This is the primary advantage over surrender." },
  { id:43, domain:"Life Insurance Basics", topic:"Life Settlements", unit:3, difficulty:"hard", wi:true,
    q:"Under Wisconsin law (s. 632.69), a policyowner who completes a life settlement has how many days to rescind the transaction?",
    opts:["3 days","10 days","15 days","30 days"], correct:2,
    exp:"Wisconsin's life settlement law (s. 632.69) provides a 15-day right of rescission after the settlement is executed. The policyowner can cancel and have their policy returned within this period." },
  { id:44, domain:"Life Insurance Basics", topic:"STOLI", unit:3, difficulty:"hard", wi:false,
    q:"Stranger-Originated Life Insurance (STOLI) is illegal primarily because:",
    opts:["It involves selling a policy for more than its cash value","The investor has no insurable interest in the insured's life","Life settlements are not permitted","The insurer was not notified of the transfer"], correct:1,
    exp:"STOLI violates the insurable interest requirement — the foundation of all legitimate insurance. An investor speculating on a stranger's death has no insurable interest, making the arrangement void and fraudulent." },
  { id:45, domain:"Life Insurance Basics", topic:"Business Uses", unit:6, difficulty:"hard", wi:false,
    q:"A cross-purchase buy-sell agreement is funded by life insurance where:",
    opts:["The business purchases insurance on each owner","Each business owner purchases insurance on the other owner(s)","A trustee purchases insurance on behalf of all owners","Employees purchase insurance on the owners"], correct:1,
    exp:"In a cross-purchase plan, each owner purchases life insurance on the other owners. At death, the surviving owner(s) use the death benefit to purchase the deceased's business interest from the estate." },

  // ── DOMAIN 3: LIFE INSURANCE POLICIES (12 questions) ─────────────
  { id:46, domain:"Life Insurance Policies", topic:"Term Life", unit:2, difficulty:"easy", wi:false,

  { id:48, domain:"Life Insurance Policies", topic:"Whole Life", unit:2, difficulty:"medium", wi:false,

    opts:["Premiums never change","The policy can pay dividends to the owner","Coverage ends at age 65","No cash value accumulation"], correct:1,
    exp:"Participating policies (issued by mutual companies) allow policyowners to receive dividends, which represent a return of excess premiums when the insurer performs better than expected." },
  { id:49, domain:"Life Insurance Policies", topic:"Whole Life", unit:2, difficulty:"medium", wi:false,
    q:"A '20-pay life' policy is best described as:",

    exp:"20-pay life is a limited-payment whole life policy where premiums are paid for 20 years. After that, the policy is fully paid up — no more premiums are due, but coverage continues for life." },
  { id:50, domain:"Life Insurance Policies", topic:"Universal Life", unit:2, difficulty:"medium", wi:false,
    q:"Which of the following is a flexible element of a universal life policy?",
    opts:["The mortality charge","The face amount at death — which can be adjusted","The cost of insurance table","The insurer's expense loading"], correct:1,
    exp:"Universal life offers flexible premiums, adjustable death benefits (increase with evidence of insurability, decrease without), and accessible cash value — all distinguishing features from traditional whole life." },
  { id:51, domain:"Life Insurance Policies", topic:"Variable Life", unit:2, difficulty:"medium", wi:false,
    q:"The cash value of a variable life insurance policy is invested in:",
    opts:["The insurer's general account","Separate accounts selected by the policyowner","Fixed-rate certificates issued by the insurer","Government bonds only"], correct:1,
    exp:"Variable life cash values are invested in separate accounts — sub-accounts resembling mutual funds — selected by the policyowner. The policyowner bears the investment risk." },
  { id:52, domain:"Life Insurance Policies", topic:"Group Life", unit:2, difficulty:"medium", wi:false,
    q:"Under a group life insurance plan, when an employee leaves the employer, they typically have the right to:",
    opts:["Continue the group coverage indefinitely","Convert to an individual permanent policy without evidence of insurability","Keep the exact same group policy","Receive a refund of all premiums paid"], correct:1,
    exp:"Group life conversion rights allow a departing employee to convert their group coverage to an individual permanent policy without evidence of insurability — within a specified period (usually 31 days)." },
  { id:53, domain:"Life Insurance Policies", topic:"Joint Life", unit:2, difficulty:"medium", wi:false,
    q:"A joint life (first-to-die) policy pays the death benefit:",
    opts:["When the last insured dies","When the first insured dies","Equally upon the death of each insured","Only after both insureds have died"], correct:1,
    exp:"A joint life (first-to-die) policy covers two or more lives and pays the death benefit upon the death of the FIRST insured to die. It is commonly used by business partners in buy-sell arrangements." },
  { id:54, domain:"Life Insurance Policies", topic:"Credit Life", unit:2, difficulty:"easy", wi:false,
    q:"Credit life insurance is best described as:",
    opts:["Life insurance that builds cash value equal to outstanding debt","Decreasing term that pays off a loan balance if the borrower dies","Universal life tied to a revolving line of credit","Group whole life purchased through credit unions"], correct:1,
    exp:"Credit life insurance is decreasing term insurance designed to pay off a specific loan balance if the borrower dies before the loan is repaid. Coverage decreases as the loan balance decreases." },
  { id:55, domain:"Life Insurance Policies", topic:"Juvenile Life", unit:2, difficulty:"easy", wi:false,
    q:"Juvenile life insurance is typically purchased by:",
    opts:["The minor child as owner and insured","The parent as owner with the child as insured","The grandparent as insured with the child as beneficiary","The child's employer as a group benefit"], correct:1,
    exp:"In juvenile life insurance, the parent (or guardian) is the policyowner and pays premiums, while the child is the insured. The parent typically owns the policy until the child reaches adulthood." },
  { id:56, domain:"Life Insurance Policies", topic:"Endowment", unit:2, difficulty:"medium", wi:false,
    q:"An endowment policy pays the face amount:",
    opts:["Only upon the death of the insured","When the cash value equals the face amount, or at death","Only if the insured outlives the policy term","Upon retirement at age 65 only"], correct:1,
    exp:"An endowment policy pays the face amount either upon the death of the insured OR when the policy endows (when the cash value equals the face amount at the end of the endowment period) — whichever comes first." },
  { id:57, domain:"Life Insurance Policies", topic:"Term Life", unit:2, difficulty:"medium", wi:false,
    q:"A return of premium (ROP) term life policy:",
    opts:["Refunds premiums if the insured becomes disabled","Returns all premiums paid if the insured outlives the term","Pays a reduced death benefit equal to premiums paid","Is a form of whole life insurance"], correct:1,

const fmtTime = (s) => {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return h > 0
    ? `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`
    : `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
};

function ExamSimulation() {
  const [phase, setPhase] = useState("intro"); // intro | exam | review | results
  const [answers, setAnswers] = useState({});
  const [flagged, setFlagged] = useState(new Set());
  const [current, setCurrent] = useState(0);
  const [timeLeft, setTimeLeft] = useState(TIME_LIMIT);
  const [showConfirm, setShowConfirm] = useState(false);
  const [filter, setFilter] = useState("all");
  const timerRef = useRef(null);
  const scrollRef = useRef(null);

  useEffect(() => {
    if (phase === "exam") {
      timerRef.current = setInterval(() => {
        setTimeLeft(t => {
          if (t <= 1) { clearInterval(timerRef.current); submitExam(); return 0; }
          return t - 1;
        });
      }, 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [phase]);

  const submitExam = () => { clearInterval(timerRef.current); setPhase("results"); };

  const answered = Object.keys(answers).length;
  const score = QUESTION_BANK.filter((q, i) => answers[i] === q.correct).length;
  const pct = Math.round((score / TOTAL_Q) * 100);
  const passed = pct >= 70;
  const timeUsed = TIME_LIMIT - timeLeft;
  const timePct = Math.round((timeUsed / TIME_LIMIT) * 100);

  // Domain breakdown for results
  const domainResults = Object.keys(DOMAIN_INFO).map(domain => {
    const domainQs = QUESTION_BANK.map((q, i) => ({ ...q, idx: i })).filter(q => q.domain === domain);
    const correct = domainQs.filter(q => answers[q.idx] === q.correct).length;
    return { domain, correct, total: domainQs.length, pct: domainQs.length ? Math.round((correct / domainQs.length) * 100) : 0, ...DOMAIN_INFO[domain] };
  }).filter(d => d.total > 0);

  const wiQs = QUESTION_BANK.map((q, i) => ({ ...q, idx: i })).filter(q => q.wi);
  const wiScore = wiQs.filter(q => answers[q.idx] === q.correct).length;
  const wiPct = Math.round((wiScore / wiQs.length) * 100);

  const q = QUESTION_BANK[current];
  const isFlagged = flagged.has(current);

  const navigate = (idx) => { setCurrent(idx); scrollRef.current?.scrollTo(0, 0); };

  const filteredForReview = QUESTION_BANK.map((q, i) => ({ ...q, idx: i })).filter(q => {
    if (filter === "flagged") return flagged.has(q.idx);
    if (filter === "wrong") return answers[q.idx] !== undefined && answers[q.idx] !== q.correct;
    if (filter === "correct") return answers[q.idx] === q.correct;
    if (filter === "wi") return q.wi;
    return true;
  });

  // ── INTRO SCREEN ─────────────────────────────────────────────────
  if (phase === "intro") return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: "#06060c", minHeight: "100vh", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", padding: 32 }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap'); * { box-sizing: border-box; margin: 0; padding: 0; } .btn { cursor: pointer; border: none; transition: all 0.18s; } .btn:hover { transform: scale(1.02); opacity: 0.9; } .rule-row { animation: fadeUp 0.3s ease both; } @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }`}</style>
      <div style={{ maxWidth: 640, width: "100%" }}>
        <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 11, color: "#a78bfa", letterSpacing: 3, textTransform: "uppercase", marginBottom: 14 }}>27 — Wisconsin Exam Simulation</div>

            const unanswered = userAnswer === undefined;
            return (
              <div key={q.id} style={{ background: "#0d0d14", border: `1px solid ${isCorrect ? "rgba(0,200,150,0.15)" : unanswered ? "rgba(255,255,255,0.07)" : "rgba(248,113,113,0.15)"}`, borderRadius: 12, padding: "16px 20px" }}>
                <div style={{ display: "flex", gap: 10, marginBottom: 10, flexWrap: "wrap", alignItems: "center" }}>
                  <div style={{ width: 24, height: 24, borderRadius: "50%", background: isCorrect ? "rgba(0,200,150,0.15)" : unanswered ? "rgba(255,255,255,0.08)" : "rgba(248,113,113,0.15)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, color: isCorrect ? "#00c896" : unanswered ? "rgba(255,255,255,0.3)" : "#f87171", flexShrink: 0 }}>
                    {isCorrect ? "✓" : unanswered ? "—" : "✗"}
                  </div>
                  <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.3)" }}>Q{q.idx + 1}</span>
                  <span style={{ background: `${DOMAIN_INFO[q.domain]?.color}15`, color: DOMAIN_INFO[q.domain]?.color, padding: "2px 8px", borderRadius: 6, fontSize: 10, fontFamily: "'JetBrains Mono'" }}>{q.topic}</span>
                  {q.wi && <span style={{ background: "rgba(192,132,252,0.1)", color: "#c084fc", padding: "2px 8px", borderRadius: 6, fontSize: 10, fontFamily: "'JetBrains Mono'" }}>🏛 WI</span>}
                  {flagged.has(q.idx) && <span style={{ color: "#f59e0b", fontSize: 12 }}>🚩</span>}
                </div>
                <div style={{ fontSize: 13, fontWeight: 500, color: "rgba(255,255,255,0.8)", marginBottom: 10, lineHeight: 1.5 }}>{q.q}</div>
                {!isCorrect && userAnswer !== undefined && (
                  <div style={{ fontSize: 12, color: "#f87171", marginBottom: 4 }}>✗ Your answer: {q.opts[userAnswer]}</div>
                )}
                <div style={{ fontSize: 12, color: "#00c896", marginBottom: 8 }}>✓ Correct: {q.opts[q.correct]}</div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", lineHeight: 1.65, padding: "10px 12px", background: "rgba(255,255,255,0.02)", borderRadius: 7 }}>{q.exp}</div>
              </div>
            );
          })}
        </div>

        {/* Bottom actions */}
        <div style={{ display: "flex", gap: 12, paddingBottom: 40 }}>
          <button className="btn" onClick={() => { setAnswers({}); setFlagged(new Set()); setCurrent(0); setTimeLeft(TIME_LIMIT); setFilter("all"); setPhase("intro"); }} style={{ flex: 1, background: "#a78bfa", color: "#000", padding: "14px", borderRadius: 10, fontSize: 14, fontWeight: 700, fontFamily: "'Syne'" }}>↺ Retake Exam</button>
          <button className="btn" onClick={() => { setAnswers({}); setFlagged(new Set()); setCurrent(0); setTimeLeft(TIME_LIMIT); setFilter("all"); setPhase("exam"); }} style={{ flex: 1, background: "rgba(167,139,250,0.1)", border: "1px solid rgba(167,139,250,0.25)", color: "#a78bfa", padding: "14px", borderRadius: 10, fontSize: 14, fontWeight: 600, fontFamily: "'Syne'" }}>New Exam Attempt</button>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ExamSimulation));
</script>
</body>
</html>
