const anthropic = new Anthropic({
  apiKey: process.env.ANTHROPIC_API_KEY,
});

interface AICallOptions {
  systemPrompt: string;
  messages: { role: "user" | "assistant"; content: string }[];
  maxTokens?: number;
  stream?: boolean;
  userId: string;
  sessionType: "companion" | "roleplay" | "generate";
}

export async function callAI(opts: AICallOptions) {
  const start = Date.now();

  try {
    const response = await anthropic.messages.create({
      model: "claude-sonnet-4-20250514",
      max_tokens: opts.maxTokens ?? 1024,
      system: opts.systemPrompt,
      messages: opts.messages,
      stream: opts.stream ?? false,
    });

    // Log cost + latency to analytics
    await logAICall({
      userId: opts.userId,
      sessionType: opts.sessionType,
      inputTokens: response.usage?.input_tokens ?? 0,
      outputTokens: response.usage?.output_tokens ?? 0,
      latencyMs: Date.now() - start,
    });

    return response;
  } catch (err) {
    // Retry on rate limit, throw on other errors
    if (err.status === 429) return retryWithBackoff(opts);
    throw err;
  }
}`,

export async function checkCertificateEligibility(userId: string) {
  const sessions = await db.complianceSession.findMany({
    where: { userId, verified: true },
  });

  const totalMinutes = sessions.reduce(
    (sum, s) => sum + Math.floor(s.durationSec / 60), 0
  );

  const wiMinutes = sessions
    .filter(s => s.unitId === 8)
    .reduce((sum, s) => sum + Math.floor(s.durationSec / 60), 0);

  const eligible = totalMinutes >= 1200 && wiMinutes >= 480;

  if (eligible) {
    await generateAndEmailCertificate(userId, {
      totalHours: (totalMinutes / 60).toFixed(1),
      completionDate: new Date().toISOString(),
      expiryDate: addMonths(new Date(), 12).toISOString(),
      state: "WI",
      courseApprovalNumber: "OCI-WI-XXXX", // OCI assigned
    });
  }

  return { eligible, totalMinutes, wiMinutes };
}`,

export function useSessionTimer(sessionId: string) {
  const lastActivity = useRef(Date.now());
  const warningShown = useRef(false);

  // Track user activity
  useEffect(() => {
    const reset = () => {
      lastActivity.current = Date.now();
      warningShown.current = false;
    };
    window.addEventListener("mousemove", reset);
    window.addEventListener("keydown", reset);
    window.addEventListener("click", reset);
    return () => { /* cleanup */ };
  }, []);

  // Heartbeat every 60 seconds
  useEffect(() => {
    const interval = setInterval(async () => {
      const inactive = Date.now() - lastActivity.current;

      if (inactive > 25 * 60 * 1000 && !warningShown.current) {
        warningShown.current = true;
        showInactivityWarning(); // UI warning modal
      }

      if (inactive > 30 * 60 * 1000) {
        await endSession(sessionId); // Auto-end, don't count inactive time
        return;
      }

      await fetch(\`/api/sessions/\${sessionId}/heartbeat\`, {
        method: "PUT"
      });
    }, 60_000);

    return () => clearInterval(interval);
  }, [sessionId]);
}`,
