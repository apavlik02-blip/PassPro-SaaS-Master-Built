// DESIGN 1: GLASSMORPHIC AURORA
// ══════════════════════════════════════════════════════════════════
const GlassmorphicDesign = () => (

      .float { animation: float 6s ease-in-out infinite; }

    {/* Content */}
    <div style={{ position: "relative", padding: "28px 28px 24px", zIndex: 1 }}>
      {/* Header glass pill */}

const DESIGN_COMPONENTS = {
  glassmorphic: GlassmorphicDesign,
  brutalist: BrutalistDesign,
  bento: BentoDesign,
  organic: OrganicDesign,
  terminal: TerminalDesign,
};

function DesignAlternatives() {
  const [active, setActive] = useState("glassmorphic");
  const [comparing, setComparing] = useState(false);
  const [compareWith, setCompareWith] = useState("bento");

  const ActiveComponent = DESIGN_COMPONENTS[active];
  const CompareComponent = DESIGN_COMPONENTS[compareWith];

        .design-btn { cursor: pointer; border: none; transition: all 0.2s; }
        .design-btn:hover { transform: translateY(-2px); }
        .action-btn { cursor: pointer; border: none; transition: all 0.15s; }
        .action-btn:hover { opacity: 0.8; }
        .fade { animation: fadeIn 0.4s ease both; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: none; } }
      `}</style>

      {/* Header */}
      <div style={{ padding: "32px 40px 24px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>

            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: active === d.id ? "#00c896" : "rgba(255,255,255,0.75)", textAlign: "left" }}>{d.name}</div>
              <div style={{ fontSize: 10, color: active === d.id ? "rgba(0,200,150,0.6)" : "rgba(255,255,255,0.3)", fontFamily: "'JetBrains Mono'", letterSpacing: 0.5 }}>{d.tag}</div>
            </div>
            {active === d.id && <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#00c896", flexShrink: 0 }} />}
          </button>
        ))}
      </div>

      {/* Compare selector */}
      {comparing && (
        <div style={{ padding: "10px 40px", borderBottom: "1px solid rgba(255,255,255,0.06)", background: "rgba(0,200,150,0.04)", display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
          <span style={{ fontSize: 12, color: "rgba(255,255,255,0.4)" }}>Compare with:</span>

            <button key={d.id} className="design-btn" onClick={() => setCompareWith(d.id)} style={{ padding: "6px 14px", borderRadius: 8, background: compareWith === d.id ? "rgba(167,139,250,0.12)" : "rgba(255,255,255,0.04)", border: `1px solid ${compareWith === d.id ? "rgba(167,139,250,0.3)" : "rgba(255,255,255,0.07)"}`, color: compareWith === d.id ? "#a78bfa" : "rgba(255,255,255,0.45)", fontSize: 12, fontFamily: "'DM Sans'" }}>{d.name}</button>

              </div>
              <div className="fade" key={active}><ActiveComponent /></div>
            </div>
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
                <div style={{ fontFamily: "'Syne'", fontSize: 16, fontWeight: 700 }}>{DESIGNS.find(d => d.id === compareWith)?.name}</div>

              </div>
              <div className="fade" key={compareWith}><CompareComponent /></div>
            </div>
          </div>
        )}

        {/* Design notes */}
        <div style={{ marginTop: 24, display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 10 }}>

            <div key={d.id} onClick={() => setActive(d.id)} style={{ padding: "14px 16px", background: active === d.id ? "rgba(0,200,150,0.07)" : "rgba(255,255,255,0.02)", border: `1px solid ${active === d.id ? "rgba(0,200,150,0.2)" : "rgba(255,255,255,0.06)"}`, borderRadius: 12, cursor: "pointer", transition: "all 0.15s" }}>

                <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 9, color: "rgba(255,255,255,0.3)" }}>{d.tag}</div>

              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", lineHeight: 1.5 }}>{d.desc}</div>
            </div>
          ))}
        </div>

}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(DesignAlternatives));
</script>
