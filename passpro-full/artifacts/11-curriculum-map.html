                  <div style={{ padding: "8px 16px 16px", background: `${unit.color}06` }}>
                    {unit.modules.map((mod, mi) => (
                      <div key={mi}>
                        <div className="module-row" onClick={() => setExpandedModule(expandedModule === `${ui}-${mi}` ? null : `${ui}-${mi}`)} style={{ padding: "12px 14px", display: "flex", alignItems: "center", gap: 12, marginTop: 4 }}>
                          <div style={{ width: 28, height: 28, borderRadius: 7, background: `${unit.color}18`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                            <span style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: unit.color }}>{mod.id}</span>
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 14, fontWeight: 500, color: "rgba(255,255,255,0.85)" }}>{mod.title}</div>
                            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", marginTop: 2 }}>{mod.lessons.length} items · {mod.duration}</div>
                          </div>
                          <div style={{ background: mod.type === "state" ? "rgba(192,132,252,0.1)" : "rgba(255,255,255,0.05)", color: mod.type === "state" ? "#c084fc" : "rgba(255,255,255,0.3)", padding: "3px 10px", borderRadius: 10, fontSize: 10, fontFamily: "'JetBrains Mono'" }}>{mod.type === "state" ? "STATE" : "CORE"}</div>
                          <span style={{ color: "rgba(255,255,255,0.15)", fontSize: 12 }}>{expandedModule === `${ui}-${mi}` ? "▲" : "▼"}</span>
                        </div>

                        {/* Lessons */}
                        {expandedModule === `${ui}-${mi}` && (
                          <div style={{ margin: "4px 14px 8px 54px", display: "flex", flexDirection: "column", gap: 4 }}>
                            {mod.lessons.map((lesson, li) => {
                              const ts = lessonTypeStyle[lesson.type];
                              return (
                                <div key={li} className="lesson-row" style={{ animationDelay: `${li * 0.04}s`, display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)", borderRadius: 7 }}>
                                  <div style={{ background: ts.bg, color: ts.color, padding: "2px 7px", borderRadius: 6, fontSize: 9, fontFamily: "'JetBrains Mono'", fontWeight: 600, minWidth: 44, textAlign: "center", flexShrink: 0 }}>{ts.label}</div>
                                  <span style={{ fontSize: 13, color: "rgba(255,255,255,0.6)" }}>{lesson.title}</span>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {/* UNIT OVERVIEW */}
        {view === "overview" && (
          <div>
            <p style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", marginBottom: 28 }}>Exam weight distribution and time estimates across all 8 units.</p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 14 }}>
              {curriculum.map((unit, i) => (
                <div key={i} style={{ background: "#111118", border: `1px solid ${unit.color}20`, borderRadius: 14, padding: 22, position: "relative", overflow: "hidden" }}>
                  <div style={{ position: "absolute", top: 12, right: 16, fontFamily: "'Syne'", fontSize: 56, fontWeight: 800, color: unit.color, opacity: 0.06, lineHeight: 1 }}>{unit.unit}</div>
                  <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: unit.color, letterSpacing: 2, textTransform: "uppercase", marginBottom: 8 }}>Unit {unit.unit}</div>
                  <div style={{ fontFamily: "'Syne'", fontSize: 15, fontWeight: 700, marginBottom: 14, lineHeight: 1.3 }}>{unit.title}</div>
                  <div style={{ display: "flex", gap: 10, marginBottom: 14, flexWrap: "wrap" }}>
                    <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 8, padding: "6px 10px", fontSize: 12, color: "rgba(255,255,255,0.5)" }}>{unit.modules.length} modules</div>
                    <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 8, padding: "6px 10px", fontSize: 12, color: "rgba(255,255,255,0.5)" }}>{unit.estimatedHours}h</div>
                    {unit.stateSpecific && <div style={{ background: "rgba(192,132,252,0.1)", border: "1px solid rgba(192,132,252,0.2)", borderRadius: 8, padding: "6px 10px", fontSize: 11, color: "#c084fc", fontFamily: "'JetBrains Mono'" }}>WI Only</div>}
                  </div>
                  <div style={{ height: 6, background: "rgba(255,255,255,0.06)", borderRadius: 4, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: `${(unit.estimatedHours / totalHours) * 100}%`, background: unit.color, borderRadius: 4 }} />
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
                    <span style={{ fontSize: 11, color: "rgba(255,255,255,0.25)" }}>{((unit.estimatedHours / totalHours) * 100).toFixed(0)}% of total time</span>
                    <span style={{ fontSize: 11, color: unit.color, fontFamily: "'JetBrains Mono'" }}>{unit.examWeight} exam</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* STATE LAYER */}
        {view === "state" && (
          <div>
            <div style={{ background: "rgba(192,132,252,0.07)", border: "1px solid rgba(192,132,252,0.2)", borderLeft: "3px solid #c084fc", borderRadius: 10, padding: "18px 24px", marginBottom: 28 }}>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "#c084fc", letterSpacing: 2, marginBottom: 6 }}>WISCONSIN STATE REGULATION LAYER</div>
              <p style={{ fontSize: 14, color: "rgba(255,255,255,0.6)", lineHeight: 1.7 }}>
                Unit 8 is <strong style={{ color: "#fff" }}>100% Wisconsin-specific</strong>. When a student selects WI at signup, this content is automatically injected into their curriculum. Units 1–7 are universal core content that applies to all states, with <strong style={{ color: "#c084fc" }}>Wisconsin-specific callouts</strong> embedded within relevant lessons.
              </p>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {curriculum.find(u => u.stateSpecific)?.modules.map((mod, i) => (
                <div key={i} style={{ background: "#111118", border: "1px solid rgba(192,132,252,0.15)", borderRadius: 12, padding: "20px 24px" }}>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
                    <div style={{ width: 36, height: 36, borderRadius: 9, background: "rgba(192,132,252,0.12)", border: "1px solid rgba(192,132,252,0.25)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'JetBrains Mono'", fontSize: 11, color: "#c084fc", flexShrink: 0 }}>{mod.id}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontFamily: "'Syne'", fontSize: 15, fontWeight: 700, marginBottom: 6 }}>{mod.title}</div>
                      <div style={{ fontSize: 12, color: "rgba(255,255,255,0.3)", marginBottom: 12 }}>{mod.lessons.length} items · {mod.duration}</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                        {mod.lessons.map((lesson, li) => {
                          const ts = lessonTypeStyle[lesson.type];
                          return (
                            <div key={li} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "rgba(255,255,255,0.55)" }}>
                              <div style={{ background: ts.bg, color: ts.color, padding: "1px 7px", borderRadius: 5, fontSize: 9, fontFamily: "'JetBrains Mono'", minWidth: 40, textAlign: "center", flexShrink: 0 }}>{ts.label}</div>
                              {lesson.title}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(CurriculumMap));
</script>
</body>
</html>
