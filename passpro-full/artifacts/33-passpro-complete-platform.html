);

const StatusBadge = ({ status }) => {
  const cfg = {
    on_track: { label: "On Track", color: T.purple },
    exam_ready: { label: "Exam Ready", color: T.blue },
    at_risk: { label: "At Risk ⚠", color: T.amber },
    inactive: { label: "Inactive 🔴", color: T.red },
    passed: { label: "Passed ✓", color: T.green },
  }[status] || { label: status, color: T.textDim };
  return <Badge label={cfg.label} color={cfg.color} />;
};

const Card = ({ children, style, onClick, hover = true }) => (
  <div onClick={onClick} style={{ background: T.bgCard, border: `1px solid ${T.border}`, borderRadius: 18, transition: hover ? "transform 0.25s cubic-bezier(0.16,1,0.3,1), box-shadow 0.25s, background 0.2s" : "none", cursor: onClick ? "pointer" : "default", ...style }}
    onMouseEnter={e => { if (hover) { e.currentTarget.style.transform = "translateY(-3px)"; e.currentTarget.style.boxShadow = "0 16px 40px rgba(0,0,0,0.3)"; if (onClick) e.currentTarget.style.background = T.bgHover; } }}
    onMouseLeave={e => { if (hover) { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = ""; e.currentTarget.style.background = T.bgCard; } }}>
    {children}
  </div>
);

const StatCard = ({ label, value, sub, color, icon }) => (
  <Card style={{ padding: "16px 18px", border: `1px solid ${color}20` }}>
    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
      <div style={{ fontSize: 9, color: T.textDim, letterSpacing: 2, textTransform: "uppercase", fontWeight: 600 }}>{label}</div>
      <span style={{ fontSize: 16 }}>{icon}</span>
    </div>
    <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 28, color, lineHeight: 1, marginBottom: 4 }}>{value}</div>
    {sub && <div style={{ fontSize: 11, color: T.textMuted }}>{sub}</div>}
  </Card>
);

// ── PRACTICE PAGE ─────────────────────────────────────────────
const PagePractice = () => {
  const [mode, setMode] = useState(null);
  const [qIdx, setQIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [showResult, setShowResult] = useState(false);
  const [timeLeft, setTimeLeft] = useState(null);
  const timerRef = useRef(null);

  useEffect(() => {
    if (mode === "exam" && timeLeft === null) setTimeLeft(20 * 60);
  }, [mode]);
  useEffect(() => {
    if (timeLeft === null) return;
    timerRef.current = setInterval(() => setTimeLeft(t => { if (t <= 1) { clearInterval(timerRef.current); setShowResult(true); return 0; } return t - 1; }), 1000);
    return () => clearInterval(timerRef.current);
  }, [timeLeft !== null]);

  const questions = mode === "exam" ? STORE.examQuestions : mode === "quiz" ? STORE.examQuestions.slice(0, 5) : STORE.examQuestions.slice(0, 3);
  const q = questions[qIdx];
  const score = questions.filter((qq, i) => answers[i] === qq.correct).length;
  const pct = Math.round((score / questions.length) * 100);
  const fmtTime = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  const reset = () => { setMode(null); setQIdx(0); setAnswers({}); setShowResult(false); setTimeLeft(null); clearInterval(timerRef.current); };

  if (showResult) return (
    <div style={{ maxWidth: 700, margin: "0 auto", textAlign: "center" }}>
      <div style={{ fontSize: 48, marginBottom: 16 }}>{pct >= 70 ? "🎉" : "📚"}</div>
      <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 56, color: pct >= 70 ? T.green : T.red, letterSpacing: -2, marginBottom: 8 }}>{pct}%</div>
      <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 22, color: pct >= 70 ? T.green : T.red, marginBottom: 6 }}>{pct >= 70 ? "Passed ✓" : "Keep Studying 📚"}</div>
      <div style={{ fontSize: 14, color: T.textMuted, marginBottom: 28 }}>{score} of {questions.length} correct</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, textAlign: "left", marginBottom: 24 }}>
        {questions.map((qq, i) => (
          <Card key={i} style={{ padding: "14px 18px", border: `1px solid ${answers[i] === qq.correct ? T.greenBorder : T.redBorder}` }}>
            <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 6, color: answers[i] === qq.correct ? T.green : T.red }}>{answers[i] === qq.correct ? "✓ Correct" : "✗ Incorrect"}</div>
            <div style={{ fontSize: 13, color: "rgba(240,232,216,0.8)", marginBottom: 6 }}>{qq.q}</div>
            {answers[i] !== qq.correct && <div style={{ fontSize: 12, color: T.red, marginBottom: 4 }}>Your answer: {qq.opts[answers[i]] || "Not answered"}</div>}
            <div style={{ fontSize: 12, color: T.green, marginBottom: 6 }}>Correct: {qq.opts[qq.correct]}</div>
            <div style={{ fontSize: 12, color: T.textMuted, lineHeight: 1.6 }}>{qq.exp}</div>
          </Card>
        ))}
      </div>
      <button onClick={reset} style={{ background: T.green, color: "#0a1a10", border: "none", padding: "12px 32px", borderRadius: 50, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>← Back to Practice</button>
    </div>
  );

  if (mode && q) return (
    <div style={{ maxWidth: 700, margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <button onClick={reset} style={{ background: "none", border: "none", color: T.textMuted, cursor: "pointer", fontSize: 13 }}>← Exit</button>
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: T.textDim }}>Q{qIdx + 1} / {questions.length}</div>
        {timeLeft !== null && <div style={{ padding: "4px 12px", background: timeLeft < 120 ? T.redDim : T.amberDim, border: `1px solid ${timeLeft < 120 ? T.redBorder : T.amberBorder}`, borderRadius: 20, fontSize: 13, fontWeight: 700, color: timeLeft < 120 ? T.red : T.amber }}>⏱ {fmtTime(timeLeft)}</div>}
      </div>
      <div style={{ height: 3, background: T.border, borderRadius: 10, overflow: "hidden", marginBottom: 28 }}>
        <div style={{ height: "100%", width: `${(qIdx / questions.length) * 100}%`, background: T.green, borderRadius: 10 }} />
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
        <Badge label={q.domain} color={T.blue} />
        {q.wi && <Badge label="🏛 WI Specific" color={T.purple} />}
      </div>
      <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: "clamp(16px,2.5vw,22px)", color: T.text, lineHeight: 1.45, marginBottom: 24, letterSpacing: -0.3 }}>{qIdx + 1}. {q.q}</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 24 }}>
        {q.opts.map((opt, oi) => {
          const sel = answers[qIdx] === oi;
          return (

              onMouseEnter={e => { if (!sel) e.currentTarget.style.background = T.bgHover; }}
              onMouseLeave={e => { if (!sel) e.currentTarget.style.background = T.bgCard; }}>
              <div style={{ width: 26, height: 26, borderRadius: "50%", background: sel ? T.green : "rgba(240,232,216,0.06)", border: `1.5px solid ${sel ? T.green : T.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: sel ? "#0a1a10" : T.textDim, flexShrink: 0 }}>{String.fromCharCode(65 + oi)}</div>
              <span style={{ fontSize: 14, color: sel ? T.text : "rgba(240,232,216,0.7)", lineHeight: 1.5 }}>{opt}</span>

      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={() => { if (qIdx > 0) { setQIdx(qIdx - 1); } }} disabled={qIdx === 0} style={{ background: T.bgCard, border: `1px solid ${T.border}`, color: T.textMuted, padding: "10px 20px", borderRadius: 10, cursor: "pointer", opacity: qIdx === 0 ? 0.3 : 1 }}>← Prev</button>
        <button onClick={() => { if (qIdx + 1 < questions.length) setQIdx(qIdx + 1); else { clearInterval(timerRef.current); setShowResult(true); } }} style={{ flex: 1, background: T.greenDim, border: `1px solid ${T.greenBorder}`, color: T.green, padding: "10px 20px", borderRadius: 10, cursor: "pointer", fontWeight: 600 }}>{qIdx + 1 === questions.length ? "Submit →" : "Next →"}</button>
      </div>
    </div>
  );

  return (
    <div style={{ maxWidth: 820, margin: "0 auto" }}>
      <SectionTitle sub="Four modes built around learning science — each uses a different feedback model.">Practice & <em style={{ color: T.green }}>Testing</em></SectionTitle>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        {[
          { id:"check", icon:"⚡", title:"Knowledge Check", desc:"3 questions, instant feedback. Perfect after a lesson.", color:T.green, tag:"3Q · Untimed" },
          { id:"quiz", icon:"📋", title:"Module Quiz", desc:"5 questions per module with full explanations.", color:T.blue, tag:"5Q · Untimed" },
          { id:"unit", icon:"🎯", title:"Unit Test", desc:"10 questions targeting your weak areas.", color:T.purple, tag:"10Q · Untimed" },
          { id:"exam", icon:"🏆", title:"Exam Simulation", desc:"Full Wisconsin PSI Series 22-01 practice exam.", color:T.amber, tag:`${STORE.examQuestions.length}Q · Timed`, locked: STORE.student.hoursLogged < 20 },
        ].map((m, i) => (
          <Card key={i} onClick={() => !m.locked && setMode(m.id)} style={{ padding: "24px 22px", border: `1px solid ${m.color}20`, cursor: m.locked ? "not-allowed" : "pointer", opacity: m.locked ? 0.5 : 1, position: "relative" }}>
            {m.locked && <div style={{ position: "absolute", top: 14, right: 14, fontSize: 10, color: T.textDim, background: T.bgCard, padding: "3px 8px", borderRadius: 6 }}>🔒 Need 20h</div>}
            <div style={{ fontSize: 28, marginBottom: 12 }}>{m.icon}</div>

            <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 20, color: T.text, marginBottom: 8 }}>{m.title}</div>
            <div style={{ fontSize: 13, color: T.textMuted, lineHeight: 1.6 }}>{m.desc}</div>
          </Card>
        ))}
      </div>
    </div>
  );
};

// ── FLASHCARDS PAGE ───────────────────────────────────────────
const PageFlashcards = () => {
  const [studying, setStudying] = useState(false);
  const [deck, setDeck] = useState([]);
  const [cardIdx, setCardIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [cardStates, setCardStates] = useState({});
  const [done, setDone] = useState(false);
  const [sessionXP, setSessionXP] = useState(0);
  const [results, setResults] = useState([]);

  const sm2 = (card, q) => {
    let { interval = 1, ef = 2.5, reps = 0 } = cardStates[card.id] || {};
    if (q < 2) { reps = 0; interval = 1; }
    else { if (reps === 0) interval = 1; else if (reps === 1) interval = 6; else interval = Math.round(interval * ef); reps++; }
    ef = Math.max(1.3, ef + 0.1 - (3 - q) * (0.08 + (3 - q) * 0.02));
    return { interval, ef, reps };
  };

  const startDeck = (cards) => { setDeck(cards); setCardIdx(0); setFlipped(false); setDone(false); setSessionXP(0); setResults([]); setStudying(true); };

  const rate = (q) => {
    const c = deck[cardIdx];
    setCardStates(p => ({ ...p, [c.id]: sm2(c, q) }));
    setSessionXP(x => x + [5,10,15,25][q]);
    setResults(r => [...r, { card: c, quality: q }]);
    if (cardIdx + 1 >= deck.length) { setDone(true); }
    else { setCardIdx(cardIdx + 1); setFlipped(false); }
  };

  const card = deck[cardIdx];
  const dueCards = STORE.flashcards.filter(c => !cardStates[c.id] || cardStates[c.id].reps === 0);
  const masteredCards = STORE.flashcards.filter(c => (cardStates[c.id]?.reps || 0) >= 3);

  if (studying && done) return (
    <div style={{ maxWidth: 600, margin: "0 auto", textAlign: "center" }}>
      <div style={{ fontSize: 48, marginBottom: 16 }}>🌿</div>
      <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 36, color: T.text, marginBottom: 8 }}>Session Complete</div>
      <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 52, color: T.green, marginBottom: 8 }}>{Math.round((results.filter(r => r.quality >= 2).length / results.length) * 100)}%</div>
      <div style={{ fontSize: 14, color: T.textMuted, marginBottom: 24 }}>{results.length} cards · +{sessionXP} XP earned</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 24 }}>
        {[["Again", 0, T.red], ["Hard", 1, T.amber], ["Good", 2, T.green], ["Easy", 3, T.blue]].map(([l, q, c]) => (
          <div key={l} style={{ background: `${c}10`, border: `1px solid ${c}25`, borderRadius: 10, padding: "12px 8px" }}>
            <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 24, color: c }}>{results.filter(r => r.quality === q).length}</div>
            <div style={{ fontSize: 11, color: T.textMuted }}>{l}</div>
          </div>
        ))}
      </div>
      <button onClick={() => setStudying(false)} style={{ background: T.green, color: "#0a1a10", border: "none", padding: "12px 28px", borderRadius: 50, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>← Back to Decks</button>
    </div>
  );

  if (studying && card) return (
    <div style={{ maxWidth: 660, margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <button onClick={() => setStudying(false)} style={{ background: "none", border: "none", color: T.textMuted, cursor: "pointer", fontSize: 13 }}>← Exit</button>
        <div style={{ fontSize: 12, color: T.textDim }}>{cardIdx + 1} / {deck.length}</div>
        <Badge label={`+${sessionXP} XP`} color={T.purple} />
      </div>
      <div style={{ height: 3, background: T.border, borderRadius: 10, overflow: "hidden", marginBottom: 28 }}>
        <div style={{ height: "100%", width: `${(cardIdx / deck.length) * 100}%`, background: T.green, borderRadius: 10 }} />
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
        <Badge label={`Unit ${card.unit}`} color={card.color || T.green} />
        <Badge label={card.topic} color={T.textDim} bg={T.bgCard} border={T.border} />
        {card.wi && <Badge label="🏛 WI" color={T.purple} />}
      </div>
      <div onClick={() => setFlipped(true)} style={{ minHeight: 240, background: flipped ? `${T.green}08` : T.bgCard, border: `2px solid ${flipped ? T.greenBorder : T.border}`, borderRadius: 20, padding: "32px 36px", cursor: flipped ? "default" : "pointer", transition: "all 0.25s", display: "flex", flexDirection: "column", justifyContent: "center", gap: 16 }}>
        <div style={{ fontSize: 10, color: flipped ? T.green : T.textDim, letterSpacing: 2, textTransform: "uppercase", fontWeight: 600 }}>{flipped ? "Answer" : "Question — tap to reveal"}</div>
        <div style={{ fontFamily: flipped ? "inherit" : "'Instrument Serif', serif", fontSize: flipped ? 14 : "clamp(17px,2.5vw,22px)", color: T.text, lineHeight: 1.65, whiteSpace: "pre-line", fontWeight: flipped ? 400 : 700, letterSpacing: flipped ? 0 : -0.3 }}>{flipped ? card.back : card.front}</div>
        {flipped && card.wi && <div style={{ padding: "10px 14px", background: T.purpleDim, border: `1px solid ${T.purpleBorder}`, borderLeft: `3px solid ${T.purple}`, borderRadius: 8, fontSize: 12, color: T.purple, lineHeight: 1.6 }}>🏛 Wisconsin-specific exam content</div>}
      </div>
      {flipped && (
        <div style={{ marginTop: 16 }}>
          <div style={{ fontSize: 10, color: T.textDim, letterSpacing: 2, textTransform: "uppercase", textAlign: "center", marginBottom: 12 }}>How well did you know this?</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10 }}>
            {[{ q:0, l:"Again", s:"Didn't know", c:T.red },{ q:1, l:"Hard", s:"Almost", c:T.amber },{ q:2, l:"Good", s:"Correct", c:T.green },{ q:3, l:"Easy", s:"Too easy", c:T.blue }].map(b => (
              <button key={b.q} onClick={() => rate(b.q)} style={{ padding: "13px 8px", background: `${b.c}12`, border: `1px solid ${b.c}30`, borderRadius: 12, cursor: "pointer", transition: "all 0.15s" }}
                onMouseEnter={e => e.currentTarget.style.transform = "translateY(-3px)"}
                onMouseLeave={e => e.currentTarget.style.transform = ""}>
                <div style={{ fontWeight: 800, fontSize: 14, color: b.c }}>{b.l}</div>
                <div style={{ fontSize: 10, color: T.textMuted, marginTop: 2 }}>{b.s}</div>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );

  return (
    <div style={{ maxWidth: 820, margin: "0 auto" }}>
      <SectionTitle sub="SM-2 spaced repetition algorithm — 10 cards across all 8 units.">Flash<em style={{ color: T.green }}>cards</em></SectionTitle>
      <div style={{ display: "flex", gap: 10, marginBottom: 24 }}>
        {[[dueCards.length, "Due Today", T.amber], [STORE.flashcards.length - masteredCards.length - dueCards.length, "Learning", T.blue], [masteredCards.length, "Mastered", T.green]].map(([v,l,c]) => (
          <div key={l} style={{ background: `${c}0d`, border: `1px solid ${c}22`, borderRadius: 12, padding: "10px 16px", display: "flex", gap: 10, alignItems: "center" }}>
            <span style={{ fontFamily: "'Instrument Serif', serif", fontSize: 22, color: c }}>{v}</span>
            <span style={{ fontSize: 12, color: T.textMuted }}>{l}</span>
          </div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
        {[
          { title:"Review Due Cards", count:dueCards.length, color:T.amber, icon:"⏰", desc:"Scheduled by the SM-2 algorithm", cards:dueCards },
          { title:"Study All Cards", count:STORE.flashcards.length, color:T.green, icon:"✦", desc:"Complete deck in random order", cards:[...STORE.flashcards].sort(() => Math.random()-0.5) },
          { title:"Wisconsin Only", count:STORE.flashcards.filter(c=>c.wi).length, color:T.purple, icon:"🏛", desc:"WI-specific rules with statute refs", cards:STORE.flashcards.filter(c=>c.wi) },
          { title:"Weak Areas", count:STORE.flashcards.filter(c=>[4,7,8].includes(c.unit)).length, color:T.red, icon:"⚡", desc:"Annuities, Tax Treatment, WI Security Fund", cards:STORE.flashcards.filter(c=>[4,7,8].includes(c.unit)) },
        ].map((d, i) => (
          <Card key={i} onClick={() => d.cards.length && startDeck(d.cards)} style={{ padding: "20px", border: `1px solid ${d.color}22`, cursor: d.cards.length ? "pointer" : "not-allowed" }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
              <span style={{ fontSize: 24 }}>{d.icon}</span>

// AI COACH DRAWER
// ═══════════════════════════════════════════════════════════════
const CoachDrawer = ({ open, onClose }) => {
  const [messages, setMessages] = useState([
    { role: "assistant", text: `Hey Amanda 🌿 You're on a 7-day streak — that consistency is everything. Annuities is your biggest gap at 45% mastery. Want a focused drill, or is something else on your mind?` }
  ]);
  const [input, setInput] = useState("");
  const [sending, setSending] = useState(false);
  const [sessionXP, setSessionXP] = useState(0);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, sending]);

  const send = async (text) => {
    const txt = (text || input).trim();
    if (!txt || sending) return;
    setInput("");
    setMessages(p => [...p, { role: "user", text: txt }]);
    setSending(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 1000,
          system: `You are Coach, a warm expert Wisconsin Life Insurance exam tutor inside PassPro. Student: Amanda, 41 days to WI exam (PSI Series 22-01, 100Q, 70% pass), 74% readiness. Weak: Annuities, Tax Treatment, WI Security Fund. Keep responses under 90 words. Warm, direct, human. Use 🏛 for WI-specific statute callouts. End with a question or offer to quiz.`,
          messages: messages.concat({ role: "user", content: txt }).filter(m => m.role === "user" || m.role === "assistant").map(m => ({ role: m.role, content: m.text || m.content })),
        }),
      });
      const data = await res.json();
      const reply = data.content?.map(b => b.text || "").join("") || "Let me think on that...";
      setMessages(p => [...p, { role: "assistant", text: reply }]);
      setSessionXP(x => x + 15);
    } catch { setMessages(p => [...p, { role: "assistant", text: "Connection hiccup — try again in a moment." }]); }
    setSending(false);
  };

  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 200, display: "flex" }}>
      <div style={{ flex: 1, background: "rgba(0,0,0,0.55)", backdropFilter: "blur(4px)" }} onClick={onClose} />
      <div style={{ width: 420, background: "#1a1712", borderLeft: `1px solid ${T.border}`, display: "flex", flexDirection: "column", boxShadow: "-20px 0 60px rgba(0,0,0,0.5)" }}>
        <div style={{ padding: "18px 20px 14px", borderBottom: `1px solid ${T.border}`, display: "flex", gap: 12, alignItems: "center" }}>
          <div style={{ width: 38, height: 38, borderRadius: "50%", background: `linear-gradient(135deg, ${T.green}, #5aaa7c)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>🎓</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 16, color: T.text }}>Coach <em style={{ color: T.green }}>AI</em></div>
            <div style={{ fontSize: 11, color: `${T.green}88` }}>WI Life Insurance Expert · Online</div>
          </div>
          {sessionXP > 0 && <Badge label={`+${sessionXP} XP`} color={T.purple} />}
          <button onClick={onClose} style={{ background: "none", border: "none", color: T.textDim, fontSize: 18, cursor: "pointer" }}>✕</button>
        </div>
        <div style={{ padding: "8px 16px", background: T.amberDim, borderBottom: `1px solid ${T.border}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 4, color: T.textDim }}><span>Exam readiness</span><span style={{ color: T.amber }}>41 days to exam</span></div>
          <Bar pct={74} color={T.amber} h={3} />
        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: "16px" }}>
          {messages.map((m, i) => (
            <div key={i} style={{ display: "flex", gap: 8, marginBottom: 14, justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
              {m.role === "assistant" && <div style={{ width: 28, height: 28, borderRadius: "50%", background: `linear-gradient(135deg, ${T.green}, #5aaa7c)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, flexShrink: 0 }}>🎓</div>}
              <div style={{ maxWidth: "78%", padding: "11px 14px", background: m.role === "user" ? T.greenDim : T.bgCard, border: `1px solid ${m.role === "user" ? T.greenBorder : T.border}`, borderRadius: m.role === "user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px", fontSize: 13, color: "rgba(240,232,216,0.85)", lineHeight: 1.65, whiteSpace: "pre-wrap" }}>{m.text}</div>
            </div>
          ))}
          {sending && (
            <div style={{ display: "flex", gap: 8 }}>
              <div style={{ width: 28, height: 28, borderRadius: "50%", background: `linear-gradient(135deg, ${T.green}, #5aaa7c)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}>🎓</div>
              <div style={{ padding: "12px 16px", background: T.bgCard, border: `1px solid ${T.border}`, borderRadius: "14px 14px 14px 4px", display: "flex", gap: 5, alignItems: "center" }}>
                {[0,1,2].map(i => <div key={i} style={{ width: 7, height: 7, borderRadius: "50%", background: T.green, animation: `bounce 1.2s ease-in-out ${i*0.2}s infinite` }} />)}
              </div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>
        <div style={{ padding: "8px 16px 10px", borderTop: `1px solid ${T.border}`, display: "flex", gap: 6, flexWrap: "wrap" }}>
          <span style={{ fontSize: 10, color: T.textDim, alignSelf: "center" }}>Quick:</span>
          {STORE.student.weakTopics.map((t, i) => (
            <div key={i} onClick={() => send(`Help me understand ${t}`)} style={{ padding: "4px 10px", background: T.redDim, border: `1px solid ${T.redBorder}`, borderRadius: 20, fontSize: 11, color: T.red, cursor: "pointer", transition: "background 0.15s" }}
              onMouseEnter={e => e.currentTarget.style.background = "rgba(224,123,106,0.15)"}
              onMouseLeave={e => e.currentTarget.style.background = T.redDim}>⚡ {t}</div>
          ))}
        </div>
        <div style={{ padding: "8px 16px 16px", borderTop: `1px solid ${T.border}` }}>
          <div style={{ background: T.bgCard, border: `1px solid ${T.border}`, borderRadius: 14, padding: "10px 12px", display: "flex", gap: 8, alignItems: "flex-end" }}>
            <textarea value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }} placeholder="Ask Coach anything..." rows={1} style={{ flex: 1, background: "none", border: "none", color: T.text, fontSize: 13, lineHeight: 1.5, maxHeight: 80, overflowY: "auto" }} onInput={e => { e.target.style.height = "auto"; e.target.style.height = Math.min(e.target.scrollHeight, 80) + "px"; }} />
            <button onClick={() => send()} disabled={!input.trim() || sending} style={{ width: 32, height: 32, borderRadius: 10, background: input.trim() && !sending ? T.green : "rgba(255,255,255,0.07)", color: input.trim() && !sending ? "#0a1a10" : T.textDim, border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0, transition: "all 0.15s" }}>
              {sending ? <div style={{ width: 12, height: 12, border: `2px solid rgba(255,255,255,0.3)`, borderTop: `2px solid #fff`, borderRadius: "50%", animation: "spin 0.8s linear infinite" }} /> : "↑"}
            </button>
          </div>
          <div style={{ fontSize: 10, color: T.textDim, marginTop: 5, textAlign: "center" }}>↵ send · Shift+↵ new line · Live Claude API</div>
        </div>
      </div>
      <style>{`@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}} @keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
};

            ))}
          </div>
          <div style={{ width: 30, height: 30, borderRadius: "50%", background: `linear-gradient(135deg, ${T.green}, #5aaa7c)`, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Instrument Serif', serif", fontSize: 13, color: "#0a1a10", cursor: "pointer" }}>A</div>
        </div>
      </div>

      <div style={{ position: "relative", zIndex: 1, flex: 1, display: "flex", overflow: "hidden" }}>
        {/* Sidebar */}
        <div style={{ width: 196, background: "rgba(15,13,10,0.75)", backdropFilter: "blur(16px)", borderRight: `1px solid ${T.border}`, padding: "18px 10px", display: "flex", flexDirection: "column", flexShrink: 0 }}>
          {/* Student card */}
          <div style={{ padding: "11px 14px", background: T.greenDim, border: `1px solid ${T.greenBorder}`, borderRadius: 14, marginBottom: 20 }}>
            <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 15, color: T.text, marginBottom: 2 }}>{STORE.student.name}</div>
            <div style={{ fontSize: 10, color: T.textDim, marginBottom: 8 }}>{STORE.student.level} · {STORE.student.xp.toLocaleString()} XP</div>
            <Bar pct={STORE.student.readiness} color={T.green} h={3} />
            <div style={{ fontSize: 10, color: `${T.green}88`, marginTop: 3 }}>{STORE.student.readiness}% ready</div>
          </div>

          {/* Nav */}
          {allNav.map((item) => {
            const isAdminItem = item.id.startsWith("admin");
            if (role === "student" && isAdminItem) return null;
            if (role === "admin" && !isAdminItem && !["dashboard"].includes(item.id)) return null;
            return (
              <div key={item.id}>
                {item.section && <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 8, color: T.textDim, letterSpacing: 2, padding: "10px 12px 4px", textTransform: "uppercase" }}>{item.section}</div>}
                <button onClick={() => setPage(item.id)} style={{ width: "100%", padding: "9px 12px", borderRadius: 10, background: page === item.id ? T.greenDim : "transparent", border: "none", color: page === item.id ? T.green : T.textMuted, display: "flex", alignItems: "center", gap: 10, fontSize: 12, fontWeight: page === item.id ? 600 : 400, cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}
                  onMouseEnter={e => { if (page !== item.id) e.currentTarget.style.background = T.bgHover; }}
                  onMouseLeave={e => { if (page !== item.id) e.currentTarget.style.background = "transparent"; }}>
                  <span style={{ fontSize: 13 }}>{item.icon}</span>{item.label}
                </button>
              </div>
            );
          })}

          {/* OCI bottom */}
          <div style={{ marginTop: "auto", padding: "11px 14px", background: T.purpleDim, border: `1px solid ${T.purpleBorder}`, borderRadius: 12 }}>
            <div style={{ fontSize: 9, color: `${T.purple}88`, letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 5 }}>OCI Compliance</div>
            <Bar pct={42.5} color={T.purple} h={4} />
            <div style={{ fontSize: 10, color: T.textDim, marginTop: 3 }}>8.5h / 20h logged</div>
          </div>
        </div>

        {/* Main */}
        <div className="fade" key={page} style={{ flex: 1, overflowY: "auto", padding: "28px 32px" }}>
          {pages[page] || <div style={{ color: T.textMuted, textAlign: "center", marginTop: 80 }}>Page not found</div>}
        </div>
      </div>

      <CoachDrawer open={coachOpen} onClose={() => setCoachOpen(false)} />

      <style>{`@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-15px)}} @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,20px)}}`}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(PassProPlatform));
</script>
</body>
</html>
