                              </div>
                              <div style={{ background: sc.bg, border: `1px solid ${sc.border}`, color: sc.color, padding: "3px 8px", borderRadius: 8, fontSize: 10, fontFamily: "'JetBrains Mono'", textAlign: "center", whiteSpace: "nowrap" }}>{sc.label}</div>
                              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "rgba(255,255,255,0.3)" }}>{item.artifact !== "—" ? `Art. ${item.artifact}` : "—"}</div>
                              <div />
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* WHAT'S NEXT */}
        {tab === "next" && (
          <div>
            <p style={{ fontSize: 14, color: "rgba(255,255,255,0.4)", marginBottom: 28, maxWidth: 600, lineHeight: 1.7 }}>
              Based on the full audit, here are the highest-impact builds remaining — prioritized by what moves the needle most for OCI approval, student outcomes, and revenue.
            </p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {NEXT_BUILDS.map((b, i) => {
                const pColor = b.priority === "P1" ? "#f87171" : b.priority === "P2" ? "#f59e0b" : "#4ade80";
                return (
                  <div key={i} className="next-card" style={{ background: "rgba(255,255,255,0.02)", border: `1px solid rgba(255,255,255,0.06)`, borderRadius: 12, padding: "18px 20px", display: "flex", alignItems: "flex-start", gap: 16 }}>
                    <div style={{ background: `${pColor}15`, border: `1px solid ${pColor}30`, color: pColor, padding: "4px 10px", borderRadius: 8, fontSize: 11, fontFamily: "'JetBrains Mono'", fontWeight: 700, flexShrink: 0, minWidth: 34, textAlign: "center" }}>{b.priority}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontFamily: "'Syne'", fontSize: 15, fontWeight: 700, marginBottom: 4 }}>{b.name}</div>
                      <div style={{ fontSize: 13, color: "rgba(255,255,255,0.45)", lineHeight: 1.6 }}>{b.why}</div>
                    </div>
                    <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.07)", color: "rgba(255,255,255,0.35)", padding: "4px 10px", borderRadius: 8, fontSize: 11, fontFamily: "'JetBrains Mono'", flexShrink: 0 }}>Effort: {b.effort}</div>
                  </div>
                );
              })}
            </div>

            <div style={{ marginTop: 28, padding: "20px 24px", background: "rgba(0,200,150,0.06)", border: "1px solid rgba(0,200,150,0.15)", borderLeft: "3px solid #00c896", borderRadius: 10 }}>
              <div style={{ fontFamily: "'JetBrains Mono'", fontSize: 10, color: "#00c896", letterSpacing: 2, marginBottom: 8 }}>WHERE PASSPRO STANDS TODAY</div>
              <p style={{ fontSize: 14, color: "rgba(255,255,255,0.6)", lineHeight: 1.8 }}>
                <strong style={{ color: "#fff" }}>27 artifacts built.</strong> The product is demo-ready, investor-ready, and developer-ready. Core student experience is complete. AI features are live. PSI alignment is at ~95%. OCI submission threshold is met.<br /><br />
                The biggest remaining gaps are <strong style={{ color: "#fff" }}>content depth</strong> (500+ question bank, P3 modules, TX/FL curricula), <strong style={{ color: "#fff" }}>fundraising materials</strong> (pitch deck, financial model), and the <strong style={{ color: "#fff" }}>actual codebase</strong> — everything is specced and ready for a dev team to execute.
              </p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(PlatformAudit));
</script>
</body>
</html>
